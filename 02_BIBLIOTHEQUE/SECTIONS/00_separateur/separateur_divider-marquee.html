<!-- ==========================================================================
     STYLE — Séparateur · Bandeau texte défilant
     Un bandeau de mots-clés qui défile en continu entre deux sections, comme
     une respiration rythmée. Piste dupliquée pour boucler sans couture, pause
     au survol. 100 % CSS.
     ========================================================================== -->
<style>
  /* 1. Tokens ------------------------------------------------------------ */
  :root{
    --bg:#fbfbfa;--fg:#16181d;--muted:#5c6270;--accent:#3b6ef5;
    --band:#0b0b0d;--band-fg:#f4f4f0;
    --maxw:46rem;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,sans-serif;
  }
  /* 2. Reset ------------------------------------------------------------- */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font);line-height:1.6}
  svg{display:block}

  .block{max-width:var(--maxw);margin:0 auto;padding:2.8rem 1.4rem;text-align:center;color:var(--muted)}
  .block h3{color:var(--fg);font-weight:700;font-size:1.15rem;margin-bottom:.3rem}
  .block .tag{display:inline-block;font-size:.72rem;font-weight:700;letter-spacing:.05em;
    text-transform:uppercase;color:var(--accent);margin-bottom:1rem}

  /* 3. Layout : bandeau -------------------------------------------------- */
  .marquee{background:var(--band);color:var(--band-fg);overflow:hidden;
    padding:.9rem 0;transform:rotate(-1.2deg) scale(1.03);transform-origin:center}
  .track{display:flex;gap:0;width:max-content;animation:scroll 28s linear infinite}
  .marquee:hover .track{animation-play-state:paused}
  @keyframes scroll{to{transform:translateX(-50%)}}
  .word{display:inline-flex;align-items:center;gap:1.4rem;padding:0 .7rem;
    font-size:clamp(1.1rem,2.6vw,1.6rem);font-weight:800;letter-spacing:-.01em;white-space:nowrap}
  .word svg{width:1.1rem;height:1.1rem;fill:var(--accent);flex:none}
  .word.muted{color:#6b6b73}

  /* 7. Accessibilité ----------------------------------------------------- */
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px}
  @media (prefers-reduced-motion:reduce){.track{animation:none;justify-content:center;width:auto}
    .marquee{transform:none}}

  /* --- Animation d'entrée au chargement (en-tête + bandeau) ------------- */
  /* NB : on anime le CONTENEUR .marquee, pas la piste .track qui défile.   */
  @keyframes secIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
  /* le bandeau garde son inclinaison de base pendant l'entrée */
  @keyframes secInBand{from{opacity:0;transform:rotate(-1.2deg) scale(1.03) translateY(22px)}
    to{opacity:1;transform:rotate(-1.2deg) scale(1.03) translateY(0)}}
  .block{animation:secIn .7s cubic-bezier(.16,1,.3,1) .05s backwards}
  .marquee{animation:secInBand .7s cubic-bezier(.16,1,.3,1) .2s backwards}
  @media (prefers-reduced-motion:reduce){.block,.marquee{animation:none}}
</style>
</head>
<body>
