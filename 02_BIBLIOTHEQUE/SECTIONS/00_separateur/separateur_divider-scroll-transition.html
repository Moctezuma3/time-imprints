<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- lib:meta -->
<meta name="lib:id" content="separateur_divider-scroll-transition">
<meta name="lib:groupe" content="00-elements">
<meta name="lib:categorie" content="separateur">
<meta name="lib:intention" content="conversion-footer">
<meta name="lib:role" content="separateur">
<meta name="lib:placement" content="divider">
<meta name="lib:niveau" content="2">
<meta name="lib:titre" content="Transition animée au défilement">
<meta name="lib:tags" content="JS natif, mix, scroll">
<meta name="lib:utilite" content="Bandeau couleur qui se dévoile par un masque (clip-path) quand il entre dans le viewport, libellé en fade. Marque un changement d'ambiance entre 2 sections. JS natif (IO).">
<meta name="lib:showcase" content="non">
<meta name="lib:secteurs" content="polyvalent">
<meta name="lib:slots" content="texte:ligne:court">
<meta name="lib:anatomie" content="base:bandeau de transition pleine largeur entre 2 sections; motif:bandeau couleur uni (hauteur clamp 7rem a 11rem) avec un libelle court et une icone fleche centres; layout:s intercale entre une section claire et une section sombre pour marquer un changement d ambiance; animation:au scroll le bandeau se remplit par masque clip-path gauche vers droite, puis le libelle apparait en fondu et monte; responsive:hauteur fluide via clamp">
<!-- /lib:meta -->
<title>Transition animée au défilement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — Séparateur · Transition animée au passage
     Entre deux sections, un bandeau couleur se dévoile par un masque
     (clip-path) au moment où il entre dans le viewport. Marque un changement
     d'ambiance. JS natif (IntersectionObserver) ; sans JS, bandeau visible.
     ========================================================================== -->
<style>
  /* 1. Tokens ------------------------------------------------------------ */
  :root{
    --bg:#fbfbfa;--fg:#16181d;--muted:#5c6270;--accent:#3b6ef5;
    --maxw:46rem;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  /* 2. Reset ------------------------------------------------------------- */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font);line-height:1.6}
  svg{display:block;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  .scene{padding:clamp(3rem,8vw,6rem) 1.4rem;text-align:center}
  .scene__in{max-width:var(--maxw);margin:0 auto}
  .scene .tag{display:inline-block;font-size:.72rem;font-weight:700;letter-spacing:.05em;
    text-transform:uppercase;margin-bottom:1rem}
  .scene h3{font-size:clamp(1.4rem,3vw,1.9rem);font-weight:700;letter-spacing:-.02em}
  .scene p{margin-top:.7rem}
  .scene--a{background:var(--bg);color:var(--fg)}
  .scene--a .tag{color:var(--accent)}.scene--a p{color:var(--muted)}
  .scene--b{background:#0b0b0d;color:#f4f4f0}
  .scene--b .tag{color:#9db8ff}.scene--b p{color:#a1a1aa}

  /* 3. Layout : bandeau de transition ----------------------------------- */
  .divider{position:relative;height:clamp(7rem,16vw,11rem);overflow:hidden;background:#0b0b0d}
  .divider__fill{position:absolute;inset:0;background:var(--accent);
    clip-path:inset(0 100% 0 0);transition:clip-path 1s var(--ease)}
  .divider.is-in .divider__fill{clip-path:inset(0 0 0 0)}
  .divider__label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:.7rem;
    color:#fff;font-weight:800;letter-spacing:-.01em;font-size:clamp(1.1rem,3vw,1.7rem);
    opacity:0;transform:translateY(10px);transition:opacity .5s .35s,transform .6s .35s var(--ease)}
  .divider.is-in .divider__label{opacity:1;transform:none}
  .divider__label svg{width:1.4rem;height:1.4rem;stroke:#fff}

  /* 7. Accessibilité ----------------------------------------------------- */
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px}
  @media (prefers-reduced-motion:reduce){
    .divider__fill{clip-path:inset(0);transition:none}
    .divider__label{opacity:1;transform:none;transition:none}
  }

  /* --- Animation d'entrée au chargement -------------------------------- */
  @keyframes secIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
  .divider{animation:secIn .7s cubic-bezier(.16,1,.3,1) .05s backwards}
  @media (prefers-reduced-motion:reduce){.divider{animation:none}}
</style>
</head>
<body>

<!-- ==========================================================================
     STRUCTURE — section A → bandeau de transition → section B. Le bandeau se
     remplit au passage (clip-path). Adaptez couleurs et libellé.
     ========================================================================== -->
<section class="scene scene--a">
  <div class="scene__in"><span class="tag">Avant</span><h3>Une première partie, claire</h3><p>On défile&hellip; et le bandeau ci-dessous se révèle d'un coup au passage.</p></div>
</section>

<div class="divider" id="divider" role="separator" aria-label="Transition de section">
  <span class="divider__fill" aria-hidden="true"></span>
  <span class="divider__label" data-slot="texte"><svg viewBox="0 0 24 24" data-keep><path d="M12 5v14M5 12l7 7 7-7"/></svg>La suite</span>
</div>

<section class="scene scene--b">
  <div class="scene__in"><span class="tag">Après</span><h3>Une seconde partie, sombre</h3><p>Le changement d'ambiance est annoncé par la transition colorée.</p></div>
</section>

<!-- ==========================================================================
     SCRIPT — déclenche le masque quand le bandeau entre dans le viewport.
     ========================================================================== -->
<script>
  (function(){
    var d = document.getElementById('divider');
    if(!('IntersectionObserver' in window)){ d.classList.add('is-in'); return; }
    new IntersectionObserver(function(entries){
      entries.forEach(function(en){ if(en.isIntersecting){ d.classList.add('is-in'); } });
    }, { threshold:.55 }).observe(d);
  })();
</script>

</body>
</html>
