<title>Titre serif centré + carrousel de portraits</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — Hero · Titre serif centré + carrousel de portraits (centre actif).
     Fond gris froid, accent lime. Re-skin : bloc :root (1). JS natif (carousel).
     ========================================================================== -->
<style>
  /* 1. Tokens ------------------------------------------------------------ */
  :root{
    --fg:#1b1d1a;--muted:#5e6166;--surface:#ffffff;--soft:#cdd2d8;--line:#d4d8dd;
    --accent:#cdee3f;        /* lime */
    --accent-fg:#1b1d10;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
    --serif:Georgia,"Times New Roman",serif;
    --maxw:72rem;--ease:cubic-bezier(.16,1,.3,1);
  }
  /* 2. Reset ------------------------------------------------------------- */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  img{display:block;max-width:100%}
  a{text-decoration:none;color:inherit}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
  body{font-family:var(--font);color:var(--fg);line-height:1.5;-webkit-font-smoothing:antialiased}

  /* 3. Layout ------------------------------------------------------------ */
  .hero{min-height:100svh;display:flex;flex-direction:column;
    background:linear-gradient(180deg,#eef0f2 0%,#e0e4e9 55%,#d7dce2 100%);
    padding-top:clamp(3rem,7vw,5.5rem);overflow:hidden}

  .hero__text{max-width:var(--maxw);margin:0 auto;padding:0 1.4rem;text-align:center}
  .hero__title{font-family:var(--serif);font-weight:500;letter-spacing:-.015em;
    font-size:clamp(2.6rem,7vw,5.2rem);line-height:1.02;color:var(--fg)}
  .hero__title em{font-style:italic;font-weight:500}
  .hero__lead{margin:1.3rem auto 0;max-width:44ch;font-size:clamp(1rem,1.5vw,1.15rem);
    color:var(--muted)}

  /* 4. CTA --------------------------------------------------------------- */
  .hero__actions{margin-top:2rem;display:flex;flex-wrap:wrap;gap:.7rem;justify-content:center}
  .btn{display:inline-flex;align-items:center;gap:.7rem;padding:.55rem .85rem .55rem 1.4rem;
    border-radius:999px;font-size:1rem;font-weight:600;
    transition:transform .35s var(--ease),background .25s var(--ease)}
  .btn--light{background:var(--surface);color:var(--fg);box-shadow:0 10px 30px -18px rgba(20,22,18,.5)}
  .btn--light .ic{width:2rem;height:2rem;border-radius:50%;background:var(--accent);color:var(--accent-fg);
    display:grid;place-items:center;transition:transform .35s var(--ease)}
  .btn--light .ic svg{width:1rem;height:1rem}
  .btn--soft{background:rgba(255,255,255,.0);color:var(--fg);border:1px solid var(--line);padding:.55rem 1.4rem}
  @media (hover:hover) and (pointer:fine){
    .btn--light:hover{transform:translateY(-2px)}
    .btn--light:hover .ic{transform:translate(3px,-3px)}
    .btn--soft:hover{background:rgba(255,255,255,.5)}
  }

  /* 5. Carrousel de portraits (centre actif) ----------------------------- */
  .pcar{position:relative;margin-top:clamp(1.6rem,4vw,2.6rem);flex:1;min-height:0;
    display:flex;align-items:flex-start}   /* carrousel remonté sous le texte (au lieu d'être ancré en bas) */
  .pcar__view{width:100%;overflow:hidden}
  .pcar__track{display:flex;gap:clamp(.8rem,1.6vw,1.4rem);align-items:flex-end;
    padding:0 1.4rem 0;will-change:transform;
    transition:transform .6s var(--ease)}
  .pcar__card{position:relative;flex:0 0 auto;width:clamp(13rem,21vw,20rem);
    aspect-ratio:3/4;border-radius:16px;overflow:hidden;background:#c9ced4;
    filter:grayscale(1);opacity:.5;transform:scale(.92);transform-origin:bottom center;
    transition:filter .5s var(--ease),opacity .5s var(--ease),transform .5s var(--ease),box-shadow .5s var(--ease)}
  .pcar__card img{width:100%;height:100%;object-fit:cover}
  .pcar__card.is-active{filter:none;opacity:1;transform:scale(1);
    box-shadow:0 22px 46px -26px rgba(20,22,18,.55)}
  .pcar__name{position:absolute;left:0;right:0;bottom:0;padding:2.2rem 1rem .9rem;
    color:#fff;font-size:.85rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    text-align:center;background:linear-gradient(transparent,rgba(15,17,14,.7));
    opacity:0;transition:opacity .4s var(--ease)}
  .pcar__card.is-active .pcar__name{opacity:1}
  .pcar__pause{position:absolute;top:.9rem;right:clamp(1rem,3vw,2rem);z-index:3;
    width:2.4rem;height:2.4rem;border-radius:50%;background:rgba(255,255,255,.85);
    display:grid;place-items:center;color:var(--fg);box-shadow:0 6px 18px -10px rgba(0,0,0,.5)}
  .pcar__pause svg{width:1rem;height:1rem}

  /* 6. Entrée au chargement --------------------------------------------- */
  @keyframes rise{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
  @keyframes cardRise{from{opacity:0;transform:translateY(72px)}to{opacity:1;transform:translateY(0)}}
  .hero__title{animation:rise .85s var(--ease) .05s backwards}
  .hero__lead{animation:rise .85s var(--ease) .2s backwards}
  .hero__actions{animation:rise .85s var(--ease) .35s backwards}
  /* J — les portraits montent un par un avec un ressort */
  .pcar__pause{animation:rise .8s var(--ease) .85s backwards}
  .pcar__card{animation:cardRise .9s cubic-bezier(.34,1.56,.64,1) backwards}
  .pcar__card:nth-child(1){animation-delay:.50s}
  .pcar__card:nth-child(2){animation-delay:.60s}
  .pcar__card:nth-child(3){animation-delay:.70s}
  .pcar__card:nth-child(4){animation-delay:.80s}
  .pcar__card:nth-child(5){animation-delay:.90s}

  /* 7. Responsive / accessibilité --------------------------------------- */
  @media (max-width:640px){
    .pcar__card{width:62vw}
    .btn{flex:0 0 auto}
  }
  :focus-visible{outline:2px solid #1b1d1a;outline-offset:3px;border-radius:999px}
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important}
    .pcar__track,.pcar__card,.pcar__name{transition:none!important}
  }
</style>
</head>
<body>

<!-- ==========================================================================
     STRUCTURE — remplacez le titre, la baseline, les CTA et les portraits
     (un <figure class="pcar__card"> par personne). Le centre actif défile seul.
     ========================================================================== -->
<section class="hero">

  <div class="hero__text">
    <h1 class="hero__title" data-slot="titre">Les problèmes humains sont <em>rarement</em> simples</h1>
    <p class="hero__lead" data-slot="accroche">On aide les équipes à concevoir un recrutement, une culture et des rôles qui tiennent vraiment dans le travail réel.</p>
    <div class="hero__actions">
      <a class="btn btn--light" href="#contact" data-slot="cta">Parlez-nous
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
      </a>
      <a class="btn btn--soft" href="#modele" data-slot="cta">Voir le modèle</a>
    </div>
  </div>

  <div class="pcar" id="pcar">
    <button class="pcar__pause" id="pcarToggle" type="button" aria-label="Mettre en pause le défilement">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
    </button>
    <div class="pcar__view">
      <div class="pcar__track" id="pcarTrack" data-slot="portraits">
        <figure class="pcar__card" data-slot-item><img src="https://placehold.co/600x800/b9bfc6/6c7178?text=1" alt="Portrait client" data-field="portrait"><figcaption class="pcar__name" data-field="nom">Franciszek K.</figcaption></figure>
        <figure class="pcar__card"><img src="https://placehold.co/600x800/c2c8cf/6c7178?text=2" alt="Portrait client"><figcaption class="pcar__name">Eryk W.</figcaption></figure>
        <figure class="pcar__card"><img src="https://placehold.co/600x800/b3b9c0/5e636a?text=3" alt="Portrait client"><figcaption class="pcar__name">Jessica M.</figcaption></figure>
        <figure class="pcar__card"><img src="https://placehold.co/600x800/c5cbd2/6c7178?text=4" alt="Portrait client"><figcaption class="pcar__name">Andrzej T.</figcaption></figure>
        <figure class="pcar__card"><img src="https://placehold.co/600x800/bcc2c9/6c7178?text=5" alt="Portrait client"><figcaption class="pcar__name">Marta Z.</figcaption></figure>
      </div>
    </div>
  </div>

</section>

<!-- SCRIPT — carrousel : centre actif, autoplay, clic pour activer, pause -->
<script>
  (function () {
    var view = document.querySelector('#pcar .pcar__view');
    var track = document.getElementById('pcarTrack');
    var toggle = document.getElementById('pcarToggle');
    if (!view || !track) return;
    var cards = [].slice.call(track.children);
    var n = cards.length;
    var active = Math.floor(n / 2);
    var rm = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
    var paused = false, timer;

    function layout() {
      var card = cards[active];
      var offset = card.offsetLeft + card.offsetWidth / 2 - view.clientWidth / 2;
      track.style.transform = 'translateX(' + (-offset) + 'px)';
      for (var i = 0; i < n; i++) cards[i].classList.toggle('is-active', i === active);
    }
    function go(i) { active = (i + n) % n; layout(); }
    function start() { stop(); if (!rm && !paused) timer = setInterval(function () { go(active + 1); }, 3200); }
    function stop() { clearInterval(timer); }

    cards.forEach(function (c, i) { c.addEventListener('click', function () { paused = true; setPaused(); go(i); }); });

    function setPaused() {
      toggle.setAttribute('aria-label', paused ? 'Reprendre le défilement' : 'Mettre en pause le défilement');
      toggle.innerHTML = paused
        ? '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>';
      if (paused) stop(); else start();
    }
    toggle.addEventListener('click', function () { paused = !paused; setPaused(); });

    window.addEventListener('resize', layout);
    layout();
    // recalage après chargement des images/polices
    window.addEventListener('load', layout);
    setTimeout(layout, 300);
    start();
  })();
</script>

</body>
