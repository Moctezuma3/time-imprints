<title>Hero vidéo YouTube en fond (sans habillage)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — Hero · Vidéo YouTube en fond, sans habillage
     La vidéo couvre le hero (cover + léger scale pour rogner l'UI YouTube),
     n'est pas interactive (pointer-events:none + bloqueur), et un voile sombre
     garantit la lisibilité. Re-skin rapide : bloc :root + l'ID vidéo.
     ========================================================================== -->
<style>
  /* --- 1. TOKENS ---------------------------------------------------------- */
  :root{
    --bg:#0b0f14;
    --fg:#eef2f6;
    --muted:#9aa6b2;
    --accent:#4f93d6;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
    /* sur-cadrage : agrandit la vidéo pour rogner l'habillage YouTube (titre/logo) */
    --video-scale:1.35;
  }
  /* --- 2. RESET ----------------------------------------------------------- */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  /* --- 3. LAYOUT ---------------------------------------------------------- */
  .hero{
    position:relative;min-height:100dvh;overflow:hidden;
    display:flex;align-items:center;
    background:var(--bg);color:var(--fg);font-family:var(--font);
  }

  /* fond vidéo (fallback dégradé si la vidéo ne charge pas) */
  /* pinné sur la hauteur VISIBLE (pas la hauteur du hero) → vidéo centrée sur la vue */
  .video-bg{position:absolute;top:0;left:0;width:100%;height:100dvh;z-index:0;overflow:hidden;
    background:radial-gradient(120% 120% at 70% 20%,#1b2530 0%,var(--bg) 70%)}
  .video-bg iframe{
    position:absolute;top:50%;left:50%;border:0;
    /* cover : la plus grande des deux contraintes 16:9 remplit toujours */
    width:100vw;height:56.25vw;min-width:177.78dvh;min-height:100dvh;   /* 16:9, plein-hauteur (dvh), cover */
    transform:translate(-50%,-50%);   /* centré, aucun scale/zoom */
    pointer-events:none;                     /* aucune interaction */
  }
  /* bloqueur : capte tout clic/hover pour que rien n'atteigne l'iframe */
  .video-bg__block{position:absolute;inset:0;z-index:1}
  /* voile sombre : lisibilité du contenu */
  .video-bg__veil{position:absolute;inset:0;z-index:2;
    background:linear-gradient(90deg,rgba(11,15,20,.78) 0%,rgba(11,15,20,.5) 45%,rgba(11,15,20,.25) 100%),
               linear-gradient(180deg,rgba(11,15,20,.2) 0%,rgba(11,15,20,.6) 100%)}

  .hero__inner{position:relative;z-index:3;width:100%;max-width:1180px;margin:0 auto;padding:0 6vw}
  .hero__content{max-width:40rem}

  /* --- 4. TYPOGRAPHIE ----------------------------------------------------- */
  .hero__eyebrow{font-size:.8rem;letter-spacing:.18em;text-transform:uppercase;
    color:var(--muted);margin-bottom:1.4rem;display:block}
  .hero__title{font-size:clamp(2.6rem,6vw,5rem);font-weight:700;
    line-height:1.03;letter-spacing:-.02em;margin-bottom:1.2rem}
  .hero__sub{font-size:1.1rem;line-height:1.6;color:var(--muted);
    max-width:32rem;margin-bottom:2.2rem}

  /* --- 5. ACCENT / bouton ------------------------------------------------- */
  .btn{display:inline-block;font:inherit;font-weight:500;font-size:.98rem;
    padding:.9rem 1.7rem;border-radius:.55rem;text-decoration:none;
    background:var(--accent);color:#0b0f14;
    transition:transform .25s cubic-bezier(.16,1,.3,1)}
  .btn:active{transform:translateY(1px)}
  .scrollcue{margin-top:2.4rem;font-size:.82rem;color:var(--muted);
    letter-spacing:.12em;text-transform:uppercase}

  /* --- 6. RESPONSIVE ------------------------------------------------------ */
  @media (max-width:768px){
    .hero__inner{padding-left:1.4rem;padding-right:1.4rem}
  }

  /* --- 7. ACCESSIBILITÉ : pas de vidéo auto si mouvement réduit ---------- */
  @media (prefers-reduced-motion:reduce){
    .video-bg iframe{display:none}   /* on garde le fallback dégradé + voile */
  }

  /* --- Animation d'entrée au chargement (cascade) ---------------------- */
  @keyframes heroIn{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
  .hero__eyebrow{animation:heroIn .8s cubic-bezier(.16,1,.3,1) .06s backwards}
  .hero__title{animation:heroIn .8s cubic-bezier(.16,1,.3,1) .18s backwards}
  .hero__sub{animation:heroIn .8s cubic-bezier(.16,1,.3,1) .30s backwards}
  .btn{animation:heroIn .8s cubic-bezier(.16,1,.3,1) .42s backwards}
  .scrollcue{animation:heroIn .8s cubic-bezier(.16,1,.3,1) .54s backwards}
  @media (prefers-reduced-motion:reduce){.hero__eyebrow,.hero__title,.hero__sub,.btn,.scrollcue{animation:none}}
</style>
</head>
<body>

<!-- ==========================================================================
     STRUCTURE
     ⚑ REMPLACER l'ID de la vidéo à 2 endroits ci-dessous :
        - dans src : .../embed/VIDEO_ID?...
        - dans le paramètre playlist=VIDEO_ID   (indispensable pour la boucle)
     La vidéo doit autoriser l'intégration (embed). Autoplay = muet obligatoire.
     ========================================================================== -->
<section class="hero">
  <div class="video-bg" aria-hidden="true">
    <iframe
      src="https://www.youtube-nocookie.com/embed/VIDEO_ID?autoplay=1&mute=1&loop=1&playlist=VIDEO_ID&controls=0&modestbranding=1&rel=0&disablekb=1&fs=0&playsinline=1&iv_load_policy=3&cc_load_policy=0"
      title="Vidéo de fond"
      allow="autoplay; encrypted-media"
      referrerpolicy="strict-origin-when-cross-origin"
      tabindex="-1" aria-hidden="true" loading="lazy"></iframe>
    <div class="video-bg__block"></div>
    <div class="video-bg__veil"></div>
  </div>

  <div class="hero__inner">
    <div class="hero__content">
      <span class="hero__eyebrow">Surtitre · catégorie</span>
      <h1 class="hero__title" data-slot="titre">Construisons quelque chose qui vous ressemble.</h1>
      <p class="hero__sub" data-slot="accroche">
        Quelques mots pour préciser l'intention, poser le contexte et donner
        envie d'aller plus loin sans trop en dire.
      </p>
      <a class="btn" href="#" data-slot="cta">Découvrir</a>
      <p class="scrollcue">Faites défiler &darr;</p>
    </div>
  </div>
</section>

</body>
</html>
