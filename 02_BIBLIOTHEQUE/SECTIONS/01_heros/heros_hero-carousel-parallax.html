<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- lib:meta -->
<meta name="lib:id" content="heros_hero-carousel-parallax">
<meta name="lib:groupe" content="01-header">

<meta name="lib:titre" content="Carrousel plein écran parallax">
<meta name="lib:tags" content="JS natif, carousel, parallax, clip-path">
<meta name="lib:utilite" content="Slider plein écran avec parallax sur le background de chaque slide ; slides révélées par masque/clip-path avec léger dézoom à l'activation. Drag, clavier, autoplay, dots et flèches. Portage HTML du pattern Flickity-parallax, sans dépendance.">
<meta name="lib:showcase" content="non">
<meta name="lib:secteurs" content="polyvalent">
<meta name="lib:slots" content="slides:liste:2-5">
<meta name="lib:anatomie" content="base:carrousel plein écran de 3 slides, chaque slide 1 sous-titre, 1 titre, 1 bouton, 1 image de fond; sous-titre:petit chapeau en serif italique espacé (Roboto Slab); titre:H2 en majuscules espacées (clamp 1.8 à 3rem); cta:1 bouton à bordure blanche par slide, fond plein au survol; images:1 image de fond par cellule (cover) sous un voile dégradé bleu nuit; animation:autoplay 6s, parallax du fond (background-position inverse au défilement, ratio 1/3), slide active révélée par clip-path inset depuis le bas avec dézoom de 1.14 à 1, texte en cascade à l-entrée; hover:survol du conteneur met l-autoplay en pause, flèches s-opacifient; controles:flèches prev/next SVG, dots cliquables (actif en accent rouge), drag souris et tactile, clavier flèches gauche/droite; responsive:flèches et dots réduits sous 640px; a11y:roles carousel/slide/tab, live region, reduced-motion coupe transitions et révélation">
<!-- /lib:meta -->
<title>Carrousel plein écran parallax</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto+Slab:ital,wght@0,300;1,300&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — Hero 16 · Carousel plein écran avec parallax sur les fonds
     Portage du pattern Flickity-parallax en vanilla JS : translateX de la piste
     + background-position décalé en sens inverse pour l'effet parallax.
     Drag + autoplay + clavier + dots + flèches. Aucune dépendance.
     Re-skin : modifie uniquement le bloc :root (section 1).
     ========================================================================== -->
<style>
  /* --- 1. TOKENS ---------------------------------------------------------- */
  :root{
    --bg:#000;
    --fg:#fff;
    --muted:rgba(255,255,255,.5);
    --accent:#ff0000;
    --veil-top:rgba(14,29,51,.8);
    --veil-bot:rgba(14,29,51,.2);
    --font-primary:"Montserrat",ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
    --font-secondary:"Roboto Slab",ui-serif,Georgia,serif;
  }

  /* --- 2. RESET ----------------------------------------------------------- */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-primary)}
  a{color:inherit;text-decoration:none}

  /* --- 3. LAYOUT ---------------------------------------------------------- */
  .hero-slider{
    position:relative;width:100%;height:100vh;height:100dvh;
    overflow:hidden;user-select:none;touch-action:pan-y;
  }
  .track{
    display:flex;width:100%;height:100%;
    will-change:transform;
    transition:transform .65s cubic-bezier(.22,.61,.36,1);
  }
  .track.is-dragging{transition:none;cursor:grabbing}
  .cell{
    position:relative;flex:0 0 100%;width:100%;height:100%;
    background-repeat:no-repeat;background-size:cover;
    background-position:50% 50%;
    overflow:hidden;
  }
  .overlay{
    position:absolute;inset:0;
    background:linear-gradient(to bottom,var(--veil-top),var(--veil-bot));
  }
  .inner{
    position:relative;top:50%;transform:translateY(-50%);
    text-align:center;padding:0 1.5rem;
  }
  .subtitle{
    font-family:var(--font-secondary);
    font-size:clamp(1.25rem,2.6vw,2.2rem);
    line-height:1.2;font-weight:300;font-style:italic;
    letter-spacing:.18em;color:var(--muted);
    margin-bottom:.4rem;
  }
  .title{
    font-family:var(--font-primary);
    font-size:clamp(1.8rem,4.2vw,3rem);
    line-height:1.2;text-transform:uppercase;
    letter-spacing:.18em;font-weight:700;
    margin-bottom:2.2rem;
  }
  .btn{
    display:inline-block;
    border:1px solid #fff;padding:14px 22px;
    text-transform:uppercase;font-size:.8rem;letter-spacing:.18em;
    color:#fff;transition:background .2s ease,color .2s ease;
  }
  @media (hover:hover) and (pointer:fine){
    .btn:hover{background:#fff;color:#000}
  }

  /* --- 4. CONTROLS -------------------------------------------------------- */
  .nav{
    position:absolute;top:50%;transform:translateY(-50%);
    width:80px;height:80px;
    display:grid;place-items:center;
    background:transparent;border:0;color:#fff;cursor:pointer;
    z-index:3;
  }
  .nav--prev{left:.25rem}
  .nav--next{right:.25rem}
  .nav svg{width:42px;height:42px;fill:#fff;opacity:.85;transition:opacity .2s}
  @media (hover:hover) and (pointer:fine){
    .nav:hover svg{opacity:1}
  }
  .nav:focus-visible{outline:2px solid #fff;outline-offset:4px;border-radius:4px}

  .dots{
    position:absolute;left:0;right:0;bottom:30px;
    display:flex;justify-content:center;gap:10px;
    z-index:3;
  }
  .dot{
    width:30px;height:4px;padding:0;
    background:rgba(255,255,255,.5);
    border:0;cursor:pointer;
    transition:background .25s ease;
  }
  .dot.is-selected{background:var(--accent)}
  .dot:focus-visible{outline:2px solid #fff;outline-offset:4px}

  /* --- 5. RESPONSIVE ------------------------------------------------------ */
  @media (max-width:640px){
    .nav{width:56px;height:56px}
    .nav svg{width:30px;height:30px}
    .dots{bottom:18px}
    .dot{width:22px}
  }

  /* --- 6. A11Y ------------------------------------------------------------ */
  @media (prefers-reduced-motion:reduce){
    .track{transition:none}
  }

  /* --- 7. UTIL ------------------------------------------------------------ */
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;
    overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}

  /* --- Animation d'entrée au chargement (cascade) ---------------------- */
  /* N'anime QUE le texte ; les fonds (.cell) gardent le parallax/drag JS */
  @keyframes heroIn{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
  .subtitle{animation:heroIn .8s cubic-bezier(.16,1,.3,1) .06s backwards}
  .title{animation:heroIn .8s cubic-bezier(.16,1,.3,1) .18s backwards}
  .btn{animation:heroIn .8s cubic-bezier(.16,1,.3,1) .30s backwards}
  @media (prefers-reduced-motion:reduce){.subtitle,.title,.btn{animation:none}}

  /* --- Effet D : révélation de l'image par masque/clip-path + dézoom ----- */
  /* Le clip-path et le scale s'appliquent au fond de la cellule active.    */
  /* Indépendant du background-position (parallax) et du transform du track. */
  @keyframes fxImgReveal{from{clip-path:inset(0 0 100% 0);transform:scale(1.14)}to{clip-path:inset(0 0 0 0);transform:scale(1)}}
  .cell.is-active{animation:fxImgReveal 1.1s cubic-bezier(.16,1,.3,1) .15s backwards}
  @media (prefers-reduced-motion:reduce){
    .cell.is-active{animation:none;clip-path:none;transform:none}
  }
</style>
</head>
<body>

<!-- ==========================================================================
     STRUCTURE — Carousel plein écran, 3 cellules avec image en background.
     ========================================================================== -->
<!-- COLLECTION "slides" : 1 .cell = 1 unite. L'injecteur clone la 1re .cell
     (data-slot-item) N fois et remplit les data-field. L'image est en fond CSS
     sur la cellule elle-meme (data-field="image" -> background-image / --img). -->
<section class="hero-slider" data-carousel aria-roledescription="carousel" aria-label="Présentation">

  <div class="track" data-track data-slot="slides">
    <article class="cell" style="background-image:url('https://placehold.co/1920x1280/1f2a44/eef2f6?text=Slide+1')" aria-roledescription="slide" aria-label="1 sur 3" data-slot-item data-field="image">
      <div class="overlay"></div>
      <div class="inner">
        <h3 class="subtitle" data-field="surtitre">Chapitre 1</h3>
        <h2 class="title" data-field="titre">Présentation immersive</h2>
        <a href="#" class="btn" data-field="cta">En savoir plus</a>
      </div>
    </article>
    <article class="cell" style="background-image:url('https://placehold.co/1920x1280/2a3a5c/eef2f6?text=Slide+2')" aria-roledescription="slide" aria-label="2 sur 3">
      <div class="overlay"></div>
      <div class="inner">
        <h3 class="subtitle">Chapitre 2</h3>
        <h2 class="title">Effet parallax fluide</h2>
        <a href="#" class="btn">Découvrir</a>
      </div>
    </article>
    <article class="cell" style="background-image:url('https://placehold.co/1920x1280/3a4d75/eef2f6?text=Slide+3')" aria-roledescription="slide" aria-label="3 sur 3">
      <div class="overlay"></div>
      <div class="inner">
        <h3 class="subtitle">Chapitre 3</h3>
        <h2 class="title">Plein écran, vanilla</h2>
        <a href="#" class="btn">Nous contacter</a>
      </div>
    </article>
  </div>

  <button class="nav nav--prev" data-prev aria-label="Slide précédente">
    <svg viewBox="0 0 100 100" aria-hidden="true"><polygon points="65,10 70,15 35,50 70,85 65,90 25,50"/></svg>
  </button>
  <button class="nav nav--next" data-next aria-label="Slide suivante">
    <svg viewBox="0 0 100 100" aria-hidden="true"><polygon points="35,10 30,15 65,50 30,85 35,90 75,50"/></svg>
  </button>

  <div class="dots" role="tablist" aria-label="Sélection des slides" data-dots></div>
  <p class="sr-only" aria-live="polite" data-live></p>
</section>

<!-- ==========================================================================
     SCRIPT — translateX de la piste + parallax (1/3, inverse) sur le
     background-position de chaque cellule. Drag, clavier, autoplay.
     ========================================================================== -->
<script>
(() => {
  const root = document.querySelector('[data-carousel]');
  if (!root) return;
  const track = root.querySelector('[data-track]');
  const cells = [...root.querySelectorAll('.cell')];
  const prev  = root.querySelector('[data-prev]');
  const next  = root.querySelector('[data-next]');
  const dotsBox = root.querySelector('[data-dots]');
  const live = root.querySelector('[data-live]');
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const AUTOPLAY = 6000;

  let index = 0;
  let width = root.clientWidth;
  let isDragging = false, startX = 0, dx = 0;
  let timer = null;

  cells.forEach((_, i) => {
    const b = document.createElement('button');
    b.className = 'dot';
    b.setAttribute('role','tab');
    b.setAttribute('aria-label', `Aller à la slide ${i+1}`);
    b.addEventListener('click', () => go(i, true));
    dotsBox.appendChild(b);
  });
  const dots = [...dotsBox.children];

  function applyParallax(offsetPx){
    cells.forEach((cell, i) => {
      const cellX = i * width + offsetPx;
      const bg = -cellX / 3;
      cell.style.backgroundPosition = `calc(50% + ${bg}px) 50%`;
    });
  }

  function setTransform(x, animate){
    track.style.transition = animate && !reduced
      ? 'transform .65s cubic-bezier(.22,.61,.36,1)'
      : 'none';
    track.style.transform = `translate3d(${x}px,0,0)`;
    applyParallax(x);
  }

  function revealActive(){
    // Effet D : (re)joue la révélation clip-path/scale sur la cellule active.
    // N'altère ni le transform du track, ni le background-position du parallax.
    if (reduced) return;
    cells.forEach((cell, k) => {
      if (k === index){
        cell.classList.add('is-active');
        cell.style.animation = 'none';
        void cell.offsetWidth;            // reflow → rejoue l'animation
        cell.style.animation = '';
      } else {
        cell.classList.remove('is-active');
      }
    });
  }

  function go(i, announce){
    index = (i + cells.length) % cells.length;
    setTransform(-index * width, true);
    dots.forEach((d, k) => {
      d.classList.toggle('is-selected', k === index);
      d.setAttribute('aria-selected', k === index ? 'true' : 'false');
    });
    revealActive();
    if (announce && live) live.textContent = `Slide ${index+1} sur ${cells.length}`;
    restart();
  }

  function step(dir){ go(index + dir, true); }

  function restart(){
    if (reduced) return;
    clearInterval(timer);
    timer = setInterval(() => step(1), AUTOPLAY);
  }

  function onDown(e){
    isDragging = true;
    track.classList.add('is-dragging');
    startX = (e.touches ? e.touches[0].clientX : e.clientX);
    dx = 0;
    clearInterval(timer);
  }
  function onMove(e){
    if (!isDragging) return;
    const x = (e.touches ? e.touches[0].clientX : e.clientX);
    dx = x - startX;
    setTransform(-index * width + dx, false);
  }
  function onUp(){
    if (!isDragging) return;
    isDragging = false;
    track.classList.remove('is-dragging');
    const threshold = Math.min(120, width * 0.12);
    if (dx >  threshold) step(-1);
    else if (dx < -threshold) step(1);
    else go(index, false);
  }

  track.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
  track.addEventListener('touchstart', onDown, {passive:true});
  track.addEventListener('touchmove',  onMove, {passive:true});
  track.addEventListener('touchend',   onUp);

  prev.addEventListener('click', () => step(-1));
  next.addEventListener('click', () => step(1));

  root.tabIndex = 0;
  root.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft')  { e.preventDefault(); step(-1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); step(1); }
  });

  root.addEventListener('mouseenter', () => clearInterval(timer));
  root.addEventListener('mouseleave', restart);
  root.addEventListener('focusin',  () => clearInterval(timer));
  root.addEventListener('focusout', restart);

  let r;
  window.addEventListener('resize', () => {
    clearTimeout(r);
    r = setTimeout(() => {
      width = root.clientWidth;
      setTransform(-index * width, false);
    }, 80);
  });

  go(0, false);
  restart();
})();
</script>
</body>
</html>
