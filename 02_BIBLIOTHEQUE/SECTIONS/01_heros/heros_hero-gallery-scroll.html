<title>Galerie bento qui s'assemble au scroll</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;800&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — Hero 14 · Le titre central rétrécit/disparaît au scroll pendant
     que 5 images se mettent en place et grandissent en grille bento.
     Portage HTML/JS natif d'un composant React (motion). Aucune dépendance.
     Re-skin rapide : modifie uniquement le bloc :root (section 1).
     ========================================================================== -->
<style>
  /* --- 1. TOKENS ---------------------------------------------------------- */
  :root{
    --bg:#ffffff;
    --fg:#1f2430;
    --muted:#5c6270;
    --accent:#1f2430;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
    --scroll-length:350vh;          /* + grand = animation plus lente */
    --radius:.85rem;
  }

  /* --- 2. RESET ----------------------------------------------------------- */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg)}
  img{display:block;max-width:100%}

  /* --- 3. LAYOUT (wrapper haut + scène collée) --------------------------- */
  .hgs{position:relative;width:100%;height:var(--scroll-length);
    background:var(--bg);color:var(--fg);font-family:var(--font)}
  .hgs__stage{
    position:sticky;top:0;height:100dvh;width:100%;overflow:hidden;
    padding:1rem;
  }

  /* grille bento : grand visuel + 2 colonnes droites + 2 cases basses */
  .hgs__grid{
    display:grid;gap:1rem;height:100%;width:100%;
    grid-template-columns:repeat(8,1fr);
    grid-template-rows:1fr .5fr .5fr 1fr;
  }
  .hgs__cell{
    overflow:hidden;border-radius:var(--radius);
    box-shadow:0 18px 40px -18px rgba(0,0,0,.35);
    will-change:transform;
  }
  .hgs__cell img{width:100%;height:100%;object-fit:cover;object-position:center}
  .hgs__cell:nth-child(1){grid-column:1/7;grid-row:1/4;transform-origin:top right}
  .hgs__cell:nth-child(2){grid-column:7/9;grid-row:1/3}
  .hgs__cell:nth-child(3){grid-column:7/9;grid-row:3/5;transform-origin:bottom right}
  .hgs__cell:nth-child(4){grid-column:1/4;grid-row:4/5;transform-origin:top right}
  .hgs__cell:nth-child(5){grid-column:4/7;grid-row:4/5}

  /* bloc titre centré, posé au-dessus de la galerie */
  .hgs__center{
    position:absolute;left:50%;top:50%;translate:-50% -50%;
    z-index:10;text-align:center;width:min(92vw,40rem);
    will-change:transform,opacity;
  }

  /* --- 4. TYPOGRAPHIE ----------------------------------------------------- */
  .hgs__title{font-size:clamp(2.4rem,6vw,3.6rem);font-weight:800;
    line-height:1.04;letter-spacing:-.03em;margin-bottom:1.3rem}
  .hgs__sub{font-size:1.05rem;line-height:1.6;color:var(--muted);
    max-width:34rem;margin:0 auto 2rem}

  /* --- 5. ACCENT / boutons ------------------------------------------------ */
  .hgs__actions{display:flex;align-items:center;justify-content:center;
    gap:1rem;flex-wrap:wrap}
  .btn{font:inherit;font-weight:600;font-size:.98rem;padding:.8rem 1.7rem;
    border-radius:.55rem;text-decoration:none;cursor:pointer;
    border:1px solid transparent;
    transition:transform .25s cubic-bezier(.16,1,.3,1),opacity .25s}
  .btn:active{transform:translateY(1px)}
  .btn--primary{background:var(--accent);color:#fff}
  .btn--primary:hover{opacity:.9}
  .btn--link{background:transparent;color:var(--fg);
    text-decoration:underline;text-underline-offset:4px}

  /* --- 6. RESPONSIVE ------------------------------------------------------ */
  @media (max-width:767px){
    .hgs__grid{grid-template-columns:repeat(2,1fr);
      grid-template-rows:1.4fr .6fr}
    .hgs__cell:nth-child(1){grid-column:1/3;grid-row:1/2}
    .hgs__cell:nth-child(2),.hgs__cell:nth-child(3){display:none}
    .hgs__cell:nth-child(4){grid-column:1/2;grid-row:2/3}
    .hgs__cell:nth-child(5){grid-column:2/3;grid-row:2/3}
  }

  /* --- 7. ACCESSIBILITÉ : pas d'animation = état final lisible -----------
     Galerie assemblée + titre visible, sans hauteur de scroll factice. */
  @media (prefers-reduced-motion:reduce){
    .hgs{height:100dvh}
    .hgs__stage{position:relative}
    .hgs__cell,.hgs__center{translate:none;scale:none;opacity:1}
    .hgs__center{position:absolute;left:50%;top:50%;translate:-50% -50%}
  }

  /* --- Animation d'entrée au chargement (cascade) ----------------------
     Le parent .hgs__center est piloté par le scroll (scale/opacity) : on
     anime donc ses enfants texte, qui eux ne sont pas touchés par le JS. */
  @keyframes heroIn{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
  .hgs__title{animation:heroIn .8s cubic-bezier(.16,1,.3,1) .06s backwards}
  .hgs__sub{animation:heroIn .8s cubic-bezier(.16,1,.3,1) .18s backwards}
  .hgs__actions{animation:heroIn .8s cubic-bezier(.16,1,.3,1) .30s backwards}
  @media (prefers-reduced-motion:reduce){.hgs__title,.hgs__sub,.hgs__actions{animation:none}}
</style>
</head>
<body>

<!-- ==========================================================================
     STRUCTURE — contenu à personnaliser
       5 images (placehold.co) + le bloc titre. Plus on scrolle, plus la
       galerie se met en place et le titre s'efface.
     ========================================================================== -->
<div class="hgs" id="hgs">
  <div class="hgs__stage">

    <div class="hgs__grid" id="grid" data-slot="visuel">
      <div class="hgs__cell" data-slot-item><img src="https://placehold.co/1400x1000" alt="Image de remplacement" data-field="image"></div>
      <div class="hgs__cell"><img src="https://placehold.co/800x1200" alt="Image de remplacement"></div>
      <div class="hgs__cell"><img src="https://placehold.co/800x1200" alt="Image de remplacement"></div>
      <div class="hgs__cell"><img src="https://placehold.co/900x700" alt="Image de remplacement"></div>
      <div class="hgs__cell"><img src="https://placehold.co/900x700" alt="Image de remplacement"></div>
    </div>

    <div class="hgs__center" id="center">
      <h1 class="hgs__title" data-slot="titre">Construisons quelque chose qui vous ressemble.</h1>
      <p class="hgs__sub" data-slot="accroche">
        Quelques mots pour préciser l'intention, poser le contexte et donner
        envie d'aller plus loin sans trop en dire.
      </p>
      <div class="hgs__actions">
        <a class="btn btn--primary" href="#" data-slot="cta">Découvrir</a>
        <a class="btn btn--link" href="#" data-slot="cta">En savoir plus</a>
      </div>
    </div>

  </div>
</div>

<!-- ==========================================================================
     SCRIPT — progression du scroll → translate/scale des cases + fondu titre
     (JS natif, transform/opacity, scroll écouté via requestAnimationFrame)
     ========================================================================== -->
<script>
  (function () {
    var rm = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
    if (rm) return;                                  // état final figé (CSS)

    var wrap   = document.getElementById('hgs');
    var cells  = [].slice.call(document.querySelectorAll('.hgs__cell'));
    var center = document.getElementById('center');
    var ticking = false;

    // remappe p depuis [inMin,inMax] vers [outMin,outMax], borné 0..1
    function mr (p, inMin, inMax, outMin, outMax) {
      var t = (p - inMin) / (inMax - inMin);
      t = t < 0 ? 0 : t > 1 ? 1 : t;
      return outMin + (outMax - outMin) * t;
    }

    function update () {
      var rect = wrap.getBoundingClientRect();
      var scrollable = rect.height - window.innerHeight;
      var p = scrollable > 0 ? Math.min(1, Math.max(0, -rect.top / scrollable)) : 0;

      // cases : glissent de -35% → 0% [0.1,0.9] et grandissent 0.5 → 1 [0,0.9]
      var tx = mr(p, 0.1, 0.9, -35, 0) + '%';
      var sc = mr(p, 0, 0.9, 0.5, 1);
      for (var i = 0; i < cells.length; i++) {
        cells[i].style.translate = tx;
        cells[i].style.scale = sc;
      }

      // titre : rétrécit et s'efface sur la première moitié du scroll
      var cScale = mr(p, 0, 0.5, 1, 0);
      var cOp    = mr(p, 0, 0.5, 1, 0);
      center.style.scale = cScale;
      center.style.opacity = cOp;
      center.style.pointerEvents = cOp < 0.05 ? 'none' : 'auto';

      ticking = false;
    }

    window.addEventListener('scroll', function () {
      if (!ticking) { ticking = true; requestAnimationFrame(update); }
    }, { passive: true });
    window.addEventListener('resize', update);
    update();
  })();
</script>

</body>
</html>
