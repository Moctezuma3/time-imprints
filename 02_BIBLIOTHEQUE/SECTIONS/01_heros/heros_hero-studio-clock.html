<meta name="lib:utilite" content="Hero d'agence/studio créatif : wordmark géant en bas, ligne méta (lieu + fuseau + heure locale qui défile en direct) et indice de scroll. Très éditorial. JS natif (horloge).">
<meta name="lib:showcase" content="non">
<meta name="lib:secteurs" content="agence, premium, tech">
<meta name="lib:slots" content="marque:titre:court; accroche:texte:moyen; lieu:ligne:court; fuseau:ligne:court">

<!-- /lib:meta -->
<title>Studio éditorial + horloge en direct</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — Hero · Studio éditorial. Wordmark géant aligné en bas, ligne méta
     avec heure locale live. Re-skin : bloc :root (1). JS natif (horloge).
     ========================================================================== -->
<style>
  /* 1. Tokens ------------------------------------------------------------ */
  :root{
    --bg:#f4f2ec;--fg:#17150f;--muted:#6b675c;--line:#ddd9cf;
    --accent:#d8493a;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
    --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
    --maxw:88rem;--ease:cubic-bezier(.16,1,.3,1);
  }
  /* 2. Reset ------------------------------------------------------------- */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font);line-height:1.5;-webkit-font-smoothing:antialiased}

  /* 3. Layout ------------------------------------------------------------ */
  .hero{min-height:100svh;max-width:var(--maxw);margin:0 auto;
    padding:1.6rem clamp(1.1rem,4vw,3rem) clamp(1.6rem,4vw,2.6rem);
    display:flex;flex-direction:column;justify-content:space-between;gap:2rem}

  .hero__top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem}
  .hero__eyebrow{font-size:.8rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .hero__cue{display:inline-flex;align-items:center;gap:.45rem;font-size:.8rem;font-weight:600;
    letter-spacing:.12em;text-transform:uppercase;color:var(--fg)}
  .hero__cue svg{width:1rem;height:1rem;animation:bob 1.8s var(--ease) infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}

  /* 4. Wordmark + tagline ------------------------------------------------ */
  .hero__main{margin-top:auto}
  .hero__tag{max-width:34ch;margin:0 0 1.4rem .2rem;font-size:clamp(1.05rem,1.8vw,1.4rem);
    font-weight:400;color:var(--muted);line-height:1.45}
  .hero__word{font-size:clamp(3.6rem,19vw,14rem);font-weight:900;letter-spacing:-.045em;
    line-height:.86;text-transform:lowercase}
  .hero__word .dot{color:var(--accent)}

  /* 5. Méta + horloge ---------------------------------------------------- */
  .hero__meta{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;
    border-top:1px solid var(--line);padding-top:1.1rem}
  .hero__meta .cell span{display:block;font-size:.72rem;font-weight:600;letter-spacing:.12em;
    text-transform:uppercase;color:var(--muted);margin-bottom:.3rem}
  .hero__meta .cell b{font-size:1.05rem;font-weight:600;font-variant-numeric:tabular-nums}
  .hero__meta .cell.is-live b{font-family:var(--mono);display:inline-flex;align-items:center;gap:.5rem}
  .hero__meta .dotlive{width:.5rem;height:.5rem;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 0 rgba(216,73,58,.55);animation:pulse 2s var(--ease) infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(216,73,58,.5)}70%{box-shadow:0 0 0 .5rem rgba(216,73,58,0)}100%{box-shadow:0 0 0 0 rgba(216,73,58,0)}}

  /* 6. Entrée au chargement --------------------------------------------- */
  @keyframes heroIn{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
  .hero__tag{animation:heroIn .8s var(--ease) .05s backwards}
  .hero__word{animation:heroIn .9s var(--ease) .15s backwards}
  .hero__meta{animation:heroIn .8s var(--ease) .32s backwards}

  /* 7. Responsive / accessibilité --------------------------------------- */
  @media (max-width:640px){
    .hero__meta{grid-template-columns:1fr;gap:.7rem}
    .hero__cue span{display:none}
  }
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>

<!-- ==========================================================================
     STRUCTURE — remplacez le wordmark, la baseline et le fuseau (data-tz =
     identifiant IANA, ex. "Europe/Zurich"). L'heure se met à jour seule.
     ========================================================================== -->
<section class="hero">

  <div class="hero__top">
    <span class="hero__eyebrow">Studio créatif — depuis 2014</span>
    <span class="hero__cue"><span>Défiler</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M6 13l6 6 6-6"/></svg>
    </span>
  </div>

  <div class="hero__main">
    <p class="hero__tag" data-slot="accroche">On conçoit des identités et des expériences soignées, pensées jusque dans le moindre détail.</p>
    <h1 class="hero__word" data-slot="marque">studio<span class="dot" data-keep>.</span></h1>
  </div>

  <!-- NOTE fuseau : "UTC +1" est l'affichage (slot). Aligner aussi l'attribut
       data-tz (IANA, ex. Europe/Zurich) sur <time id="hsc-clock"> pour l'horloge live. -->
  <div class="hero__meta">
    <div class="cell"><span>Lieu</span><b data-slot="lieu">Lausanne, CH</b></div>
    <div class="cell"><span>Fuseau</span><b data-slot="fuseau">UTC +1</b></div>
    <div class="cell is-live"><span>Heure locale</span><b><span class="dotlive" aria-hidden="true"></span><time id="hsc-clock" data-tz="Europe/Zurich">--:--:--</time></b></div>
  </div>

</section>

<!-- SCRIPT — horloge locale (fuseau via data-tz) -->
<script>
  (function () {
    var el = document.getElementById('hsc-clock');
    if (!el) return;
    var tz = el.getAttribute('data-tz') || undefined;
    var fmt;
    try { fmt = new Intl.DateTimeFormat('fr-CH', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false, timeZone: tz }); }
    catch (e) { fmt = new Intl.DateTimeFormat('fr-CH', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }); }
    function tick(){ el.textContent = fmt.format(new Date()); }
    tick(); setInterval(tick, 1000);
  })();
</script>

</body>
</html>
