<title>Rotation de mots (fondu)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — Hero avancer 06 · Un mot du titre change toutes les 2 s (fade + slide
     up). Pattern « agence à offres multiples ». JS natif + animation CSS.
     ========================================================================== -->
<style>
  :root{
    --bg:#fbfbfa;--fg:#16181d;--muted:#5c6270;--accent:#16181d;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,sans-serif;
    --ease:cubic-bezier(.22,1,.36,1);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  a{color:inherit;text-decoration:none}

  .hero{
    min-height:100dvh;background:var(--bg);color:var(--fg);
    font-family:var(--font);
    display:flex;align-items:center;justify-content:center;
    padding:clamp(2rem,7vh,4rem) clamp(1.4rem,5vw,3rem);text-align:center}
  .hero__inner{max-width:54rem}

  .hero__eyebrow{font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;
    color:var(--muted);display:inline-block;margin-bottom:1.4rem}

  .hero__title{font-size:clamp(2.4rem,6vw,4.5rem);font-weight:800;
    letter-spacing:-.03em;line-height:1.1}

  /* zone du mot variable : inline-flex, hauteur fixée par ligne pour éviter
     le reflow vertical à chaque changement */
  .rotator{
    position:relative;display:inline-flex;align-items:baseline;
    height:1.1em;overflow:hidden;vertical-align:bottom}
  .rotator__word{
    display:inline-block;color:var(--accent);
    animation:slideUp .5s var(--ease)}
  @keyframes slideUp{
    from{transform:translateY(110%);opacity:0}
    to  {transform:translateY(0);opacity:1}
  }

  .hero__sub{margin:1.4rem auto 0;color:var(--muted);font-size:1.05rem;
    line-height:1.6;max-width:32rem}

  .hero__btn{
    display:inline-flex;align-items:center;gap:.5rem;
    margin-top:2rem;padding:.95rem 1.6rem;border-radius:.55rem;
    background:var(--accent);color:#f4f4f0;font-weight:600;font-size:.95rem;
    transition:transform .2s var(--ease)}
  .hero__btn:hover{transform:translateY(-2px)}
  .hero__btn svg{width:1rem;height:1rem}

  @media (prefers-reduced-motion:reduce){
    .rotator__word{animation:none}
    .hero__btn{transition:none}
  }

  /* --- Animation d'entrée au chargement (cascade ressort, effet J) ------ */
  /* État caché UNIQUEMENT dans le from{} ; le repos reste visible (backwards). */
  /* fxRise est posé sur le CONTENEUR du titre (.hero__title), PAS sur
     .rotator__word qui garde sa propre transform (slideUp) — pas de conflit. */
  @keyframes fxRise{from{opacity:0;transform:translateY(60px)}to{opacity:1;transform:translateY(0)}}
  .hero__eyebrow{animation:fxRise .85s cubic-bezier(.34,1.56,.64,1) .06s backwards}
  .hero__title{animation:fxRise .85s cubic-bezier(.34,1.56,.64,1) .18s backwards}
  .hero__sub{animation:fxRise .85s cubic-bezier(.34,1.56,.64,1) .30s backwards}
  .hero__btn{animation:fxRise .85s cubic-bezier(.34,1.56,.64,1) .42s backwards}
  @media (prefers-reduced-motion:reduce){.hero__eyebrow,.hero__title,.hero__sub,.hero__btn{animation:none}}
</style>
</head>
<body>

<section class="hero">
  <div class="hero__inner">

    <span class="hero__eyebrow">Studio créatif</span>

    <h1 class="hero__title" data-slot="titre">
      On vous accompagne en
      <span class="rotator" data-keep><span class="rotator__word" id="word" data-words="branding|stratégie|design|motion|édito">branding</span></span>.
    </h1>

    <p class="hero__sub" data-slot="accroche">Une équipe pluridisciplinaire pour porter votre projet de bout en bout. Texte à remplacer.</p>

    <a href="#" class="hero__btn" data-slot="cta">
      Démarrer un projet
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>

  </div>
</section>

<script>
  (function () {
    var el = document.getElementById('word');
    var rm = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
    if (rm) return;
    var words = el.dataset.words.split('|');
    var i = 0;
    setInterval(function () {
      i = (i + 1) % words.length;
      /* relance l'animation slideUp en remplaçant l'élément (force restart) */
      el.style.animation = 'none';
      void el.offsetWidth;
      el.style.animation = '';
      el.textContent = words[i];
    }, 2000);
  })();
</script>

</body>
</html>
