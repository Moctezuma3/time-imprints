<title>Badge — Note + étoiles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — Badge · Note + étoiles (isolé, sans hero). CSS pur.
     ========================================================================== -->
<style>
  /* 1. Tokens ------------------------------------------------------------ */
  :root{
    --bg:#edeff2;--surface:#ffffff;--fg:#16181d;--muted:#5c6270;
    --accent:#3b6ef5;--star:#f5a623;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,sans-serif;
  }
  /* 2. Reset ------------------------------------------------------------- */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  img{display:block;max-width:100%}
  body{background:var(--bg);color:var(--fg);font-family:var(--font);line-height:1.5}
  /* 3. Stage (badge isolé, centré) -------------------------------------- */
  .stage{min-height:100vh;display:grid;place-items:center;padding:3rem 1.4rem}
  /* 4. LE BADGE ---------------------------------------------------------- */
  .badge{display:inline-flex;align-items:center;gap:.55rem;
    background:rgba(255,255,255,.95);color:var(--fg);border-radius:2rem;
    padding:.5rem .9rem;box-shadow:0 8px 24px -12px rgba(0,0,0,.4);font-size:.85rem}
  .badge .stars{display:inline-flex;gap:.05rem}
  .badge .stars svg{width:.95rem;height:.95rem;fill:var(--star)}
  .badge b{font-weight:700}
  .badge span{color:var(--muted)}
  /* 7. Accessibilité ----------------------------------------------------- */
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:2rem}
  /* 8. Animation d'entrée au chargement --------------------------------- */
  @keyframes secIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
  .badge{animation:secIn .6s cubic-bezier(.16,1,.3,1) .05s backwards}
  @media (prefers-reduced-motion:reduce){.badge{animation:none}}
</style>
</head>
<body>

<!-- ==========================================================================
     STRUCTURE — badge isolé, centré. Réutilisez le <span class="badge">
     (positionnez-le où vous voulez sur votre propre hero : top-left/right…).
     ========================================================================== -->
<section class="stage">
  <span class="badge" aria-label="Note 4,9 sur 5 — 428 avis">
    <span class="stars" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="m12 3 2.6 5.3 5.9.9-4.3 4.1 1 5.9L12 16.4 6.8 19.2l1-5.9L3.5 9.2l5.9-.9z"/></svg>
      <svg viewBox="0 0 24 24"><path d="m12 3 2.6 5.3 5.9.9-4.3 4.1 1 5.9L12 16.4 6.8 19.2l1-5.9L3.5 9.2l5.9-.9z"/></svg>
      <svg viewBox="0 0 24 24"><path d="m12 3 2.6 5.3 5.9.9-4.3 4.1 1 5.9L12 16.4 6.8 19.2l1-5.9L3.5 9.2l5.9-.9z"/></svg>
      <svg viewBox="0 0 24 24"><path d="m12 3 2.6 5.3 5.9.9-4.3 4.1 1 5.9L12 16.4 6.8 19.2l1-5.9L3.5 9.2l5.9-.9z"/></svg>
      <svg viewBox="0 0 24 24"><path d="m12 3 2.6 5.3 5.9.9-4.3 4.1 1 5.9L12 16.4 6.8 19.2l1-5.9L3.5 9.2l5.9-.9z"/></svg>
    </span>
    <b data-slot="note">4,9/5</b><span data-slot="avis">· 428 avis</span>
  </span>
</section>

</body>
