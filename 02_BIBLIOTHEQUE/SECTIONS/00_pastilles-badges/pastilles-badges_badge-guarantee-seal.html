<!-- /lib:meta -->
<title>Badge — Sceau de garantie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — Badge · Sceau de garantie (isolé, sans hero). CSS pur,
     texte courbé via SVG <textPath>.
     ========================================================================== -->
<style>
  :root{--bg:#edeff2;--fg:#16181d;--accent:#1f6fb2;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,sans-serif;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  img{display:block;max-width:100%}
  body{background:var(--bg);color:var(--fg);font-family:var(--font);line-height:1.5}
  .stage{min-height:100vh;display:grid;place-items:center;padding:3rem 1.4rem}
  /* LE BADGE (sceau) */
  .seal{width:6.2rem;height:6.2rem;filter:drop-shadow(0 10px 20px rgba(0,0,0,.25))}
  .seal svg{width:100%;height:100%}
  .seal .ring{fill:#fff}
  .seal .ring2{fill:none;stroke:var(--accent);stroke-width:1.2;opacity:.5}
  .seal .curve{fill:var(--accent);font-size:7.2px;font-weight:800;letter-spacing:.6px;text-transform:uppercase}
  .seal .big{fill:var(--accent);font-size:15px;font-weight:800;text-anchor:middle}
  .seal .small{fill:var(--accent);font-size:6px;font-weight:600;text-anchor:middle;letter-spacing:.5px;text-transform:uppercase}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:50%}
  /* --- Animation d'entrée au chargement ------------------------------- */
  @keyframes secIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
  .seal{animation:secIn .6s cubic-bezier(.16,1,.3,1) .05s backwards}
  @media (prefers-reduced-motion:reduce){.seal{animation:none}}
</style>
</head>
<body>
<!-- STRUCTURE — sceau isolé, centré. Réutilisez le <span class="seal">.
     Changez le texte courbé (#sealPath) et le « 5 ans ». -->
<section class="stage">
  <span class="seal" role="img" aria-label="Garantie 5 ans">
    <svg viewBox="0 0 100 100">
      <circle class="ring" cx="50" cy="50" r="48"/>
      <circle class="ring2" cx="50" cy="50" r="42"/>
      <defs><path id="sealPath" d="M50,50 m-36,0 a36,36 0 1,1 72,0 a36,36 0 1,1 -72,0"/></defs>
      <text class="curve"><textPath href="#sealPath" startOffset="2%">· garantie · garantie · garantie · garantie ·</textPath></text>
      <text class="big" x="50" y="52" data-slot="label">5 ans</text>
      <text class="small" x="50" y="63">pièces &amp; main d'œuvre</text>
    </svg>
  </span>
</section>
</body>
</html>
