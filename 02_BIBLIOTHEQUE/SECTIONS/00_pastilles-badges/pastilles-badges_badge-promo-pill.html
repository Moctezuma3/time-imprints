<!-- ==========================================================================
     STYLE — Badge · Promo pastille (isolé, sans hero). CSS pur.
     ========================================================================== -->
<style>
  :root{--bg:#edeff2;--fg:#16181d;--accent:#e4572e;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,sans-serif;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  img{display:block;max-width:100%}
  body{background:var(--bg);color:var(--fg);font-family:var(--font);line-height:1.5}
  .stage{min-height:100vh;display:grid;place-items:center;padding:3rem 1.4rem}
  /* LE BADGE (pastille promo, légèrement inclinée) */
  .badge{position:relative;width:4.6rem;height:4.6rem;border-radius:50%;
    background:var(--accent);color:#fff;display:grid;place-items:center;text-align:center;line-height:1;
    transform:rotate(-12deg);box-shadow:0 10px 24px -10px rgba(228,87,46,.7);overflow:hidden}
  .badge b{font-size:1.25rem;font-weight:800}
  .badge small{display:block;font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-top:.1rem}
  .badge::after{content:"";position:absolute;top:0;left:-60%;width:40%;height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.55),transparent);
    transform:skewX(-20deg);animation:shine 3.2s ease-in-out infinite}
  @keyframes shine{0%,60%{left:-60%}80%,100%{left:130%}}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:50%}
  @media (prefers-reduced-motion:reduce){.badge::after{animation:none;display:none}}
  /* --- Animation d'entrée au chargement (le shine reste sur ::after) --- */
  @keyframes secIn{from{opacity:0;transform:translateY(22px) rotate(-12deg)}to{opacity:1;transform:translateY(0) rotate(-12deg)}}
  .badge{animation:secIn .6s cubic-bezier(.16,1,.3,1) .05s backwards}
  @media (prefers-reduced-motion:reduce){.badge{animation:none}}
</style>
</head>
<body>
<!-- STRUCTURE — pastille promo isolée, centrée. Réutilisez le <span class="badge">. -->
<section class="stage">
  <span class="badge" aria-label="Moins 20 pour cent ce mois"><b data-slot="label">−20%</b><small>ce mois</small></span>
</section>
</body>
