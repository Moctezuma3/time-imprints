<meta name="lib:utilite" content="Carte flottante posée sur un hero : pile d'avatars + chiffre fort (« +2 500 clients », « 12 ans d'expérience »). Preuve sociale visuelle. CSS pur.">

<title>Badge — Chiffre flottant + avatars</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — Badge · Chiffre flottant + avatars (isolé, sans hero). CSS pur.
     ========================================================================== -->
<style>
  :root{--bg:#edeff2;--surface:#ffffff;--fg:#16181d;--muted:#5c6270;--accent:#3b6ef5;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,sans-serif;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  img{display:block;max-width:100%}
  body{background:var(--bg);color:var(--fg);font-family:var(--font);line-height:1.5}
  .stage{min-height:100vh;display:grid;place-items:center;padding:3rem 1.4rem}
  /* LE BADGE (carte flottante) */
  .badge{display:flex;align-items:center;gap:.7rem;
    background:rgba(255,255,255,.96);border-radius:.9rem;padding:.6rem .9rem;
    box-shadow:0 12px 30px -14px rgba(0,0,0,.45)}
  .badge .avatars{display:flex}
  .badge .avatars img{width:1.9rem;height:1.9rem;border-radius:50%;border:2px solid #fff;object-fit:cover;background:#dfe3ea;margin-left:-.55rem}
  .badge .avatars img:first-child{margin-left:0}
  .badge .info b{display:block;font-size:1.05rem;font-weight:800;letter-spacing:-.02em;line-height:1}
  .badge .info span{font-size:.78rem;color:var(--muted)}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:.9rem}
  /* --- Animation d'entrée au chargement ------------------------------- */
  @keyframes secIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
  .badge{animation:secIn .6s cubic-bezier(.16,1,.3,1) .05s backwards}
  @media (prefers-reduced-motion:reduce){.badge{animation:none}}
</style>
</head>
<body>
<!-- STRUCTURE — carte flottante isolée, centrée. Réutilisez le <span class="badge">. -->
<section class="stage">
  <span class="badge">
    <span class="avatars" aria-hidden="true" data-slot="avatars">
      <img src="https://placehold.co/64x64?text=1" alt="" data-slot-item data-field="image">
      <img src="https://placehold.co/64x64?text=2" alt="">
      <img src="https://placehold.co/64x64?text=3" alt="">
      <img src="https://placehold.co/64x64?text=4" alt="">
    </span>
    <span class="info"><b data-slot="valeur">+2 500</b><span data-slot="label">clients accompagnés</span></span>
  </span>
</section>
</body>
</html>
