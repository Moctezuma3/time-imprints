<title>Badge — Récompense (laurier)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — Badge · Récompense laurier (isolé, sans hero). CSS pur.
     ========================================================================== -->
<style>
  :root{--bg:#edeff2;--fg:#16181d;--accent:#b8860b;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,sans-serif;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  img{display:block;max-width:100%}
  body{background:var(--bg);color:var(--fg);font-family:var(--font);line-height:1.5}
  .stage{min-height:100vh;display:grid;place-items:center;padding:3rem 1.4rem}
  /* LE BADGE (laurier) */
  .badge{display:inline-flex;align-items:center;gap:.35rem;
    color:var(--accent);font-weight:800;letter-spacing:.02em;text-align:center}
  .badge svg{width:2.6rem;height:2.8rem;fill:currentColor;flex:none}
  .badge .txt{font-size:.78rem;line-height:1.1;max-width:5.5rem}
  .badge .txt b{display:block;font-size:1.05rem}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px}
  /* --- Animation d'entrée au chargement ------------------------------- */
  @keyframes secIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
  .badge{animation:secIn .6s cubic-bezier(.16,1,.3,1) .05s backwards}
  @media (prefers-reduced-motion:reduce){.badge{animation:none}}
</style>
</head>
<body>
<!-- STRUCTURE — badge laurier isolé, centré. Réutilisez le <span class="badge">. -->
<section class="stage">
  <span class="badge">
    <svg viewBox="0 0 24 28" aria-hidden="true"><path d="M7 3c-2 2-3 5-3 9 0 5 3 9 4 10-3-2-5-6-5-10 0-4 2-7 4-9zm10 0c2 2 4 5 4 9 0 4-2 8-5 10 1-1 4-5 4-10 0-4-1-7-3-9z"/></svg>
    <span class="txt" data-slot="label"><b>N°1</b>élu 2026</span>
    <svg viewBox="0 0 24 28" aria-hidden="true" style="transform:scaleX(-1)"><path d="M7 3c-2 2-3 5-3 9 0 5 3 9 4 10-3-2-5-6-5-10 0-4 2-7 4-9zm10 0c2 2 4 5 4 9 0 4-2 8-5 10 1-1 4-5 4-10 0-4-1-7-3-9z"/></svg>
  </span>
</section>
</body>
