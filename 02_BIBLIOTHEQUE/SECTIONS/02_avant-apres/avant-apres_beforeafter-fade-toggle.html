<title>Bascule avant / après en fondu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — Avant/Après · Bascule en fondu : image avant/après superposées,
     fondu au clic. JS natif, un seul accent. Images à remplacer.
     ========================================================================== -->
<style>
  /* 1. Tokens ------------------------------------------------------------ */
  :root{
    --bg:#fbfbfa;--surface:#ffffff;--fg:#16181d;--muted:#5c6270;--line:#e9e9e4;
    --accent:#3b6ef5;--accent-soft:rgba(59,110,245,.1);
    --maxw:56rem;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  /* 2. Reset ------------------------------------------------------------- */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  button{font:inherit;cursor:pointer}
  img{display:block;max-width:100%}
  body{background:var(--bg);color:var(--fg);font-family:var(--font);line-height:1.6}
  /* 3. Layout ------------------------------------------------------------ */
  .wrap{max-width:var(--maxw);margin:0 auto;padding:clamp(3.5rem,8vw,6rem) clamp(1.4rem,5vw,3rem);text-align:center}
  .stage{position:relative;border-radius:1.3rem;overflow:hidden;aspect-ratio:16/10;background:#e6e8ec;
    margin:1.6rem 0 1.4rem;border:1px solid var(--line)}
  .stage img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .stage__after{opacity:0;transition:opacity .6s var(--ease)}
  .stage.is-after .stage__after{opacity:1}
  .label{position:absolute;top:.9rem;left:.9rem;background:rgba(22,24,29,.8);color:#fff;
    font-size:.74rem;font-weight:700;letter-spacing:.04em;padding:.35rem .8rem;border-radius:99px;
    transition:background .3s var(--ease)}
  .stage.is-after .label{background:var(--accent)}
  .toggle{display:inline-flex;align-items:center;gap:.6rem;background:var(--accent);color:#fff;border:0;
    font-weight:600;padding:.8rem 1.5rem;border-radius:.7rem;transition:.3s var(--ease)}
  /* 4. Typographie ------------------------------------------------------- */
  .eyebrow{font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:600}
  .wrap h2{font-size:clamp(1.7rem,3.6vw,2.4rem);font-weight:800;letter-spacing:-.025em;margin-top:.5rem}
  .wrap>p{color:var(--muted);margin-top:.6rem}
  /* 5. Accent / hover ---------------------------------------------------- */
  @media (hover:hover) and (pointer:fine){
    .toggle:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(59,110,245,.3)}
  }
  /* 6. Responsive -------------------------------------------------------- */
  @media (max-width:520px){.stage{aspect-ratio:4/3}}
  /* 7. Accessibilité ----------------------------------------------------- */
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

  /* --- Animation d'entrée au chargement (cascade) ---------------------- */
  @keyframes baIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
  .eyebrow,.wrap h2,.wrap>p{animation:baIn .7s cubic-bezier(.16,1,.3,1) .05s backwards}
  .wrap h2{animation-delay:.12s}
  .wrap>p{animation-delay:.19s}
  .stage{animation:baIn .7s cubic-bezier(.16,1,.3,1) .26s backwards}
  .toggle{animation:baIn .7s cubic-bezier(.16,1,.3,1) .34s backwards}
  @media (prefers-reduced-motion:reduce){.eyebrow,.wrap h2,.wrap>p,.stage,.toggle{animation:none}}
</style>
</head>
<body>

<!-- ==========================================================================
     STRUCTURE — bascule en fondu. Remplacez les deux images (avant/après) ;
     le bouton (ou la barre espace) alterne l'affichage.
     ========================================================================== -->
<section class="wrap" aria-labelledby="t">
  <span class="eyebrow">Notre chantier phare</span>
  <h2 id="t" data-slot="titre">Avant… et après</h2>
  <p>Une seule image, deux états. À vous de basculer.</p>

  <div class="stage" id="stage" data-slot="paires" data-slot-item>
    <span class="label" id="label" data-keep>Avant</span>
    <img src="https://placehold.co/900x560/cfd4dd/6b7280?text=Avant" alt="Le projet avant travaux" loading="lazy" data-field="avant">
    <img class="stage__after" src="https://placehold.co/900x560/3b6ef5/ffffff?text=Apres" alt="Le projet après travaux" loading="lazy" data-field="apres">
  </div>

  <button class="toggle" id="toggle" aria-pressed="false">Voir l'après</button>
</section>

<!-- SCRIPT — bascule avant/après en fondu -->
<script>
  (function () {
    var stage = document.getElementById('stage'),
        btn = document.getElementById('toggle'),
        label = document.getElementById('label');
    function flip(){
      var on = stage.classList.toggle('is-after');
      btn.setAttribute('aria-pressed', on ? 'true' : 'false');
      btn.textContent = on ? 'Revoir l’avant' : 'Voir l’après';
      label.textContent = on ? 'Après' : 'Avant';
    }
    btn.addEventListener('click', flip);
    btn.addEventListener('keydown', function (e){ if (e.key === ' ') { e.preventDefault(); flip(); } });
  })();
</script>

</body>
</html>
