<!-- ==========================================================================
     STYLE — Avant / Après · Grille de paires
     Plusieurs transformations avant/après en grille : chaque carte montre une
     mini-paire étiquetée + son intitulé. Idéal galerie de chantiers /
     réalisations. 100 % CSS. Images placeholder à remplacer.
     ========================================================================== -->
<style>
  /* 1. Tokens ------------------------------------------------------------ */
  :root{
    --bg:#fbfbfa;--surface:#ffffff;--fg:#16181d;--muted:#5c6270;
    --line:#e6e6e2;--accent:#3b6ef5;--after:#1f9d63;
    --maxw:74rem;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  /* 2. Reset ------------------------------------------------------------- */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font);line-height:1.5}
  img{display:block;max-width:100%;height:auto}

  /* 3. Layout ------------------------------------------------------------ */
  .wrap{max-width:var(--maxw);margin:0 auto;padding:4.5rem 1.4rem}
  .head{text-align:center;max-width:38rem;margin:0 auto 2.4rem}
  .head .eyebrow{font-size:.8rem;font-weight:700;letter-spacing:.07em;
    text-transform:uppercase;color:var(--accent)}
  .head h2{font-size:clamp(1.7rem,3.6vw,2.4rem);font-weight:700;letter-spacing:-.025em;margin-top:.5rem}
  .head p{color:var(--muted);margin-top:.6rem}

  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.2rem}
  .ba{background:var(--surface);border:1px solid var(--line);border-radius:1rem;overflow:hidden;
    transition:transform .25s var(--ease),box-shadow .25s,border-color .25s}
  /* Comparateur avant/après (poignée à glisser) */
  .compare{--pos:50%;position:relative;overflow:hidden;aspect-ratio:4/3;background:#eef1f6;
    user-select:none;touch-action:none}
  .compare__layer{position:absolute;inset:0}
  .compare__layer img{width:100%;height:100%;object-fit:cover;display:block;user-select:none;-webkit-user-drag:none}
  .compare__layer--after{clip-path:inset(0 0 0 var(--pos))}
  .handle{position:absolute;top:0;bottom:0;left:var(--pos);width:2px;background:#fff;
    transform:translateX(-1px);pointer-events:none;box-shadow:0 0 0 1px rgba(0,0,0,.08)}
  .handle__btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:2.4rem;height:2.4rem;border-radius:50%;border:0;background:var(--accent);color:#fff;
    display:inline-flex;align-items:center;justify-content:center;pointer-events:auto;cursor:ew-resize;
    box-shadow:0 8px 18px -8px rgba(16,18,24,.5);transition:transform .2s var(--ease)}
  .handle__btn:hover{transform:translate(-50%,-50%) scale(1.06)}
  .handle__btn svg{width:1rem;height:1rem;stroke:currentColor}
  .tag{position:absolute;top:.6rem;font-size:.68rem;font-weight:700;letter-spacing:.03em;
    color:#fff;padding:.25rem .55rem;border-radius:2rem;pointer-events:none}
  .tag--before{left:.6rem;background:rgba(74,80,92,.85)}
  .tag--after{right:.6rem;background:var(--accent)}

  /* 4. Typo -------------------------------------------------------------- */
  .ba__body{padding:1rem 1.2rem 1.2rem;display:flex;align-items:center;justify-content:space-between;gap:.6rem}
  .ba__title{font-weight:700;letter-spacing:-.01em}
  .ba__meta{font-size:.85rem;color:var(--muted)}

  /* 5. Accent / hover ---------------------------------------------------- */
  @media (hover:hover) and (pointer:fine){
    .ba:hover{transform:translateY(-4px);border-color:rgba(59,110,245,.35);
      box-shadow:0 18px 38px -22px rgba(0,0,0,.4)}
  }

  /* 6. Responsive -------------------------------------------------------- */
  @media (max-width:760px){.grid{grid-template-columns:1fr}}

  /* 7. Accessibilité ----------------------------------------------------- */
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:.6rem}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}

  /* --- Animation d'entrée au chargement (cascade) ---------------------- */
  @keyframes baIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
  .head{animation:baIn .7s cubic-bezier(.16,1,.3,1) .05s backwards}
  .grid > .ba{animation:baIn .6s cubic-bezier(.16,1,.3,1) backwards}
  .grid > .ba:nth-child(1){animation-delay:.14s}
  .grid > .ba:nth-child(2){animation-delay:.22s}
  .grid > .ba:nth-child(3){animation-delay:.30s}
  .grid > .ba:nth-child(4){animation-delay:.38s}
  .grid > .ba:nth-child(5){animation-delay:.46s}
  .grid > .ba:nth-child(6){animation-delay:.54s}
  @media (prefers-reduced-motion:reduce){.head,.grid > .ba{animation:none}}
</style>
</head>
<body>

<!-- SCRIPT — comparateurs avant/après (poignée glissante, multi-instances) -->
<script>
  (function () {
    [].forEach.call(document.querySelectorAll('.compare'), function (cmp) {
      var h = cmp.querySelector('.handle__btn');
      if (!h) return;
      var dragging = false;
      function setPos (pct) {
        pct = Math.max(0, Math.min(100, pct));
        cmp.style.setProperty('--pos', pct + '%');
        h.setAttribute('aria-valuenow', Math.round(pct));
      }
      function fromClient (x) {
        var r = cmp.getBoundingClientRect();
        setPos(((x - r.left) / r.width) * 100);
      }
      h.addEventListener('pointerdown', function (e) { dragging = true; h.setPointerCapture(e.pointerId); e.preventDefault(); });
      document.addEventListener('pointermove', function (e) { if (dragging) fromClient(e.clientX); });
      document.addEventListener('pointerup', function () { dragging = false; });
      cmp.addEventListener('pointerdown', function (e) { if (e.target === h || h.contains(e.target)) return; fromClient(e.clientX); });
      h.addEventListener('keydown', function (e) {
        var cur = parseFloat(getComputedStyle(cmp).getPropertyValue('--pos')) || 50;
        var step = e.shiftKey ? 10 : 2;
        if (e.key === 'ArrowLeft')  { e.preventDefault(); setPos(cur - step); }
        if (e.key === 'ArrowRight') { e.preventDefault(); setPos(cur + step); }
        if (e.key === 'Home')       { e.preventDefault(); setPos(0); }
        if (e.key === 'End')        { e.preventDefault(); setPos(100); }
      });
    });
  })();
</script>
