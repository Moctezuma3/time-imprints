<title>Avant / après révélé au défilement</title>

<!-- ==========================================================================
     STYLE — Avant/Après · Empilement révélé au scroll : paires empilées,
     reveal à l'entrée (IntersectionObserver). JS natif, un seul accent.
     ========================================================================== -->
<style>
  /* 1. Tokens ------------------------------------------------------------ */
  :root{
    --bg:#fbfbfa;--surface:#ffffff;--fg:#16181d;--muted:#5c6270;--line:#e9e9e4;
    --accent:#3b6ef5;--accent-soft:rgba(59,110,245,.1);
    --maxw:62rem;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  /* 2. Reset ------------------------------------------------------------- */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  img{display:block;max-width:100%}
  body{background:var(--bg);color:var(--fg);font-family:var(--font);line-height:1.6}
  /* 3. Layout ------------------------------------------------------------ */
  .wrap{max-width:var(--maxw);margin:0 auto;padding:clamp(3.5rem,8vw,6rem) clamp(1.4rem,5vw,3rem)}
  .head{margin-bottom:clamp(2rem,5vw,3rem)}
  .stack{display:flex;flex-direction:column;gap:clamp(2rem,5vw,3.5rem)}
  .pair{display:grid;grid-template-columns:1.25fr 1fr;gap:clamp(1.2rem,4vw,2.6rem);align-items:center;
    opacity:0;transform:translateY(28px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
  .pair.is-in{opacity:1;transform:none}
  .pair:nth-child(even){direction:rtl}
  .pair:nth-child(even)>*{direction:ltr}
  .pair__txt{color:var(--muted)}
  /* Comparateur avant/après (poignée à glisser) */
  .compare{--pos:50%;position:relative;overflow:hidden;border-radius:1rem;aspect-ratio:4/3;background:#e6e8ec;
    user-select:none;touch-action:none}
  .compare__layer{position:absolute;inset:0}
  .compare__layer img{width:100%;height:100%;object-fit:cover;display:block;user-select:none;-webkit-user-drag:none}
  .compare__layer--after{clip-path:inset(0 0 0 var(--pos))}
  .handle{position:absolute;top:0;bottom:0;left:var(--pos);width:2px;background:#fff;
    transform:translateX(-1px);pointer-events:none;box-shadow:0 0 0 1px rgba(0,0,0,.08)}
  .handle__btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:2.6rem;height:2.6rem;border-radius:50%;border:0;background:var(--accent);color:#fff;
    display:inline-flex;align-items:center;justify-content:center;pointer-events:auto;cursor:ew-resize;
    box-shadow:0 8px 18px -8px rgba(16,18,24,.5);transition:transform .2s var(--ease)}
  .handle__btn:hover{transform:translate(-50%,-50%) scale(1.06)}
  .handle__btn svg{width:1rem;height:1rem;stroke:currentColor;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
  .tag{position:absolute;top:.7rem;background:rgba(22,24,29,.78);color:#fff;
    font-size:.72rem;font-weight:700;padding:.3rem .7rem;border-radius:99px;pointer-events:none}
  .tag--before{left:.7rem}
  .tag--after{right:.7rem;background:var(--accent)}
  /* 4. Typographie ------------------------------------------------------- */
  .eyebrow{font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:600}
  .head h2{font-size:clamp(1.7rem,3.6vw,2.4rem);font-weight:800;letter-spacing:-.025em;margin-top:.5rem}
  .pair__txt b{color:var(--fg)}
  /* 6. Responsive -------------------------------------------------------- */
  @media (max-width:680px){.pair{grid-template-columns:1fr}.pair:nth-child(even){direction:ltr}}
  /* 7. Accessibilité ----------------------------------------------------- */
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}
    .pair{opacity:1;transform:none}}

  /* --- Animation d'entrée au chargement (cascade) ---------------------- */
  /* On anime l'en-tête et le WRAPPER .stack uniquement : les .pair gardent
     leur reveal piloté au scroll (transition opacity/transform) intact. */
  @keyframes baIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
  .head{animation:baIn .7s cubic-bezier(.16,1,.3,1) .05s backwards}
  .stack{animation:baIn .7s cubic-bezier(.16,1,.3,1) .2s backwards}
  @media (prefers-reduced-motion:reduce){.head,.stack{animation:none}}
</style>
</head>
<body>

<!-- ==========================================================================
     STRUCTURE — empilement révélé au scroll. Ajoutez des .pair (avant/après +
     texte) ; chaque paire apparaît en glissant au scroll.
     ========================================================================== -->
<section class="wrap" aria-labelledby="t">
  <header class="head">
    <span class="eyebrow">Au fil du chantier</span>
    <h2 id="t" data-slot="titre">Chaque étape, avant et après</h2>
  </header>

  <div class="stack" data-slot="paires">
    <div class="pair" data-slot-item>
      <div class="compare">
        <div class="compare__layer"><img src="https://placehold.co/640x480/cfd4dd/6b7280?text=Avant+1" alt="Étape 1 avant" loading="lazy" data-field="avant"></div>
        <div class="compare__layer compare__layer--after"><img src="https://placehold.co/640x480/3b6ef5/ffffff?text=Apres+1" alt="Étape 1 après" loading="lazy" data-field="apres"></div>
        <span class="tag tag--before">Avant</span>
        <span class="tag tag--after">Après</span>
        <div class="handle"><button type="button" class="handle__btn" role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50" aria-label="Glisser pour comparer avant / après"><svg viewBox="0 0 24 24"><path d="M8 6L2 12l6 6M16 6l6 6-6 6"/></svg></button></div>
      </div>
      <p class="pair__txt" data-field="texte"><b>1 · Démolition &amp; préparation.</b> Mise à nu propre, structure vérifiée.</p>
    </div>
    <div class="pair">
      <div class="compare">
        <div class="compare__layer"><img src="https://placehold.co/640x480/cfd4dd/6b7280?text=Avant+2" alt="Étape 2 avant" loading="lazy"></div>
        <div class="compare__layer compare__layer--after"><img src="https://placehold.co/640x480/3b6ef5/ffffff?text=Apres+2" alt="Étape 2 après" loading="lazy"></div>
        <span class="tag tag--before">Avant</span>
        <span class="tag tag--after">Après</span>
        <div class="handle"><button type="button" class="handle__btn" role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50" aria-label="Glisser pour comparer avant / après"><svg viewBox="0 0 24 24"><path d="M8 6L2 12l6 6M16 6l6 6-6 6"/></svg></button></div>
      </div>
      <p class="pair__txt"><b>2 · Gros œuvre &amp; réseaux.</b> Électricité et plomberie aux normes.</p>
    </div>
    <div class="pair">
      <div class="compare">
        <div class="compare__layer"><img src="https://placehold.co/640x480/cfd4dd/6b7280?text=Avant+3" alt="Étape 3 avant" loading="lazy"></div>
        <div class="compare__layer compare__layer--after"><img src="https://placehold.co/640x480/3b6ef5/ffffff?text=Apres+3" alt="Étape 3 après" loading="lazy"></div>
        <span class="tag tag--before">Avant</span>
        <span class="tag tag--after">Après</span>
        <div class="handle"><button type="button" class="handle__btn" role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50" aria-label="Glisser pour comparer avant / après"><svg viewBox="0 0 24 24"><path d="M8 6L2 12l6 6M16 6l6 6-6 6"/></svg></button></div>
      </div>
      <p class="pair__txt"><b>3 · Finitions.</b> Le résultat livré, prêt à vivre.</p>
    </div>
  </div>
</section>

<!-- SCRIPT — reveal des paires au scroll -->
<script>
  (function () {
    var pairs = [].slice.call(document.querySelectorAll('.pair'));
    if (!('IntersectionObserver' in window)) { pairs.forEach(function (p){ p.classList.add('is-in'); }); return; }
    var io = new IntersectionObserver(function (entries){
      entries.forEach(function (e){ if (e.isIntersecting){ e.target.classList.add('is-in'); io.unobserve(e.target); } });
    }, { threshold:.25 });
    pairs.forEach(function (p){ io.observe(p); });
  })();
</script>

<!-- SCRIPT — comparateurs avant/après (poignée glissante, multi-instances) -->
<script>
  (function () {
    [].forEach.call(document.querySelectorAll('.compare'), function (cmp) {
      var h = cmp.querySelector('.handle__btn');
      if (!h) return;
      var dragging = false;
      function setPos (pct) {
        pct = Math.max(0, Math.min(100, pct));
        cmp.style.setProperty('--pos', pct + '%');
        h.setAttribute('aria-valuenow', Math.round(pct));
      }
      function fromClient (x) {
        var r = cmp.getBoundingClientRect();
        setPos(((x - r.left) / r.width) * 100);
      }
      h.addEventListener('pointerdown', function (e) { dragging = true; h.setPointerCapture(e.pointerId); e.preventDefault(); });
      document.addEventListener('pointermove', function (e) { if (dragging) fromClient(e.clientX); });
      document.addEventListener('pointerup', function () { dragging = false; });
      cmp.addEventListener('pointerdown', function (e) { if (e.target === h || h.contains(e.target)) return; fromClient(e.clientX); });
      h.addEventListener('keydown', function (e) {
        var cur = parseFloat(getComputedStyle(cmp).getPropertyValue('--pos')) || 50;
        var step = e.shiftKey ? 10 : 2;
        if (e.key === 'ArrowLeft')  { e.preventDefault(); setPos(cur - step); }
        if (e.key === 'ArrowRight') { e.preventDefault(); setPos(cur + step); }
        if (e.key === 'Home')       { e.preventDefault(); setPos(0); }
        if (e.key === 'End')        { e.preventDefault(); setPos(100); }
      });
    });
  })();
</script>

</body>
