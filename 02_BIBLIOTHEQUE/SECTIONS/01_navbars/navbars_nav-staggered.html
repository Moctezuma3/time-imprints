<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<title>Menu en cascade (panneau + couches)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — Navigation 07 · Staggered menu : header minimal, bouton Menu/Close
     qui cycle, panel latéral large qui glisse depuis la droite avec 2 prelayers
     colorés en cascade derrière lui, items qui montent avec rotation + numéros
     qui apparaissent, socials fade-in. Port du composant React Bits StaggeredMenu,
     reproduit en JS NATIF + CSS, ZÉRO dépendance externe.

     PRINCIPE D'ANIMATION (sans lib) :
     - Le JS ne fait que toggler la classe .is-open sur le wrapper racine
       (+ aria, Échap, clic hors panneau, cycle du libellé du bouton).
     - Tout le mouvement vit en CSS : chaque couche/panel/item/numéro/social
       a un état caché par défaut → état visible quand .is-open est présent,
       via des transitions avec transition-delay CROISSANT (stagger).
     - Easing proche de power3/power4 (cubic-bezier(.16,1,.3,1)) ; léger
       overshoot sur les items (cubic-bezier(.34,1.56,.64,1)).
     - Fermeture (retrait de .is-open) : delays courts/inversés → close net.
     ========================================================================== -->
<style>
  :root{
    --bg:#fbfbfa;--fg:#16181d;--muted:#8a8a93;
    --panel-bg:#ffffff;--panel-fg:#0a0a0c;
    --sm-accent:#7C3AED;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);          /* ≈ power3/power4.out */
    --ease-overshoot:cubic-bezier(.34,1.56,.64,1); /* léger rebond items */
    --ease-in:cubic-bezier(.7,0,.84,0);        /* ≈ power3.in (close) */
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  button,a{font:inherit;color:inherit}
  a{text-decoration:none}

  html,body{height:100%}
  body{background:var(--bg);color:var(--fg);font-family:var(--font);
    min-height:100dvh;overflow:hidden;position:relative}

  .staggered-menu-wrapper{
    position:absolute;inset:0;width:100%;height:100%;
    z-index:40;pointer-events:none}

  .staggered-menu-header{
    position:absolute;top:0;left:0;width:100%;
    display:flex;align-items:center;justify-content:space-between;
    padding:2em;background:transparent;pointer-events:none;z-index:20}
  .staggered-menu-header > *{pointer-events:auto}

  .sm-logo{display:flex;align-items:center;user-select:none;font-weight:700;letter-spacing:-.02em;font-size:1.3rem}
  .sm-logo-mark{
    display:inline-block;width:1.4rem;height:1.4rem;margin-right:.55rem;
    border-radius:6px;background:linear-gradient(135deg,#B497CF,#5227FF)}

  .sm-toggle{
    position:relative;display:inline-flex;align-items:center;gap:.55rem;
    background:transparent;border:0;cursor:pointer;color:var(--panel-fg);
    font-weight:500;line-height:1;font-size:1rem;letter-spacing:.01em;
    padding:.4rem .2rem}
  .sm-toggle:focus-visible{outline:2px solid #00000055;outline-offset:4px;border-radius:4px}

  /* Libellé Menu/Close : deux lignes empilées qui slident verticalement.
     Repos = "Menu" visible (offset 0). Ouvert = remonte d'une ligne → "Close". */
  .sm-toggle-textWrap{
    position:relative;display:inline-block;height:1em;overflow:hidden;white-space:nowrap;
    min-width:3.2em}
  .sm-toggle-textInner{
    display:flex;flex-direction:column;line-height:1;
    transform:translateY(0);
    transition:transform .55s var(--ease)}
  .sm-toggle-line{display:block;height:1em;line-height:1}
  .is-open .sm-toggle-textInner{transform:translateY(-1em)}

  /* Icône + → ×/croix par rotation (la barre verticale est à 90°, on tourne
     tout le bloc icône à 225° → l'ensemble forme une croix penchée). */
  .sm-icon{position:relative;width:14px;height:14px;flex:0 0 14px;
    display:inline-flex;align-items:center;justify-content:center;
    transform:rotate(0deg);transform-origin:50% 50%;
    transition:transform .8s var(--ease)}
  .is-open .sm-icon{transform:rotate(225deg)}
  .sm-icon-line{position:absolute;left:50%;top:50%;width:100%;height:2px;
    background:currentColor;border-radius:2px;transform:translate(-50%,-50%);transform-origin:50% 50%}
  .sm-icon-line.is-v{transform:translate(-50%,-50%) rotate(90deg)}

  /* --- Prelayers : couches colorées en cascade derrière le panneau --------
     État caché : décalées hors écran (à droite). Ouvert : reviennent à 0,
     avec un transition-delay croissant entre couches (cascade). */
  .sm-prelayers{
    position:absolute;top:0;right:0;bottom:0;
    width:clamp(260px,38vw,420px);
    pointer-events:none;z-index:5;overflow:hidden}
  [data-position="left"] .sm-prelayers{right:auto;left:0}
  .sm-prelayer{
    position:absolute;top:0;right:0;height:100%;width:100%;
    transform:translateX(100%);
    transition:transform .5s var(--ease);
    transition-delay:var(--sm-pre-close-delay,0s)}
  [data-position="left"] .sm-prelayer{transform:translateX(-100%)}
  .is-open .sm-prelayer{
    transform:translateX(0);
    transition-delay:var(--sm-pre-open-delay,0s)}

  /* --- Panneau latéral large ---------------------------------------------
     Glisse depuis la droite. À l'ouverture il entre APRÈS les prelayers
     (delay), à la fermeture il part vite (delay court). */
  .staggered-menu-panel{
    position:absolute;top:0;right:0;
    width:clamp(260px,38vw,420px);height:100%;
    background:var(--panel-bg);color:var(--panel-fg);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    display:flex;flex-direction:column;
    padding:6em 2em 2em 2em;overflow-y:auto;z-index:10;
    pointer-events:none;
    transform:translateX(100%);
    transition:transform .55s var(--ease) 0s;}
  [data-position="left"] .staggered-menu-panel{right:auto;left:0;transform:translateX(-100%)}
  .is-open .staggered-menu-panel{
    transform:translateX(0);
    transition-duration:.65s;transition-delay:.22s;
    pointer-events:auto}

  .sm-panel-inner{flex:1;display:flex;flex-direction:column;gap:1.25rem}

  .sm-panel-list{
    list-style:none;display:flex;flex-direction:column;gap:.5rem}
  .sm-panel-itemWrap{position:relative;overflow:hidden;line-height:1;padding-block:.1em}
  .sm-panel-item{
    position:relative;color:#000;font-weight:600;font-size:3.5rem;
    cursor:pointer;line-height:1;letter-spacing:-2px;text-transform:uppercase;
    transition:color .25s var(--ease);
    display:inline-block;padding-right:1.4em}
  /* Item : monte (translateY) avec légère rotation, état caché par défaut.
     Ouvert : revient à 0 avec un overshoot, stagger par --i. */
  .sm-panel-itemLabel{
    display:inline-block;transform-origin:50% 100%;
    transform:translateY(140%) rotate(10deg);
    transition:transform .9s var(--ease) 0s;}
  .is-open .sm-panel-itemLabel{
    transform:translateY(0) rotate(0deg);
    transition:transform 1s var(--ease-overshoot);
    transition-delay:calc(.42s + var(--i,0) * .1s);}
  .sm-panel-item:hover{color:var(--sm-accent)}

  .sm-panel-list[data-numbering]{counter-reset:smItem}
  .sm-panel-list[data-numbering] .sm-panel-item::after{
    counter-increment:smItem;
    content:counter(smItem,decimal-leading-zero);
    position:absolute;top:.1em;right:2.8em;
    font-size:18px;font-weight:400;color:var(--sm-accent);letter-spacing:0;
    pointer-events:none;user-select:none;
    opacity:0;
    transition:opacity .35s var(--ease) 0s;}
  .is-open .sm-panel-list[data-numbering] .sm-panel-item::after{
    opacity:1;
    transition:opacity .6s var(--ease);
    transition-delay:calc(.52s + var(--i,0) * .08s);}

  .sm-socials{margin-top:auto;padding-top:2rem;display:flex;flex-direction:column;gap:.75rem}
  .sm-socials-title{
    margin:0;font-size:1rem;font-weight:500;color:var(--sm-accent);
    opacity:0;transition:opacity .35s var(--ease) 0s;}
  .is-open .sm-socials-title{opacity:1;transition:opacity .5s var(--ease);transition-delay:.48s}
  .sm-socials-list{list-style:none;display:flex;flex-direction:row;align-items:center;
    gap:1rem;flex-wrap:wrap}
  .sm-socials-link{
    font-size:1.2rem;font-weight:500;color:#111;
    position:relative;padding:2px 0;display:inline-block;
    opacity:0;transform:translateY(25px);
    transition:color .3s ease,opacity .3s var(--ease) 0s,transform .35s var(--ease) 0s;}
  .is-open .sm-socials-link{
    opacity:1;transform:translateY(0);
    transition:color .3s ease,
               opacity .55s var(--ease) calc(.52s + var(--i,0) * .08s),
               transform .55s var(--ease) calc(.52s + var(--i,0) * .08s);}
  .sm-socials-link:hover{color:var(--sm-accent)}
  .sm-socials-list:hover .sm-socials-link{opacity:.35}
  .sm-socials-list:hover .sm-socials-link:hover{opacity:1}
  .sm-socials-list:focus-within .sm-socials-link{opacity:.35}
  .sm-socials-list:focus-within .sm-socials-link:focus-visible{opacity:1}
  .sm-socials-link:focus-visible{outline:2px solid var(--sm-accent);outline-offset:3px}

  @media (max-width:1024px){
    .staggered-menu-panel,.sm-prelayers{width:100%;left:0;right:0}
    .sm-panel-item{font-size:2.6rem;letter-spacing:-1.5px}
  }
  @media (max-width:640px){
    .sm-panel-item{font-size:2.1rem;letter-spacing:-1px}
  }

  /* --- Réduction de mouvement : ouverture/fermeture INSTANTANÉES ----------
     Pas de slide, pas de stagger : on neutralise toutes les transitions et on
     applique directement les états visibles quand .is-open est présent. */
  @media (prefers-reduced-motion:reduce){
    .sm-toggle-textInner,.sm-icon,.sm-prelayer,.staggered-menu-panel,
    .sm-panel-itemLabel,.sm-socials-title,.sm-socials-link,
    .sm-panel-list[data-numbering] .sm-panel-item::after,
    .staggered-menu-header,.sm-logo,.sm-toggle{
      transition:none!important;animation:none!important;transition-delay:0s!important}
  }

  /* --- Animation d'entrée au chargement -------------------------------- */
  /* Anime UNIQUEMENT l'entrée de la barre supérieure + bouton Menu au load.
     N'ouvre PAS le panneau. backwards → état de base intact après l'entrée. */
  @keyframes navDrop{from{opacity:0;transform:translateY(-110%)}to{opacity:1;transform:translateY(0)}}
  @keyframes navIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
  .staggered-menu-header{animation:navDrop .7s cubic-bezier(.16,1,.3,1) backwards}
  .sm-logo{animation:navIn .6s cubic-bezier(.16,1,.3,1) .25s backwards}
  .sm-toggle{animation:navIn .6s cubic-bezier(.16,1,.3,1) .49s backwards}
</style>
</head>
<body>

<div class="staggered-menu-wrapper" data-position="right" id="smWrapper">

  <div class="sm-prelayers" aria-hidden="true" id="smPrelayers">
    <!-- Couches colorées en cascade derrière le panneau (cf. config.colors) -->
    <div class="sm-prelayer" style="background:#B497CF;--sm-pre-open-delay:0s;--sm-pre-close-delay:.07s"></div>
    <div class="sm-prelayer" style="background:#5227FF;--sm-pre-open-delay:.07s;--sm-pre-close-delay:0s"></div>
  </div>

  <header class="staggered-menu-header" aria-label="Main navigation header">
    <div class="sm-logo" aria-label="Logo" data-slot="logo">
      <span class="sm-logo-mark" data-keep></span>
      <span>Studio</span>
    </div>
    <button id="smToggle" class="sm-toggle" type="button"
            aria-label="Open menu" aria-expanded="false" aria-controls="staggered-menu-panel">
      <span class="sm-toggle-textWrap" aria-hidden="true">
        <span class="sm-toggle-textInner" id="smTextInner">
          <span class="sm-toggle-line">Menu</span>
          <span class="sm-toggle-line">Close</span>
        </span>
      </span>
      <span class="sm-icon" id="smIcon" aria-hidden="true">
        <span class="sm-icon-line"></span>
        <span class="sm-icon-line is-v"></span>
      </span>
    </button>
  </header>

  <aside id="staggered-menu-panel" class="staggered-menu-panel" aria-hidden="true">
    <div class="sm-panel-inner">
      <ul class="sm-panel-list" role="list" data-numbering data-slot="liens">
        <li class="sm-panel-itemWrap"><a class="sm-panel-item" href="#" aria-label="Accueil" data-index="1" style="--i:0" data-slot-item><span class="sm-panel-itemLabel">Accueil</span></a></li>
        <li class="sm-panel-itemWrap"><a class="sm-panel-item" href="#" aria-label="À propos" data-index="2" style="--i:1"><span class="sm-panel-itemLabel">À propos</span></a></li>
        <li class="sm-panel-itemWrap"><a class="sm-panel-item" href="#" aria-label="Services" data-index="3" style="--i:2"><span class="sm-panel-itemLabel">Services</span></a></li>
        <li class="sm-panel-itemWrap"><a class="sm-panel-item" href="#" aria-label="Projets" data-index="4" style="--i:3"><span class="sm-panel-itemLabel">Projets</span></a></li>
        <li class="sm-panel-itemWrap"><a class="sm-panel-item" href="#" aria-label="Contact" data-index="5" style="--i:4"><span class="sm-panel-itemLabel">Contact</span></a></li>
      </ul>

      <div class="sm-socials" aria-label="Social links">
        <h3 class="sm-socials-title">Socials</h3>
        <ul class="sm-socials-list" role="list">
          <li><a class="sm-socials-link" href="#" target="_blank" rel="noopener noreferrer" style="--i:0">Twitter</a></li>
          <li><a class="sm-socials-link" href="#" target="_blank" rel="noopener noreferrer" style="--i:1">Instagram</a></li>
          <li><a class="sm-socials-link" href="#" target="_blank" rel="noopener noreferrer" style="--i:2">LinkedIn</a></li>
        </ul>
      </div>
    </div>
  </aside>
</div>

<script>
/* ==========================================================================
   JS NATIF — ZÉRO dépendance. Aucune timeline : tout le mouvement est en CSS.
   Le JS se limite à : toggler .is-open, tenir aria-expanded/aria-hidden à jour,
   fermer sur Échap et sur clic hors panneau, et gérer le focus raisonnablement.
   ========================================================================== */
(function () {
  'use strict';

  var config = {
    position: 'right',
    accentColor: '#7C3AED',
    closeOnClickAway: true
  };

  var wrapper   = document.getElementById('smWrapper');
  var panel     = document.getElementById('staggered-menu-panel');
  var toggleBtn = document.getElementById('smToggle');

  if (!wrapper || !panel || !toggleBtn) return;

  wrapper.setAttribute('data-position', config.position);
  wrapper.style.setProperty('--sm-accent', config.accentColor);

  var open = false;

  function setOpen (next) {
    open = next;
    wrapper.classList.toggle('is-open', next);
    panel.setAttribute('aria-hidden', String(!next));
    toggleBtn.setAttribute('aria-expanded', String(next));
    toggleBtn.setAttribute('aria-label', next ? 'Close menu' : 'Open menu');
  }

  function openMenu () {
    if (open) return;
    setOpen(true);
    // focus raisonnable : premier item du menu une fois le panneau entré
    var first = panel.querySelector('.sm-panel-item');
    if (first) { try { first.focus({ preventScroll: true }); } catch (e) { first.focus(); } }
  }

  function closeMenu () {
    if (!open) return;
    setOpen(false);
    // rend le focus au bouton qui contrôle le menu
    try { toggleBtn.focus({ preventScroll: true }); } catch (e) { toggleBtn.focus(); }
  }

  function toggleMenu () {
    if (open) closeMenu(); else openMenu();
  }

  toggleBtn.addEventListener('click', toggleMenu);

  document.addEventListener('mousedown', function (e) {
    if (!config.closeOnClickAway || !open) return;
    if (!panel.contains(e.target) && !toggleBtn.contains(e.target)) closeMenu();
  });

  document.addEventListener('keydown', function (e) {
    if ((e.key === 'Escape' || e.key === 'Esc') && open) closeMenu();
  });
})();
</script>

</body>
</html>
