<html lang="fr">

<meta name="lib:utilite" content="Header flottant en barre large à angles droits (sans arrondi) détachée des bords (marge tout autour), fond translucide flouté et ombre douce. Présence affirmée. Se condense légèrement quand on défile (largeur + ombre). Menu mobile en carte flottante. Au survol, un indicateur glisse d'un lien à l'autre (façon Webflow). Look moderne SaaS / studio. JS natif. Rondeur pilotée par --radius. CTA à remplissage circulaire depuis le curseur (un disque d'encre grandit depuis le point survolé et inverse le texte).">

<!-- /lib:meta -->
<title>Navigation flottante (pilule qui se condense au scroll)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — Navigation · Flottante (pilule)
     Header détaché des bords (marge tout autour), en pilule arrondie au fond
     translucide flouté. Sticky. Au scroll, la classe .is-scrolled (posée par un
     mini-script) resserre la pilule et renforce l'ombre. Menu mobile = carte
     flottante pilotée par checkbox-hack (le JS ne sert qu'au condense).
     ========================================================================== -->
<style>
  /* 1. Tokens ------------------------------------------------------------ */
  :root{
    --bg:#fbfbfa;--surface:#ffffff;--fg:#16181d;--muted:#5c6270;
    --line:#e6e6e2;--accent:#3b6ef5;--accent-fg:#ffffff;
    --maxw:78rem;--radius:0px;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
    --shadow:0 10px 30px -12px rgba(16,24,40,.22);
    --shadow-lg:0 16px 40px -14px rgba(16,24,40,.32);
  }
  /* 2. Reset ------------------------------------------------------------- */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  a{text-decoration:none;color:inherit}
  body{background:var(--bg);color:var(--fg);font-family:var(--font);line-height:1.6}

  /* 3. Layout — la pilule flotte, détachée du haut et des côtés ---------- */
  .floatnav{position:sticky;top:1rem;z-index:30;padding:0 1rem;
    /* le sticky se déclenche depuis le haut ; la marge crée le « flottant » */}
  .floatnav__inner{max-width:var(--maxw);margin:0 auto;
    display:flex;align-items:center;justify-content:space-between;gap:1rem;
    padding:.9rem 1rem .9rem 1.75rem;
    background:rgba(255,255,255,.72);backdrop-filter:blur(14px) saturate(1.4);
    -webkit-backdrop-filter:blur(14px) saturate(1.4);
    border:1px solid rgba(230,230,226,.9);border-radius:var(--radius);
    box-shadow:var(--shadow);
    transition:max-width .4s var(--ease),box-shadow .4s var(--ease),
               padding .4s var(--ease),background .4s var(--ease)}
  /* condense au scroll : pilule plus étroite + ombre plus marquée */
  .floatnav.is-scrolled .floatnav__inner{max-width:70rem;
    box-shadow:var(--shadow-lg);background:rgba(255,255,255,.85)}

  .logo{display:flex;align-items:center;gap:.6rem;font-weight:700;
    letter-spacing:-.02em;font-size:1.2rem}
  .logo .dot{width:.75rem;height:.75rem;border-radius:50%;background:var(--accent);
    display:inline-block;flex:none}

  .nav{display:flex;align-items:center;gap:1.7rem}
  .nav__links{display:flex;align-items:center;gap:1.7rem}
  .nav__links a{font-size:1rem;font-weight:500;color:var(--muted);
    position:relative;transition:color .2s}
  .nav__links a::after{content:"";position:absolute;left:0;right:100%;bottom:-.4rem;
    height:1.5px;background:var(--accent);transition:right .28s var(--ease)}
  /* Indicateur glissant (Webflow) — remplace le soulignement quand le JS est actif */
  .nav__links{position:relative}
  .nav__links a{z-index:1}
  .nav__links.has-ind a::after{display:none}
  .nav__ind{position:absolute;bottom:-.4rem;height:2px;border-radius:2px;background:var(--accent);
    width:0;opacity:0;transform:translateX(0);pointer-events:none;
    transition:transform .34s var(--ease),width .34s var(--ease),opacity .2s var(--ease)}

  /* 4. Typo / CTA -------------------------------------------------------- */
  .cta{display:inline-flex;align-items:center;gap:.4rem;
    padding:.75rem 1.4rem;border-radius:var(--radius);
    background:var(--accent);color:var(--accent-fg);
    font-size:.95rem;font-weight:600;white-space:nowrap;
    position:relative;isolation:isolate;overflow:hidden;
    transition:transform .2s var(--ease),box-shadow .2s,color .35s var(--ease)}
  /* Effet E — disque d'encre qui grandit depuis le point du curseur (--x/--y) */
  .cta::before{content:"";position:absolute;z-index:-1;
    top:var(--y,50%);left:var(--x,50%);width:0;height:0;border-radius:50%;
    background:#11183a;transform:translate(-50%,-50%);
    transition:width .5s var(--ease),height .5s var(--ease)}
  /* burger (mobile only) */
  .burger{display:none;width:2.7rem;height:2.7rem;border:1px solid var(--line);
    border-radius:var(--radius);background:var(--surface);cursor:pointer;
    align-items:center;justify-content:center;flex:none}
  .burger span,.burger span::before,.burger span::after{
    content:"";display:block;width:1.05rem;height:2px;background:var(--fg);
    transition:transform .25s var(--ease),opacity .2s}
  .burger span::before{transform:translateY(-.32rem)}
  .burger span::after{transform:translateY(.32rem)}
  #fnav-toggle{position:absolute;opacity:0;pointer-events:none}

  /* espaceur neutre vide : permet de scroller (la pilule se condense) */
  .spacer{height:240vh}

  /* 5. Accent / hover ---------------------------------------------------- */
  @media (hover:hover) and (pointer:fine){
    .nav__links a:hover{color:var(--fg)}
    .nav__links a:hover::after{right:0}
    .cta:hover{transform:translateY(-1px);box-shadow:0 8px 20px -6px var(--accent);
      color:#ffffff}
    /* le disque d'encre remplit le bouton depuis le point du curseur */
    .cta:hover::before{width:300px;height:300px}
  }
  /* reduced-motion : pas de disque animé (le fond accent reste, texte inchangé) */
  @media (prefers-reduced-motion:reduce){
    .cta::before{display:none}
  }

  /* 6. Responsive — la pilule reste flottante, le menu tombe en carte ---- */
  @media (max-width:820px){
    .burger{display:inline-flex}
    .nav{position:absolute;top:calc(100% + .6rem);right:1rem;left:1rem;
      flex-direction:column;align-items:stretch;gap:0;
      background:rgba(255,255,255,.92);backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      border:1px solid var(--line);border-radius:var(--radius);
      padding:.6rem .9rem 1rem;box-shadow:var(--shadow-lg);
      transform:scale(.96) translateY(-.4rem);transform-origin:top right;
      opacity:0;pointer-events:none;
      transition:opacity .28s var(--ease),transform .3s var(--ease)}
    .nav__links{flex-direction:column;align-items:stretch;gap:0}
    .nav__links a{padding:.85rem .3rem;border-bottom:1px solid var(--line);font-size:1rem}
    .nav__links a::after{display:none}
    .nav__ind{display:none}
    .cta{margin-top:.8rem;justify-content:center}
    .floatnav__inner{position:relative}
    #fnav-toggle:checked ~ .floatnav__inner .nav{
      opacity:1;pointer-events:auto;transform:none}
    #fnav-toggle:checked ~ .floatnav__inner .burger span{background:transparent}
    #fnav-toggle:checked ~ .floatnav__inner .burger span::before{transform:rotate(45deg)}
    #fnav-toggle:checked ~ .floatnav__inner .burger span::after{transform:rotate(-45deg)}
  }

  /* 7. Accessibilité ----------------------------------------------------- */
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:.3rem}
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important}
  }

  /* --- Animation d'entrée au chargement -------------------------------- */
  @keyframes navDrop{from{opacity:0;transform:translateY(-110%)}to{opacity:1;transform:translateY(0)}}
  @keyframes navIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
  .floatnav__inner{animation:navDrop .7s cubic-bezier(.16,1,.3,1) backwards}
  .logo{animation:navIn .6s cubic-bezier(.16,1,.3,1) .25s backwards}
  .nav__links{animation:navIn .6s cubic-bezier(.16,1,.3,1) .37s backwards}
  .cta{animation:navIn .6s cubic-bezier(.16,1,.3,1) .49s backwards}
  @media (prefers-reduced-motion:reduce){.floatnav__inner,.logo,.nav__links,.cta{animation:none}}
</style>
</head>
<body>

<!-- ==========================================================================
     STRUCTURE — pilule flottante. Le checkbox #fnav-toggle (hors flux) pilote
     le menu mobile via le label .burger. Le mini-script ne fait qu'ajouter
     .is-scrolled pour condenser la pilule au défilement.
     ========================================================================== -->
<header class="floatnav" id="floatnav">
  <input type="checkbox" id="fnav-toggle" aria-hidden="true">
  <div class="floatnav__inner">
    <a href="#" class="logo" data-slot="logo"><span class="dot" data-keep></span>Atelier</a>

    <nav class="nav" aria-label="Navigation principale">
      <div class="nav__links" data-slot="liens">
        <a href="#" data-slot-item>Services</a>
        <a href="#">Réalisations</a>
        <a href="#">À propos</a>
      </div>
      <a href="#" class="cta" data-slot="cta">Demander un devis</a>
    </nav>

    <label class="burger" for="fnav-toggle" role="button"
           aria-label="Ouvrir le menu" tabindex="0"><span></span></label>
  </div>
</header>

<!-- Espaceur neutre vide : permet de scroller (la pilule se condense) -->
<div class="spacer" aria-hidden="true"></div>

<!-- mini-script : condense la pilule au scroll (dégradé propre sans JS) -->
<script>
  (function(){
    var nav = document.getElementById('floatnav');
    if(!nav) return;
    var onScroll = function(){
      nav.classList.toggle('is-scrolled', window.scrollY > 24);
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive:true });
  })();
</script>

<!-- indicateur glissant entre les liens (survol / focus clavier) -->
<script>
  (function(){
    var list = document.querySelector('.nav__links');
    if(!list) return;
    var links = [].slice.call(list.querySelectorAll('a'));
    if(links.length < 2) return;
    var ind = document.createElement('span');
    ind.className = 'nav__ind'; ind.setAttribute('aria-hidden','true');
    list.appendChild(ind); list.classList.add('has-ind');
    function move(a){
      ind.style.width = a.offsetWidth + 'px';
      ind.style.transform = 'translateX(' + a.offsetLeft + 'px)';
      ind.style.opacity = '1';
    }
    function hide(){ ind.style.opacity = '0'; }
    links.forEach(function(a){
      a.addEventListener('mouseenter', function(){ move(a); });
      a.addEventListener('focus', function(){ move(a); });
    });
    list.addEventListener('mouseleave', hide);
    list.addEventListener('focusout', function(e){
      if(!list.contains(e.relatedTarget)) hide();
    });
  })();
</script>

<!-- CTA : remplissage circulaire depuis le curseur (--x/--y) -->
<script>
  (function(){
    if(!(window.matchMedia && window.matchMedia('(hover:hover) and (pointer:fine)').matches)) return;
    var cta = document.querySelector('.cta');
    if(!cta) return;
    function place(e){
      var r = cta.getBoundingClientRect();
      cta.style.setProperty('--x', (e.clientX - r.left) + 'px');
      cta.style.setProperty('--y', (e.clientY - r.top)  + 'px');
    }
    cta.addEventListener('mouseenter', place);
    cta.addEventListener('mousemove', place);
  })();
</script>

</body>
</html>
