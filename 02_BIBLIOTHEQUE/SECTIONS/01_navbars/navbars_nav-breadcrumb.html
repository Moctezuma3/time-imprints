<title>Fil d'Ariane (breadcrumb SEO)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — Navigation · Fil d'Ariane (breadcrumb)
     Pour pages profondes (catalogue, doc, SEO local). Header simple + barre
     de fil d'Ariane balisée schema.org BreadcrumbList (microdonnées) pour
     les rich results Google. 100 % CSS, scroll horizontal sur mobile.
     ========================================================================== -->
<style>
  /* 1. Tokens ------------------------------------------------------------ */
  :root{
    --bg:#fbfbfa;--surface:#ffffff;--fg:#16181d;--muted:#6b7280;
    --line:#e6e6e2;--accent:#3b6ef5;
    --maxw:74rem;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  /* 2. Reset ------------------------------------------------------------- */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  a{text-decoration:none;color:inherit}
  body{background:var(--bg);color:var(--fg);font-family:var(--font);line-height:1.6}
  svg{display:block;width:1em;height:1em;fill:none;stroke:currentColor;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* 3. Layout : header --------------------------------------------------- */
  .header{background:var(--surface);border-bottom:1px solid var(--line)}
  .header__inner{max-width:var(--maxw);margin:0 auto;padding:0 1.4rem;height:3.8rem;
    display:flex;align-items:center;justify-content:space-between;gap:1rem}
  .logo{display:flex;align-items:center;gap:.55rem;font-weight:700;
    letter-spacing:-.02em;font-size:1.25rem}
  .logo .dot{width:.78rem;height:.78rem;border-radius:50%;background:var(--accent);flex:none}
  .header .nav{display:flex;gap:1.5rem}
  .header .nav a{font-size:.92rem;font-weight:500;color:var(--muted);transition:color .2s}
  /* burger (mobile only) */
  .burger{display:none;width:2.5rem;height:2.5rem;border:1px solid var(--line);
    border-radius:.55rem;background:var(--surface);cursor:pointer;
    align-items:center;justify-content:center;flex:none}
  .burger span,.burger span::before,.burger span::after{
    content:"";display:block;width:1.05rem;height:2px;background:var(--fg);
    transition:transform .25s var(--ease),opacity .2s}
  .burger span::before{transform:translateY(-.32rem)}
  .burger span::after{transform:translateY(.32rem)}
  #bc-toggle{position:absolute;opacity:0;pointer-events:none}

  /* 3b. Barre fil d'Ariane ---------------------------------------------- */
  .crumbbar{background:var(--bg);border-bottom:1px solid var(--line)}
  .crumbs{max-width:var(--maxw);margin:0 auto;padding:.7rem 1.4rem;
    display:flex;align-items:center;gap:.15rem;list-style:none;
    font-size:.88rem;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .crumbs::-webkit-scrollbar{display:none}
  .crumbs li{display:inline-flex;align-items:center;gap:.15rem;white-space:nowrap}
  .crumbs a{display:inline-flex;align-items:center;gap:.4rem;padding:.25rem .5rem;
    border-radius:.4rem;color:var(--muted);font-weight:500;transition:color .2s,background .2s}
  .crumbs .sep{color:#c4c8d0;display:inline-flex}
  .crumbs [aria-current="page"]{padding:.25rem .5rem;color:var(--fg);font-weight:600}
  .crumbs .home svg{width:.95rem;height:.95rem}

  /* 5. Accent / hover ---------------------------------------------------- */
  @media (hover:hover) and (pointer:fine){
    .header .nav a:hover{color:var(--fg)}
    .crumbs a:hover{color:var(--accent);background:rgba(59,110,245,.08)}
  }

  /* 6. Responsive -------------------------------------------------------- */
  @media (max-width:680px){
    .header{position:relative;z-index:40}
    .header__inner{position:relative}
    .burger{display:inline-flex}
    .header .nav{position:absolute;top:calc(100% + .5rem);right:0;left:0;
      flex-direction:column;align-items:stretch;gap:0;
      background:var(--surface);border:1px solid var(--line);border-radius:.8rem;
      padding:.3rem .9rem .8rem;box-shadow:0 18px 40px -16px rgba(0,0,0,.3);
      opacity:0;transform:translateY(-10px);pointer-events:none;
      transition:opacity .25s var(--ease),transform .3s var(--ease)}
    .header .nav a{padding:.85rem .2rem;border-bottom:1px solid var(--line);font-size:1rem}
    .header .nav a:last-child{border-bottom:0}
    #bc-toggle:checked ~ .header__inner .nav{opacity:1;transform:none;pointer-events:auto}
    #bc-toggle:checked ~ .header__inner .burger span{background:transparent}
    #bc-toggle:checked ~ .header__inner .burger span::before{transform:rotate(45deg)}
    #bc-toggle:checked ~ .header__inner .burger span::after{transform:rotate(-45deg)}
    .crumbs{padding-left:1.4rem}
    /* indice de débordement scrollable */
    .crumbbar{-webkit-mask-image:linear-gradient(90deg,#000 88%,transparent);
      mask-image:linear-gradient(90deg,#000 88%,transparent)}
  }

  /* 7. Accessibilité ----------------------------------------------------- */
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:.3rem}

  /* --- Animation d'entrée au chargement -------------------------------- */
  @keyframes navDrop{from{opacity:0;transform:translateY(-110%)}to{opacity:1;transform:translateY(0)}}
  @keyframes navIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
  .header{animation:navDrop .7s cubic-bezier(.16,1,.3,1) backwards}
  .logo{animation:navIn .6s cubic-bezier(.16,1,.3,1) .25s backwards}
  .header .nav{animation:navIn .6s cubic-bezier(.16,1,.3,1) .37s backwards}
  .crumbbar{animation:navDrop .7s cubic-bezier(.16,1,.3,1) .49s backwards}
  @media (prefers-reduced-motion:reduce){
    .header,.logo,.header .nav,.crumbbar{animation:none}
  }
</style>
</head>
<body>

<!-- ==========================================================================
     STRUCTURE — header + fil d'Ariane. Le <ol> porte les microdonnées
     schema.org BreadcrumbList (itemprop position/name/item) pour le SEO.
     Le dernier niveau = page courante (aria-current="page", non cliquable).
     ========================================================================== -->
<header class="header">
  <input type="checkbox" id="bc-toggle" aria-hidden="true">
  <div class="header__inner">
    <a href="#" class="logo" data-slot="logo"><span class="dot" data-keep></span>Boutique</a>
    <nav class="nav" aria-label="Navigation principale" data-slot="liens">
      <a href="#" data-slot-item>Catalogue</a>
      <a href="#">Marques</a>
      <a href="#">Support</a>
    </nav>
    <label class="burger" for="bc-toggle" role="button"
           aria-label="Ouvrir le menu" tabindex="0"><span></span></label>
  </div>
</header>

<nav class="crumbbar" aria-label="Fil d'Ariane">
  <ol class="crumbs" itemscope itemtype="https://schema.org/BreadcrumbList" data-slot="fil">
    <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem" data-slot-item>
      <a class="home" href="#" itemprop="item"><svg viewBox="0 0 24 24" aria-hidden="true" data-keep><path d="M3 11l9-8 9 8"/><path d="M5 10v9h5v-5h4v5h5v-9"/></svg><span itemprop="name" data-field="label">Accueil</span></a>
      <meta itemprop="position" content="1">
    </li>
    <li class="sep" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></li>

    <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
      <a href="#" itemprop="item"><span itemprop="name">Catalogue</span></a>
      <meta itemprop="position" content="2">
    </li>
    <li class="sep" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></li>

    <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
      <a href="#" itemprop="item"><span itemprop="name">Éclairage</span></a>
      <meta itemprop="position" content="3">
    </li>
    <li class="sep" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></li>

    <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
      <a href="#" itemprop="item"><span itemprop="name">Suspensions</span></a>
      <meta itemprop="position" content="4">
    </li>
    <li class="sep" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></li>

    <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
      <span aria-current="page" itemprop="name">Lampe d'atelier articulée</span>
      <meta itemprop="position" content="5">
    </li>
  </ol>
</nav>

</body>
</html>
