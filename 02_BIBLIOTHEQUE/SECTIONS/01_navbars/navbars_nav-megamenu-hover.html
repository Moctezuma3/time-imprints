<title>Méga-menu au survol (panneau déroulant)</title>

<!-- ==========================================================================
     STYLE — Navigation 08 · Top nav neutre avec mega-menu déroulant au survol.
     Pilule de surbrillance qui glisse entre les liens (layout partagé) et
     panneau déroulant qui se redimensionne d'un item à l'autre (morph).
     Colonnes catégories : icône + titre + description. Monochrome clair,
     contenu placeholder neutre. Port React (framer-motion : layoutId hover-bg
     + menu) → JS natif (FLIP de largeur/hauteur, mesure offscreen, transitions).
     ========================================================================== -->
<style>
  :root{
    --bg:#fbfbfa;--surface:#ffffff;--fg:#16181d;
    --muted:#5c6270;--line:#e6e6e2;
    --hover:rgba(0,0,0,.05);
    /* CTA déjà plein --fg : le disque qui grandit est clair, l'encre passe en sombre */
    --accent:#f4f4f0;--accent-ink:var(--fg);
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
    --radius-pill:99px;--radius-panel:16px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  a{text-decoration:none;color:inherit}
  body{background:var(--bg);color:var(--fg);font-family:var(--font);
    min-height:100dvh;-webkit-font-smoothing:antialiased}

  /* ---------- 1. Header / barre ---------- */
  .header{position:sticky;top:0;z-index:20;background:var(--bg);
    border-bottom:1px solid var(--line)}
  .header__inner{max-width:78rem;margin:0 auto;padding:0 1.4rem;height:4rem;
    display:flex;align-items:center;justify-content:space-between;gap:1rem}
  .logo{font-weight:600;letter-spacing:-.02em;font-size:1.22rem}
  .actions{display:flex;gap:.6rem;align-items:center}
  .actions .ghost{font-size:.9rem;color:var(--muted);padding:.5rem .9rem;
    transition:color .25s}
  .actions .ghost:hover{color:var(--fg)}
  .actions .cta{font-size:.9rem;font-weight:500;color:#fff;background:var(--fg);
    padding:.5rem 1rem;border-radius:.5rem;transition:background .25s}
  .actions .cta:hover{background:#000}

  /* CTA — remplissage circulaire depuis le curseur (disque clair, encre inversée).
     Pointeur fin uniquement ; --x/--y posés par JS au point exact du curseur. */
  @media (hover:hover) and (pointer:fine){
    .actions .cta{position:relative;isolation:isolate;overflow:hidden;
      transition:background .25s,color .35s cubic-bezier(.16,1,.3,1)}
    .actions .cta::before{content:"";position:absolute;z-index:-1;
      top:var(--y,50%);left:var(--x,50%);width:0;height:0;border-radius:50%;
      background:var(--accent);transform:translate(-50%,-50%);
      transition:width .5s cubic-bezier(.16,1,.3,1),
        height .5s cubic-bezier(.16,1,.3,1)}
    .actions .cta:hover{color:var(--accent-ink)}
    .actions .cta:hover::before{width:320px;height:320px}
  }

  /* ---------- 2. Nav + pilule de surbrillance ---------- */
  .mm{position:relative;display:flex;align-items:center;list-style:none}
  /* PAS de position sur .mm__item : sinon l'offsetParent des boutons devient le
     <li> et btn.offsetLeft ≈ 0 → la pilule de surbrillance ET le bord gauche du
     panneau restent collés au 1er item (Produits) au lieu de suivre le survol.
     L'offsetParent doit rester le <ul class="mm"> (lui en position:relative). */
  .mm__item{position:static}
  .mm__btn{display:inline-flex;align-items:center;gap:.3rem;cursor:pointer;
    background:none;border:0;font:inherit;color:var(--muted);
    padding:.4rem 1rem;font-size:.9rem;position:relative;z-index:1;
    transition:color .3s}
  .mm__btn:hover,.mm__btn.is-active{color:var(--fg)}
  .mm__btn .chev{width:1rem;height:1rem;opacity:.8;
    transition:transform .3s var(--ease)}
  .mm__btn.is-open .chev{transform:rotate(180deg)}

  /* pilule partagée qui glisse sous l'item survolé (≈ layoutId hover-bg) */
  .mm__pill{position:absolute;top:0;left:0;height:0;width:0;
    background:var(--hover);border-radius:var(--radius-pill);
    opacity:0;pointer-events:none;z-index:0;
    transition:transform .3s var(--ease),width .3s var(--ease),
      height .3s var(--ease),opacity .2s}
  .mm__pill.show{opacity:1}

  /* ---------- 3. Panneau déroulant (morph) ---------- */
  .mm__panel{position:absolute;top:calc(100% + .5rem);left:0;z-index:15;
    width:0;height:0;overflow:hidden;
    background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius-panel);
    opacity:0;pointer-events:none;transform:translateY(-6px);
    transition:width .32s var(--ease),height .32s var(--ease),
      left .32s var(--ease),opacity .22s var(--ease),
      transform .22s var(--ease)}
  .mm__panel.open{opacity:1;pointer-events:auto;transform:translateY(0)}
  .mm__inner{position:absolute;top:0;left:0;padding:1rem;
    display:flex;gap:2.25rem;width:max-content}
  .mm__inner.fade{animation:mmFade .26s var(--ease)}
  @keyframes mmFade{from{opacity:0}to{opacity:1}}

  /* mesureur offscreen (sert à calculer la taille cible avant transition) */
  .mm__measure{position:absolute;visibility:hidden;pointer-events:none;
    top:-9999px;left:-9999px;padding:1rem;display:flex;gap:2.25rem;
    width:max-content}

  .mm__col h3{margin-bottom:1rem;font-size:.85rem;font-weight:500;
    text-transform:capitalize;color:var(--muted)}
  .mm__col ul{list-style:none;display:flex;flex-direction:column;gap:1.4rem}
  .mm__link{display:flex;align-items:flex-start;gap:.75rem}
  .mm__ico{flex:0 0 auto;display:flex;align-items:center;justify-content:center;
    width:2.25rem;height:2.25rem;border:1px solid var(--line);
    border-radius:.45rem;color:var(--fg);
    transition:background .3s,color .3s,border-color .3s}
  .mm__ico svg{width:1.15rem;height:1.15rem}
  .mm__link:hover .mm__ico{background:var(--fg);color:#fff;border-color:var(--fg)}
  .mm__txt{line-height:1.25;width:max-content}
  .mm__txt b{display:block;font-size:.875rem;font-weight:500;color:var(--fg)}
  .mm__txt span{display:block;font-size:.75rem;color:var(--muted);
    transition:color .3s}
  .mm__link:hover .mm__txt span{color:var(--fg)}

  /* ---------- 4. Révélation en cascade à l'ouverture (stagger) ----------
     État de repos = FERMÉ : colonnes et liens cachés (opacity:0 + translateY),
     piloté par la classe d'état du panneau, JAMAIS par un keyframe `backwards`
     sur un élément visible. Quand .mm__panel.open est posée, ils remontent et
     apparaissent avec un délai croissant (col 1 → col 2 → col 3, puis lien par
     lien), puis restent pleinement visibles. La fermeture les recache proprement
     sans casser le morph de taille du panneau. */
  /* cascade pilotée en JS (staggerReveal) : à chaque ouverture/morph, une
     animation `mmReveal` avec délai croissant est posée sur chaque titre + lien.
     ANIMATION (et non transition) : les éléments étant fraîchement injectés à
     chaque morph, elle se (re)joue de façon déterministe sur TOUS les items
     (Produits comme Solutions, Ressources…). Repos = visible (anti-disparition) ;
     l'état caché ne vit que dans le `from`. */
  @keyframes mmReveal{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  /* hamburger + panneau mobile (accessibilité mobile) — cachés sur desktop */
  .mm-burger{display:none;width:2.6rem;height:2.6rem;border:1px solid var(--line);border-radius:.55rem;
    position:relative;flex:none;background:none;cursor:pointer}
  .mm-burger span,.mm-burger span::before,.mm-burger span::after{content:"";position:absolute;left:50%;top:50%;
    width:1.1rem;height:2px;background:var(--fg);border-radius:2px;transform:translate(-50%,-50%);
    transition:transform .3s var(--ease),opacity .2s}
  .mm-burger span::before{transform:translate(-50%,-.35rem)}
  .mm-burger span::after{transform:translate(-50%,.35rem)}
  .mm-burger[aria-expanded="true"] span{background:transparent}
  .mm-burger[aria-expanded="true"] span::before{transform:translate(-50%,-50%) rotate(45deg)}
  .mm-burger[aria-expanded="true"] span::after{transform:translate(-50%,-50%) rotate(-45deg)}
  .mm-mobile{display:none;position:absolute;top:100%;left:0;right:0;background:var(--surface);
    border-bottom:1px solid var(--line);box-shadow:0 12px 30px -18px rgba(0,0,0,.5);
    padding:.8rem 1.4rem 1.2rem;opacity:0;transform:translateY(-8px);pointer-events:none;
    transition:opacity .28s var(--ease),transform .28s var(--ease)}
  .mm-mobile.is-open{opacity:1;transform:none;pointer-events:auto}
  .mm-mobile a{display:block;padding:.8rem .2rem;font-size:1rem;font-weight:500;color:var(--fg);
    border-bottom:1px solid var(--line)}
  .mm-mobile a.cta{margin-top:.9rem;text-align:center;background:var(--fg);color:#fff;
    border:0;border-radius:.5rem;padding:.85rem}

  /* ---------- 5. Responsive ---------- */
  @media (max-width:860px){
    .mm,.mm__panel,.mm__pill{display:none}   /* nav desktop + dropdowns masqués */
    .actions .ghost{display:none}
    .mm-burger{display:block}
    .mm-mobile{display:block}
  }
  @media (max-width:860px) and (prefers-reduced-motion:reduce){
    .mm-mobile,.mm-burger span,.mm-burger span::before,.mm-burger span::after{transition:none}
  }

  /* ---------- 6. Reduced motion ---------- */
  @media (prefers-reduced-motion:reduce){
    .mm__pill,.mm__panel,.mm__btn,.mm__btn .chev,.mm__ico,.mm__txt span,
    .mm__inner.fade{transition:none;animation:none}
    /* pas de cascade : colonnes/liens apparaissent simplement, sans translation
       ni délai (état visible direct, état caché instantané) */
    .mm__col,.mm__link{animation:none!important;transform:none;opacity:1}
    /* pas de remplissage animé du CTA */
    .actions .cta,.actions .cta::before{transition:none}
    .actions .cta:hover::before{width:0;height:0}
  }

  /* --- Animation d'entrée au chargement -------------------------------- */
  @keyframes navDrop{from{opacity:0;transform:translateY(-110%)}to{opacity:1;transform:translateY(0)}}
  @keyframes navIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
  .header__inner{animation:navDrop .7s cubic-bezier(.16,1,.3,1) backwards}
  .header__inner .logo{animation:navIn .6s cubic-bezier(.16,1,.3,1) .25s backwards}
  .mm__item{animation:navIn .6s cubic-bezier(.16,1,.3,1) .37s backwards}
  .mm__item:nth-child(2){animation-delay:.43s}
  .mm__item:nth-child(3){animation-delay:.49s}
  .mm__item:nth-child(4){animation-delay:.55s}
  .mm__item:nth-child(5){animation-delay:.61s}
  .mm__item:nth-child(6){animation-delay:.67s}
  .actions .cta{animation:navIn .6s cubic-bezier(.16,1,.3,1) .73s backwards}
  @media (prefers-reduced-motion:reduce){
    .header__inner,.header__inner .logo,.mm__item,.actions .cta{animation:none}
  }
</style>
</head>
<body>

<!-- ==========================================================================
     STRUCTURE
     ========================================================================== -->
<header class="header">
  <div class="header__inner">
    <div class="logo" data-slot="logo">Atelier</div>
    <nav aria-label="Navigation principale">
      <ul class="mm" id="mm"><!-- rendu par JS --></ul>
    </nav>
    <div class="actions">
      <a href="#" class="ghost">Connexion</a>
      <a href="#" class="cta" data-slot="cta">Commencer</a>
      <button class="mm-burger" id="mmBurger" aria-label="Ouvrir le menu" aria-expanded="false" aria-controls="mmMobile"><span></span></button>
    </div>
  </div>
  <!-- panneau mobile (hamburger) — liens construits en JS depuis les entrées de nav -->
  <div class="mm-mobile" id="mmMobile"></div>
</header>

<!-- ==========================================================================
     SCRIPT — données + rendu + interactions (pilule glissante, panneau morph)
     ========================================================================== -->
<script>
(function () {
  "use strict";

  /* --- icônes (tracés lucide simplifiés) --- */
  var ICONS = {
    cpu:'<rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2M15 20v2M2 15h2M2 9h2M20 15h2M20 9h2M9 2v2M9 20v2"/>',
    globe:'<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20M2 12h20"/>',
    eye:'<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>',
    shield:'<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1Z"/>',
    rocket:'<path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91 0Z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2Z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>',
    box:'<path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/>',
    search:'<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
    palette:'<circle cx="13.5" cy="6.5" r=".6" fill="currentColor" stroke="none"/><circle cx="17.5" cy="10.5" r=".6" fill="currentColor" stroke="none"/><circle cx="8.5" cy="7.5" r=".6" fill="currentColor" stroke="none"/><circle cx="6.5" cy="12.5" r=".6" fill="currentColor" stroke="none"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.93 0 1.65-.75 1.65-1.69 0-.44-.18-.83-.44-1.12-.29-.29-.44-.65-.44-1.13a1.64 1.64 0 0 1 1.67-1.67h2c3.05 0 5.56-2.5 5.56-5.55C22 6.01 17.46 2 12 2Z"/>',
    book:'<path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3Z"/>',
    file:'<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/>',
    news:'<path d="M15 18h-5"/><path d="M18 14h-8"/><path d="M22 6v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2"/><rect width="4" height="6" x="6" y="8" rx="1"/>'
  };
  function svg(name){
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" '+
           'stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+
           (ICONS[name]||'')+'</svg>';
  }

  /* --- données de navigation (placeholder FR générique) --- */
  var NAV = [
    { label:"Produits", sub:[
      { title:"Gamme", items:[
        { label:"Aperçu", desc:"Vue d'ensemble de l'offre", icon:"cpu" },
        { label:"Fonctionnalités", desc:"Tout ce qui est inclus", icon:"search" }
      ]},
      { title:"Services", items:[
        { label:"Hébergement", desc:"Rapide et fiable", icon:"globe" },
        { label:"Suivi", desc:"Visibilité en continu", icon:"eye" },
        { label:"Sécurité", desc:"Protection des données", icon:"shield" }
      ]},
      { title:"Ressources ouvertes", items:[
        { label:"Bibliothèque", desc:"Composants réutilisables", icon:"rocket" },
        { label:"Outils", desc:"Pour aller plus vite", icon:"box" },
        { label:"Kit de démarrage", desc:"Mise en route facilitée", icon:"palette" }
      ]}
    ]},
    { label:"Solutions", sub:[
      { title:"Cas d'usage", items:[
        { label:"Sites vitrines", desc:"Une présence en ligne soignée", icon:"cpu" },
        { label:"Boutiques", desc:"Vente en ligne", icon:"box" },
        { label:"Campagnes", desc:"Des pages dédiées", icon:"rocket" },
        { label:"Plateformes", desc:"Des outils sur mesure", icon:"globe" },
        { label:"Applications web", desc:"Vos produits en ligne", icon:"search" }
      ]},
      { title:"Profils", items:[
        { label:"Équipes techniques", desc:"Automatisez vos tâches", icon:"cpu" },
        { label:"Équipes design", desc:"Concrétisez vos idées", icon:"palette" }
      ]}
    ]},
    { label:"Ressources", sub:[
      { title:"Documentation", items:[
        { label:"Centre d'aide", desc:"Les bonnes pratiques", icon:"book" },
        { label:"Bibliothèque", desc:"Modèles et exemples", icon:"search" },
        { label:"Modèles", desc:"Démarrez rapidement", icon:"file" },
        { label:"Guides", desc:"Pas à pas", icon:"book" },
        { label:"Partenaires", desc:"Trouvez de l'aide", icon:"search" }
      ]},
      { title:"Entreprise", items:[
        { label:"Clients", desc:"Ils nous font confiance", icon:"news" },
        { label:"Blog", desc:"Les derniers articles", icon:"file" },
        { label:"Nouveautés", desc:"Ce qui a changé", icon:"book" },
        { label:"Presse", desc:"Nos actualités", icon:"news" }
      ]}
    ]},
    { label:"Entreprise", link:"#" },
    { label:"Documentation", link:"#" },
    { label:"Tarifs", link:"#" }
  ];

  var chev = '<svg class="chev" viewBox="0 0 24 24" fill="none" '+
    'stroke="currentColor" stroke-width="2" stroke-linecap="round" '+
    'stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>';

  function buildPanelHTML(item){
    var h = '';
    item.sub.forEach(function (col){
      h += '<div class="mm__col"><h3>'+col.title+'</h3><ul>';
      col.items.forEach(function (it){
        h += '<li><a class="mm__link" href="#">'+
               '<span class="mm__ico">'+svg(it.icon)+'</span>'+
               '<span class="mm__txt"><b>'+it.label+'</b>'+
               '<span>'+it.desc+'</span></span></a></li>';
      });
      h += '</ul></div>';
    });
    return h;
  }

  /* --- montage du DOM --- */
  var ul = document.getElementById('mm');
  if (!ul) return;

  var pill   = document.createElement('div'); pill.className   = 'mm__pill';
  var panel  = document.createElement('div'); panel.className  = 'mm__panel';
  var inner  = document.createElement('div'); inner.className  = 'mm__inner';
  var measure= document.createElement('div'); measure.className= 'mm__measure';
  panel.appendChild(inner);

  var buttons = [];
  NAV.forEach(function (item, i){
    var li = document.createElement('li'); li.className = 'mm__item';
    if (item.link){
      var a = document.createElement('a');
      a.className = 'mm__btn'; a.href = item.link;
      a.innerHTML = '<span>'+item.label+'</span>';
      li.appendChild(a); ul.appendChild(li); buttons.push(a);
    } else {
      var b = document.createElement('button');
      b.type = 'button'; b.className = 'mm__btn';
      b.setAttribute('aria-haspopup','true');
      b.setAttribute('aria-expanded','false');
      b.innerHTML = '<span>'+item.label+'</span>'+chev;
      b._item = item;
      li.appendChild(b); ul.appendChild(li); buttons.push(b);
    }
  });
  ul.appendChild(pill);
  ul.appendChild(panel);
  ul.appendChild(measure);

  var openItem = null;

  // cascade des colonnes/liens : une animation est posée par élément à CHAQUE
  // ouverture (déterministe sur tous les items, contrairement aux transitions).
  var REDUCE = window.matchMedia &&
    window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  function staggerReveal(container){
    if (REDUCE) return;
    var d = 30;                               // délai en ms, croissant
    [].forEach.call(container.querySelectorAll('.mm__col'), function (col){
      var els = [col.querySelector('h3')];
      [].push.apply(els, col.querySelectorAll('.mm__link'));
      els.forEach(function (el){
        if (!el || typeof el.animate !== 'function') return;
        // Web Animations API : (re)déclenche l'animation à CHAQUE appel, sur tous
        // les items, sans dépendre d'un changement d'état CSS / reflow.
        el.animate(
          [{ opacity: 0, transform: 'translateY(16px)' },
           { opacity: 1, transform: 'translateY(0)' }],
          { duration: 520, delay: d, easing: 'cubic-bezier(.16,1,.3,1)', fill: 'backwards' }
        );
        d += 50;
      });
      d += 25;                                // petit saut entre colonnes
    });
  }

  function movePill(btn){
    pill.style.transform = 'translate('+btn.offsetLeft+'px,'+btn.offsetTop+'px)';
    pill.style.width  = btn.offsetWidth  + 'px';
    pill.style.height = btn.offsetHeight + 'px';
    pill.classList.add('show');
  }

  function openPanel(btn){
    var item = btn._item;
    // taille cible mesurée offscreen
    measure.innerHTML = buildPanelHTML(item);
    var w = measure.offsetWidth, h = measure.offsetHeight;
    // contenu réel + crossfade
    inner.innerHTML = buildPanelHTML(item);
    staggerReveal(inner);                    // cascade déterministe (1 animation/élément), rejouée à chaque morph
    // position : aligné sur l'item, clampé dans le conteneur
    var maxLeft = Math.max(0, ul.clientWidth - w);
    var left = Math.min(btn.offsetLeft, maxLeft);
    panel.style.left   = left + 'px';
    panel.style.width  = w + 'px';
    panel.style.height = h + 'px';
    panel.classList.add('open');
    btn.classList.add('is-open');
    btn.setAttribute('aria-expanded','true');
    openItem = btn;
  }

  function closePanel(){
    panel.classList.remove('open');
    if (openItem){
      openItem.classList.remove('is-open');
      openItem.setAttribute('aria-expanded','false');
      openItem = null;
    }
  }

  buttons.forEach(function (btn){
    btn.addEventListener('mouseenter', function (){
      movePill(btn);
      buttons.forEach(function (b){ b.classList.remove('is-active'); });
      btn.classList.add('is-active');
      if (btn._item) openPanel(btn); else if (openItem) closePanel();
    });
    btn.addEventListener('focus', function (){
      movePill(btn);
      if (btn._item) openPanel(btn); else if (openItem) closePanel();
    });
  });

  // quitter toute la zone (nav + panneau) ferme et masque la pilule
  ul.addEventListener('mouseleave', function (){
    pill.classList.remove('show');
    buttons.forEach(function (b){ b.classList.remove('is-active'); });
    closePanel();
  });

  document.addEventListener('keydown', function (e){
    if (e.key === 'Escape'){
      pill.classList.remove('show');
      closePanel();
    }
  });

  /* --- CTA : remplissage circulaire depuis le curseur ---
     Pose --x/--y au point exact du curseur (relatif au bouton) ; le CSS fait
     grandir le disque d'accent depuis ce point. Pointeur fin uniquement, et
     pas de magnétisme : on se contente de positionner l'origine du disque. */
  var fine = window.matchMedia &&
             window.matchMedia('(hover:hover) and (pointer:fine)').matches;
  if (fine){
    var cta = document.querySelector('.actions .cta');
    if (cta){
      var setOrigin = function (e){
        var r = cta.getBoundingClientRect();
        cta.style.setProperty('--x', (e.clientX - r.left) + 'px');
        cta.style.setProperty('--y', (e.clientY - r.top)  + 'px');
      };
      cta.addEventListener('mouseenter', setOrigin);
      cta.addEventListener('mousemove',  setOrigin);
    }
  }
})();
</script>

<!-- SCRIPT (ajout) — hamburger mobile : construit le panneau depuis les entrées de nav rendues, toggle accessible -->
<script>
(function () {
  var header = document.querySelector('.header');
  var burger = document.getElementById('mmBurger');
  var panel  = document.getElementById('mmMobile');
  if (!header || !burger || !panel) return;

  /* liens du panneau = libellés de premier niveau déjà rendus (+ actions) */
  var labels = [].slice.call(document.querySelectorAll('#mm .mm__btn'))
    .map(function (b) { return b.textContent.trim(); })
    .filter(Boolean);
  var html = labels.map(function (l) { return '<a href="#">' + l + '</a>'; }).join('');
  html += '<a href="#">Connexion</a><a class="cta" href="#">Commencer</a>';
  panel.innerHTML = html;

  function setOpen (open) {
    burger.setAttribute('aria-expanded', String(open));
    burger.setAttribute('aria-label', open ? 'Fermer le menu' : 'Ouvrir le menu');
    panel.classList.toggle('is-open', open);
  }
  burger.addEventListener('click', function () {
    setOpen(burger.getAttribute('aria-expanded') !== 'true');
  });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') setOpen(false); });
  document.addEventListener('click', function (e) { if (!header.contains(e.target)) setOpen(false); });
  panel.addEventListener('click', function (e) { if (e.target.closest('a')) setOpen(false); });
})();
</script>
