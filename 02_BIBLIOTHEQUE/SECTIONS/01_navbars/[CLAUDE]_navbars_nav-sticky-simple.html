<title>Navbar sticky à pilule glissante + CTA encre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — Navbar · Sticky + pilule glissante + CTA encre
     Logo + liens + CTA. Pilule de surbrillance qui glisse sous le lien survolé,
     CTA à remplissage circulaire depuis le curseur, hamburger mobile en cascade.
     JS natif, clair.
     ========================================================================== -->
<style>
  /* 1. Tokens ------------------------------------------------------------ */
  :root{
    --bg:#ffffff;--fg:#16181d;--muted:#5c6270;--line:#e6e6e2;
    --hover:rgba(0,0,0,.05);--accent:#16181d;--accent-fg:#ffffff;--ink:#ffffff;
    --maxw:76rem;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  /* 2. Reset ------------------------------------------------------------- */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  a{text-decoration:none;color:inherit}
  button{font:inherit;cursor:pointer;background:none;border:none;color:inherit}
  body{background:#f4f4f0;color:var(--fg);font-family:var(--font);line-height:1.6;min-height:160vh}

  /* 3. Header ------------------------------------------------------------ */
  .header{position:sticky;top:0;z-index:50;background:var(--bg);
    border-bottom:1px solid transparent;transition:box-shadow .3s var(--ease),border-color .3s}
  .header.is-scrolled{border-color:var(--line);box-shadow:0 6px 24px -18px rgba(0,0,0,.5)}
  .inner{max-width:var(--maxw);margin:0 auto;padding:0 1.4rem;height:4.4rem;
    display:flex;align-items:center;justify-content:space-between;gap:1rem}

  .brand{font-size:1.2rem;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:.5rem}
  .brand .dot{width:.65rem;height:.65rem;border-radius:50%;background:var(--accent)}

  /* nav + pilule glissante */
  .nav{position:relative;display:flex;align-items:center;gap:.2rem}
  .nav a:not(.btn){font-size:.95rem;font-weight:500;color:var(--muted);position:relative;z-index:1;
    padding:.5rem .9rem;border-radius:.55rem;transition:color .25s}
  .nav a:not(.btn):hover{color:var(--fg)}
  .nav__pill{position:absolute;top:0;left:0;width:0;height:0;background:var(--hover);
    border-radius:.55rem;opacity:0;pointer-events:none;z-index:0;
    transition:transform .32s var(--ease),width .32s var(--ease),height .32s var(--ease),opacity .2s}
  .nav__pill.show{opacity:1}

  .btn{display:inline-flex;align-items:center;justify-content:center;
    background:var(--accent);color:var(--accent-fg);font-weight:600;font-size:.92rem;
    padding:.6rem 1.1rem;border-radius:.6rem;transition:transform .2s var(--ease)}
  @media (hover:hover) and (pointer:fine){.btn:hover{transform:translateY(-2px)}}

  /* CTA — remplissage circulaire depuis le curseur (souris fine) */
  @media (hover:hover) and (pointer:fine){
    .btn{position:relative;isolation:isolate;overflow:hidden;
      transition:transform .2s var(--ease),color .35s var(--ease)}
    .btn::before{content:"";position:absolute;z-index:-1;top:var(--y,50%);left:var(--x,50%);
      width:0;height:0;border-radius:50%;background:var(--ink);transform:translate(-50%,-50%);
      transition:width .5s var(--ease),height .5s var(--ease)}
    .btn:hover{color:var(--fg)}
    .btn:hover::before{width:340px;height:340px}
  }

  .actions{display:flex;align-items:center;gap:1rem}

  /* hamburger */
  .burger{display:none;width:2.6rem;height:2.6rem;border:1px solid var(--line);border-radius:.55rem;
    position:relative;flex:none}
  .burger span,.burger span::before,.burger span::after{content:"";position:absolute;left:50%;top:50%;
    width:1.1rem;height:2px;background:var(--fg);border-radius:2px;transform:translate(-50%,-50%);
    transition:transform .3s var(--ease),opacity .2s}
  .burger span::before{transform:translate(-50%,-.35rem)}
  .burger span::after{transform:translate(-50%,.35rem)}
  .burger[aria-expanded="true"] span{background:transparent}
  .burger[aria-expanded="true"] span::before{transform:translate(-50%,-50%) rotate(45deg)}
  .burger[aria-expanded="true"] span::after{transform:translate(-50%,-50%) rotate(-45deg)}

  .panel{display:none}

  /* 6. Responsive -------------------------------------------------------- */
  @media (max-width:820px){
    .nav{display:none}
    .burger{display:block}
    .panel{display:block;position:absolute;top:100%;left:0;right:0;background:var(--bg);
      border-bottom:1px solid var(--line);box-shadow:0 12px 30px -18px rgba(0,0,0,.5);
      padding:.8rem 1.4rem 1.2rem;
      opacity:0;transform:translateY(-8px);pointer-events:none;
      transition:opacity .28s var(--ease),transform .28s var(--ease)}
    .panel.is-open{opacity:1;transform:none;pointer-events:auto}
    /* cascade des liens à l'ouverture */
    .panel a{opacity:0;transform:translateY(-6px);transition:opacity .3s var(--ease),transform .3s var(--ease)}
    .panel.is-open a{opacity:1;transform:none}
    .panel.is-open a:nth-child(1){transition-delay:.06s}
    .panel.is-open a:nth-child(2){transition-delay:.11s}
    .panel.is-open a:nth-child(3){transition-delay:.16s}
    .panel.is-open a:nth-child(4){transition-delay:.21s}
    .panel.is-open a:nth-child(5){transition-delay:.26s}
    .panel a:not(.btn){display:block;padding:.8rem .2rem;font-size:1rem;font-weight:500;
      border-bottom:1px solid var(--line)}
    .panel .btn{width:100%;margin-top:.9rem;padding:.85rem}
  }

  /* 7. Accessibilité ----------------------------------------------------- */
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:.4rem}
  @media (prefers-reduced-motion:reduce){
    .header,.btn,.btn::before,.panel,.panel a,.nav__pill,
    .burger span,.burger span::before,.burger span::after{transition:none}
  }

  /* entrée au chargement */
  @keyframes navIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
  .brand{animation:navIn .6s var(--ease) .05s backwards}
  .nav a{animation:navIn .6s var(--ease) backwards}
  .nav a:nth-child(1){animation-delay:.12s}.nav a:nth-child(2){animation-delay:.18s}
  .nav a:nth-child(3){animation-delay:.24s}.nav a:nth-child(4){animation-delay:.3s}
  .actions{animation:navIn .6s var(--ease) .36s backwards}
  @media (prefers-reduced-motion:reduce){.brand,.nav a,.actions{animation:none}}
</style>
</head>
<body>

<!-- ==========================================================================
     STRUCTURE — logo + liens (pilule glissante) + CTA (encre) + hamburger.
     Le panneau .panel duplique les liens pour le mobile.
     ========================================================================== -->
<header class="header" id="header">
  <div class="inner">
    <a class="brand" href="#" data-slot="logo"><span class="dot" data-keep></span>Marque</a>

    <nav class="nav" id="nav" data-slot="liens" aria-label="Navigation principale">
      <span class="nav__pill" aria-hidden="true"></span>
      <a href="#" data-slot-item>Services</a>
      <a href="#">Réalisations</a>
      <a href="#">À propos</a>
      <a href="#">Contact</a>
    </nav>

    <div class="actions">
      <a class="btn" href="#" data-slot="cta">Demander un devis</a>
      <button class="burger" id="burger" aria-label="Ouvrir le menu" aria-expanded="false" aria-controls="mobile-panel"><span></span></button>
    </div>
  </div>

  <div class="panel" id="mobile-panel">
    <a href="#">Services</a>
    <a href="#">Réalisations</a>
    <a href="#">À propos</a>
    <a href="#">Contact</a>
    <a class="btn" href="#">Demander un devis</a>
  </div>
</header>

<!-- SCRIPT — pilule glissante + CTA encre + ombre au scroll + hamburger accessible -->
<script>
  (function () {
    var header = document.getElementById('header');
    var nav    = document.getElementById('nav');
    var pill   = nav ? nav.querySelector('.nav__pill') : null;
    var burger = document.getElementById('burger');
    var panel  = document.getElementById('mobile-panel');
    var fine   = window.matchMedia('(hover:hover) and (pointer:fine)').matches;

    /* pilule glissante sous le lien survolé (offset relatif à .nav) */
    if (pill && fine) {
      var links = [].slice.call(nav.querySelectorAll('a:not(.btn)'));
      links.forEach(function (a) {
        a.addEventListener('mouseenter', function () {
          pill.style.transform = 'translate(' + a.offsetLeft + 'px,' + a.offsetTop + 'px)';
          pill.style.width  = a.offsetWidth + 'px';
          pill.style.height = a.offsetHeight + 'px';
          pill.classList.add('show');
        });
      });
      nav.addEventListener('mouseleave', function () { pill.classList.remove('show'); });
    }

    /* CTA — origine du disque au point exact du curseur */
    if (fine) {
      [].forEach.call(document.querySelectorAll('.btn'), function (btn) {
        function origin (e) {
          var r = btn.getBoundingClientRect();
          btn.style.setProperty('--x', (e.clientX - r.left) + 'px');
          btn.style.setProperty('--y', (e.clientY - r.top) + 'px');
        }
        btn.addEventListener('mouseenter', origin);
        btn.addEventListener('mousemove', origin);
      });
    }

    /* ombre au scroll */
    var onScroll = function () { header.classList.toggle('is-scrolled', window.scrollY > 4); };
    onScroll(); window.addEventListener('scroll', onScroll, { passive: true });

    /* hamburger */
    function setOpen (open) {
      burger.setAttribute('aria-expanded', String(open));
      burger.setAttribute('aria-label', open ? 'Fermer le menu' : 'Ouvrir le menu');
      panel.classList.toggle('is-open', open);
    }
    burger.addEventListener('click', function () {
      setOpen(burger.getAttribute('aria-expanded') !== 'true');
    });
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') setOpen(false); });
    document.addEventListener('click', function (e) { if (!header.contains(e.target)) setOpen(false); });
    panel.addEventListener('click', function (e) { if (e.target.closest('a')) setOpen(false); });
  })();
</script>

</body>
</html>
