<title>Navbar logo centré magnétique (révélation lettre par lettre)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — Navbar · Logo centré magnétique
     Logo révélé lettre par lettre, trait qui se trace, liens magnétiques,
     CTA à remplissage depuis le curseur. Hamburger mobile. JS natif, clair.
     ========================================================================== -->
<style>
  /* 1. Tokens ------------------------------------------------------------ */
  :root{
    --bg:#ffffff;--fg:#16181d;--muted:#5c6270;--line:#e6e6e2;
    --accent:#16181d;--accent-fg:#ffffff;--ink:#ffffff;
    --maxw:80rem;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  /* 2. Reset ------------------------------------------------------------- */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  a{text-decoration:none;color:inherit}
  button{font:inherit;cursor:pointer;background:none;border:none;color:inherit}
  body{background:#f4f4f0;color:var(--fg);font-family:var(--font);line-height:1.6;min-height:160vh}

  /* 3. Header ------------------------------------------------------------ */
  .header{position:sticky;top:0;z-index:50;background:var(--bg);
    transition:box-shadow .3s var(--ease)}
  .header.is-scrolled{box-shadow:0 6px 24px -18px rgba(0,0,0,.5)}
  /* trait fin qui se trace au chargement */
  .header::after{content:"";position:absolute;left:0;bottom:0;width:100%;height:1px;
    background:var(--line);transform:scaleX(0);transform-origin:left;
    animation:drawLine .9s var(--ease) .2s forwards}
  @keyframes drawLine{to{transform:scaleX(1)}}
  .inner{max-width:var(--maxw);margin:0 auto;padding:0 1.4rem;height:4.6rem;
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:1rem}

  .brand{grid-column:2;justify-self:center;font-size:1.15rem;font-weight:700;
    letter-spacing:.18em;text-transform:uppercase;white-space:nowrap}
  .brand .ltr{display:inline-block;opacity:0;transform:translateY(.5em);
    animation:ltrIn .5s var(--ease) forwards}
  @keyframes ltrIn{to{opacity:1;transform:none}}

  .side{display:flex;align-items:center;gap:1.4rem}
  .side--left{justify-self:start}
  .side--right{justify-self:end}
  .side a:not(.btn){font-size:.9rem;font-weight:500;color:var(--fg);position:relative;
    padding:.3rem .2rem;letter-spacing:.02em;will-change:transform;
    transition:transform .25s var(--ease)}
  .side a:not(.btn)::after{content:"";position:absolute;left:0;right:100%;bottom:-.15rem;height:1.5px;
    background:currentColor;transition:right .3s var(--ease)}
  @media (hover:hover) and (pointer:fine){.side a:not(.btn):hover::after{right:0}}

  .btn{display:inline-flex;align-items:center;justify-content:center;
    background:var(--accent);color:var(--accent-fg);font-weight:600;font-size:.9rem;
    padding:.55rem 1.05rem;border-radius:.6rem;transition:transform .2s var(--ease)}
  @media (hover:hover) and (pointer:fine){
    .btn{position:relative;isolation:isolate;overflow:hidden;
      transition:transform .2s var(--ease),color .35s var(--ease)}
    .btn::before{content:"";position:absolute;z-index:-1;top:var(--y,50%);left:var(--x,50%);
      width:0;height:0;border-radius:50%;background:var(--ink);transform:translate(-50%,-50%);
      transition:width .5s var(--ease),height .5s var(--ease)}
    .btn:hover{color:var(--fg);transform:translateY(-2px)}
    .btn:hover::before{width:300px;height:300px}
  }

  /* hamburger */
  .burger{display:none;width:2.5rem;height:2.5rem;border:1px solid var(--line);border-radius:.55rem;
    position:relative;flex:none;justify-self:start;grid-column:1}
  .burger span,.burger span::before,.burger span::after{content:"";position:absolute;left:50%;top:50%;
    width:1.1rem;height:2px;background:var(--fg);border-radius:2px;transform:translate(-50%,-50%);
    transition:transform .3s var(--ease),opacity .2s}
  .burger span::before{transform:translate(-50%,-.35rem)}
  .burger span::after{transform:translate(-50%,.35rem)}
  .burger[aria-expanded="true"] span{background:transparent}
  .burger[aria-expanded="true"] span::before{transform:translate(-50%,-50%) rotate(45deg)}
  .burger[aria-expanded="true"] span::after{transform:translate(-50%,-50%) rotate(-45deg)}

  .panel{display:none}

  /* 6. Responsive -------------------------------------------------------- */
  @media (max-width:860px){
    .side{display:none}
    .burger{display:block}
    .panel{display:block;position:absolute;top:100%;left:0;right:0;background:var(--bg);
      border-bottom:1px solid var(--line);box-shadow:0 12px 30px -18px rgba(0,0,0,.5);
      padding:.8rem 1.4rem 1.2rem;text-align:center;
      opacity:0;transform:translateY(-8px);pointer-events:none;
      transition:opacity .28s var(--ease),transform .28s var(--ease)}
    .panel.is-open{opacity:1;transform:none;pointer-events:auto}
    .panel a{opacity:0;transform:translateY(-6px);transition:opacity .3s var(--ease),transform .3s var(--ease)}
    .panel.is-open a{opacity:1;transform:none}
    .panel.is-open a:nth-child(1){transition-delay:.06s}
    .panel.is-open a:nth-child(2){transition-delay:.11s}
    .panel.is-open a:nth-child(3){transition-delay:.16s}
    .panel.is-open a:nth-child(4){transition-delay:.21s}
    .panel.is-open a:nth-child(5){transition-delay:.26s}
    .panel a:not(.btn){display:block;padding:.8rem .2rem;font-size:1rem;font-weight:500;
      letter-spacing:.02em;border-bottom:1px solid var(--line)}
    .panel .btn{width:100%;margin-top:.9rem;padding:.85rem}
  }

  /* 7. Accessibilité ----------------------------------------------------- */
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:.4rem}
  @media (prefers-reduced-motion:reduce){
    .header::after{animation:none;transform:none}
    .brand .ltr{animation:none;opacity:1;transform:none}
    .side a,.header,.btn,.btn::before,.panel,.panel a,
    .burger span,.burger span::before,.burger span::after{transition:none}
  }
</style>
</head>
<body>

<!-- ==========================================================================
     STRUCTURE — liens gauche + logo centré (lettres) + liens/CTA droite.
     Le panneau .panel rassemble tous les liens pour le mobile.
     ========================================================================== -->
<header class="header" id="header">
  <div class="inner">
    <button class="burger" id="burger" aria-label="Ouvrir le menu" aria-expanded="false" aria-controls="mobile-panel"><span></span></button>

    <nav class="side side--left" aria-label="Navigation gauche">
      <a href="#" data-mag>Prestations</a>
      <a href="#" data-mag>Tarifs</a>
    </nav>

    <a class="brand" href="#" data-slot="logo" data-letters>Marque</a>

    <nav class="side side--right" data-slot="liens" aria-label="Navigation droite">
      <a href="#" data-mag data-slot-item>Galerie</a>
      <a href="#" data-mag>Contact</a>
      <a class="btn" href="#" data-slot="cta">Réserver</a>
    </nav>
  </div>

  <div class="panel" id="mobile-panel">
    <a href="#">Prestations</a>
    <a href="#">Tarifs</a>
    <a href="#">Galerie</a>
    <a href="#">Contact</a>
    <a class="btn" href="#">Réserver</a>
  </div>
</header>

<!-- SCRIPT — logo lettre par lettre + liens magnétiques + CTA encre + hamburger -->
<script>
  (function () {
    var header = document.getElementById('header');
    var burger = document.getElementById('burger');
    var panel  = document.getElementById('mobile-panel');
    var rm     = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
    var fine   = window.matchMedia('(hover:hover) and (pointer:fine)').matches;

    /* logo révélé lettre par lettre */
    var brand = document.querySelector('[data-letters]');
    if (brand && !rm) {
      var txt = brand.textContent, frag = document.createDocumentFragment();
      txt.split('').forEach(function (ch, i) {
        var s = document.createElement('span'); s.className = 'ltr';
        s.textContent = ch === ' ' ? ' ' : ch;
        s.style.animationDelay = (0.25 + i * 0.05) + 's';
        frag.appendChild(s);
      });
      brand.textContent = ''; brand.appendChild(frag);
    }

    /* liens magnétiques (souris fine) */
    if (fine && !rm) {
      [].forEach.call(document.querySelectorAll('[data-mag]'), function (el) {
        el.addEventListener('mousemove', function (e) {
          var r = el.getBoundingClientRect();
          var x = (e.clientX - r.left - r.width / 2) * 0.3;
          var y = (e.clientY - r.top - r.height / 2) * 0.3;
          el.style.transform = 'translate(' + x.toFixed(1) + 'px,' + y.toFixed(1) + 'px)';
        });
        el.addEventListener('mouseleave', function () { el.style.transform = ''; });
      });
    }

    /* CTA — origine du disque au curseur */
    if (fine) {
      [].forEach.call(document.querySelectorAll('.btn'), function (btn) {
        function origin (e) {
          var r = btn.getBoundingClientRect();
          btn.style.setProperty('--x', (e.clientX - r.left) + 'px');
          btn.style.setProperty('--y', (e.clientY - r.top) + 'px');
        }
        btn.addEventListener('mouseenter', origin);
        btn.addEventListener('mousemove', origin);
      });
    }

    /* ombre au scroll */
    var onScroll = function () { header.classList.toggle('is-scrolled', window.scrollY > 4); };
    onScroll(); window.addEventListener('scroll', onScroll, { passive: true });

    /* hamburger */
    function setOpen (open) {
      burger.setAttribute('aria-expanded', String(open));
      burger.setAttribute('aria-label', open ? 'Fermer le menu' : 'Ouvrir le menu');
      panel.classList.toggle('is-open', open);
    }
    burger.addEventListener('click', function () {
      setOpen(burger.getAttribute('aria-expanded') !== 'true');
    });
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') setOpen(false); });
    document.addEventListener('click', function (e) { if (!header.contains(e.target)) setOpen(false); });
    panel.addEventListener('click', function (e) { if (e.target.closest('a')) setOpen(false); });
  })();
</script>

</body>
</html>
