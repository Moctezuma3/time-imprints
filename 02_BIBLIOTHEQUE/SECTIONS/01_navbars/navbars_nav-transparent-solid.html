<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="lib:tags" content="JS natif, mix, scroll, remplissage-curseur">
<meta name="lib:utilite" content="Header transparent sur le hero (texte clair), bascule en fond plein + texte sombre dès qu'on quitte le hero. Bascule via IntersectionObserver sur une sentinelle. Indicateur glissant au survol : un trait accent glisse d'un lien à l'autre (façon Webflow), visible dans les deux états. CTA à remplissage circulaire depuis le curseur : au survol, un disque d'accent grandit depuis le point exact du curseur jusqu'à remplir le bouton, le texte s'inverse (lisible en transparent comme en solide). JS natif.">

<!-- /lib:meta -->
<title>Navigation transparente puis pleine au scroll</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — Navigation · Transparente → pleine au scroll
     Header transparent posé sur le hero (texte clair), qui bascule en
     fond plein + texte sombre dès qu'on quitte le hero. Bascule pilotée
     par un IntersectionObserver sur une sentinelle (pas de scroll listener).
     ========================================================================== -->
<style>
  /* 1. Tokens ------------------------------------------------------------ */
  :root{
    --bg:#fbfbfa;--surface:#ffffff;--fg:#16181d;--muted:#5c6270;
    --line:#e6e6e2;--accent:#3b6ef5;--accent-fg:#ffffff;
    --maxw:74rem;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  /* 2. Reset ------------------------------------------------------------- */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  a{text-decoration:none;color:inherit}
  body{background:var(--bg);color:var(--fg);font-family:var(--font);line-height:1.6}

  /* 3. Layout : header --------------------------------------------------- */
  .header{position:fixed;top:0;left:0;right:0;z-index:20;
    background:transparent;border-bottom:1px solid transparent;
    transition:background .35s var(--ease),border-color .35s var(--ease),box-shadow .35s}
  .header__inner{max-width:var(--maxw);margin:0 auto;padding:0 1.4rem;height:4.2rem;
    display:flex;align-items:center;justify-content:space-between;gap:1rem}
  .logo{display:flex;align-items:center;gap:.55rem;font-weight:800;
    letter-spacing:-.02em;font-size:1.3rem;color:#fff;transition:color .35s var(--ease)}
  .logo .dot{width:.78rem;height:.78rem;border-radius:50%;background:var(--accent);flex:none}
  .nav{display:flex;align-items:center;gap:1.6rem}
  .nav a{font-size:.93rem;font-weight:500;color:rgba(255,255,255,.85);
    transition:color .25s,opacity .2s}

  /* Indicateur glissant (façon Webflow) — un trait accent glisse d'un lien
     à l'autre au survol/focus. Posé sur .nav (conteneur des liens). */
  .nav{position:relative}
  .nav a{position:relative;z-index:1}
  .nav__ind{position:absolute;bottom:.7rem;left:0;height:2px;border-radius:2px;
    background:var(--accent);width:0;opacity:0;transform:translateX(0);
    pointer-events:none;z-index:0;
    transition:transform .34s var(--ease),width .34s var(--ease),opacity .2s var(--ease)}
  /* Lisibilité 2 états : l'accent (#3b6ef5) contraste sur le hero sombre ;
     sur l'état plein (fond clair) il reste vif et bien visible. */
  .header.is-solid .nav__ind{background:var(--accent)}
  .cta{position:relative;isolation:isolate;overflow:hidden;
    display:inline-flex;align-items:center;padding:.55rem 1.1rem;border-radius:.6rem;
    border:1.5px solid rgba(255,255,255,.6);color:#fff;font-size:.9rem;font-weight:600;
    transition:color .35s var(--ease),border-color .25s,transform .2s var(--ease)}
  /* Effet E — remplissage circulaire depuis le curseur (disque accent par-dessus
     un fond neutre transparent : lisible sur le hero clair ET sur la barre solide,
     car le texte passe sur l'accent dans les deux cas). */
  .cta::before{content:"";position:absolute;z-index:-1;
    top:var(--y,50%);left:var(--x,50%);width:0;height:0;border-radius:50%;
    background:var(--accent);transform:translate(-50%,-50%);
    transition:width .5s var(--ease),height .5s var(--ease)}

  /* 3b. État « plein » (hors hero) -------------------------------------- */
  .header.is-solid{background:rgba(251,251,250,.92);backdrop-filter:blur(12px);
    border-bottom-color:var(--line);box-shadow:0 8px 24px -18px rgba(0,0,0,.4)}
  .header.is-solid .logo{color:var(--fg)}
  .header.is-solid .nav a{color:var(--muted)}
  .header.is-solid .cta{border-color:var(--accent);color:var(--accent)}

  /* burger (mobile only) — suit l'état clair/sombre du header */
  .burger{display:none;width:2.6rem;height:2.6rem;border:1.5px solid rgba(255,255,255,.6);
    border-radius:.6rem;background:transparent;cursor:pointer;flex:none;
    align-items:center;justify-content:center;transition:border-color .35s var(--ease)}
  .burger span,.burger span::before,.burger span::after{content:"";display:block;
    width:1.05rem;height:2px;background:#fff;
    transition:transform .25s var(--ease),opacity .2s,background .35s var(--ease)}
  .burger span::before{transform:translateY(-.32rem)}
  .burger span::after{transform:translateY(.32rem)}
  .header.is-solid .burger{border-color:var(--line)}
  .header.is-solid .burger span,
  .header.is-solid .burger span::before,
  .header.is-solid .burger span::after{background:var(--fg)}
  #ts-toggle{position:absolute;opacity:0;pointer-events:none}

  /* 4. Espaceurs neutres (isolat navbar) --------------------------------- */
  /* bande sombre : la navbar transparente y reste lisible (texte clair) */
  .spacer-dark{position:relative;min-height:110vh;
    background:linear-gradient(180deg,#1a1c22,#2a2d35)}
  /* zone claire : en sortant de la bande sombre, le header passe en solide */
  .spacer-light{min-height:140vh;background:var(--bg)}

  /* sentinelle invisible : marque la fin de la zone « transparente » */
  #sentinel{position:absolute;top:82vh;height:1px;width:1px}

  /* 5. Accent / hover ---------------------------------------------------- */
  @media (hover:hover) and (pointer:fine){
    .nav a:hover{opacity:1;color:#fff}
    .header.is-solid .nav a:hover{color:var(--fg)}
    /* Effet E : le disque accent grandit depuis le curseur et remplit le bouton,
       le texte s'inverse (--accent-fg, lisible sur l'accent dans les 2 états). */
    .cta:hover{color:var(--accent-fg);border-color:var(--accent);transform:translateY(-1px)}
    .cta:hover::before{width:300px;height:300px}
    .header.is-solid .cta:hover{color:var(--accent-fg);border-color:var(--accent)}
  }

  /* 6. Responsive -------------------------------------------------------- */
  @media (max-width:680px){
    .header__inner{position:relative}
    .burger{display:inline-flex}
    .nav{position:absolute;top:calc(100% + .6rem);right:0;left:0;
      flex-direction:column;align-items:stretch;gap:0;
      background:var(--surface);border:1px solid var(--line);border-radius:.9rem;
      padding:.4rem .9rem 1rem;box-shadow:0 20px 44px -18px rgba(0,0,0,.45);
      opacity:0;transform:translateY(-10px);pointer-events:none;
      transition:opacity .25s var(--ease),transform .3s var(--ease)}
    .nav a{color:var(--muted);padding:.9rem .2rem;border-bottom:1px solid var(--line);font-size:1rem}
    .nav__ind{display:none}
    .nav .cta{margin-top:.9rem;justify-content:center;
      border:1.5px solid var(--accent);color:var(--accent)}
    #ts-toggle:checked ~ .header__inner .nav{opacity:1;transform:none;pointer-events:auto}
    #ts-toggle:checked ~ .header__inner .burger span{background:transparent}
    #ts-toggle:checked ~ .header__inner .burger span::before{transform:rotate(45deg)}
    #ts-toggle:checked ~ .header__inner .burger span::after{transform:rotate(-45deg)}
  }

  /* 7. Accessibilité ----------------------------------------------------- */
  :focus-visible{outline:2px solid #fff;outline-offset:3px;border-radius:.3rem}
  .header.is-solid :focus-visible{outline-color:var(--accent)}
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important}
    /* Effet E sans animation : pas de disque qui grandit, simple bascule d'état.
       Le ::before couvre tout le bouton instantanément au survol. */
    .cta::before{top:50%;left:50%;border-radius:.6rem}
    @media (hover:hover) and (pointer:fine){
      .cta:hover::before{width:100%;height:100%}
    }
  }

  /* --- Animation d'entrée au chargement -------------------------------- */
  /* La barre bascule .is-solid au scroll (fond/bordure, pas de transform) :
     navDrop OK sur la barre. */
  @keyframes navDrop{from{opacity:0;transform:translateY(-110%)}to{opacity:1;transform:translateY(0)}}
  @keyframes navIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
  .header{animation:navDrop .7s cubic-bezier(.16,1,.3,1) backwards}
  .logo{animation:navIn .6s cubic-bezier(.16,1,.3,1) .25s backwards}
  .nav{animation:navIn .6s cubic-bezier(.16,1,.3,1) .37s backwards}
  .cta{animation:navIn .6s cubic-bezier(.16,1,.3,1) .49s backwards}
  @media (prefers-reduced-motion:reduce){.header,.logo,.nav,.cta{animation:none}}
</style>
</head>
<body>

<!-- ==========================================================================
     STRUCTURE — header fixe transparent + hero plein écran. La sentinelle
     en fin de hero déclenche le passage en mode « plein ».
     ========================================================================== -->
<header class="header" id="header">
  <input type="checkbox" id="ts-toggle" aria-hidden="true">
  <div class="header__inner">
    <a href="#" class="logo" data-slot="logo"><span class="dot" data-keep></span>Horizon</a>
    <nav class="nav" aria-label="Navigation principale" data-slot="liens">
      <a href="#" data-slot-item>Collection</a>
      <a href="#">Maison</a>
      <a href="#">Histoire</a>
      <a href="#" class="cta" data-slot="cta">Réserver</a>
    </nav>
    <label class="burger" for="ts-toggle" role="button"
           aria-label="Ouvrir le menu" tabindex="0"><span></span></label>
  </div>
</header>

<!-- Espaceur neutre sombre : état transparent visible (navbar texte clair) -->
<section class="spacer-dark" aria-hidden="true">
  <span id="sentinel" aria-hidden="true"></span>
</section>

<!-- Espaceur neutre clair : déclenche l'état solide au scroll -->
<section class="spacer-light" aria-hidden="true"></section>

<!-- ==========================================================================
     SCRIPT — bascule .is-solid quand la sentinelle (fin de hero) sort du
     viewport. Fallback : sans JS, le header reste lisible sur le hero.
     ========================================================================== -->
<script>
  (function(){
    var header = document.getElementById('header');
    var sentinel = document.getElementById('sentinel');
    if(!('IntersectionObserver' in window)){ header.classList.add('is-solid'); return; }
    new IntersectionObserver(function(entries){
      header.classList.toggle('is-solid', !entries[0].isIntersecting);
    }, { rootMargin: '-68px 0px 0px 0px' }).observe(sentinel);
  })();
</script>

<!-- indicateur glissant entre les liens (survol / focus clavier) -->
<script>
  (function(){
    var list = document.querySelector('.nav');
    if(!list) return;
    var links = [].slice.call(list.querySelectorAll('a:not(.cta)'));
    if(links.length < 2) return;
    var ind = document.createElement('span');
    ind.className = 'nav__ind'; ind.setAttribute('aria-hidden','true');
    list.appendChild(ind);
    function move(a){
      ind.style.width = a.offsetWidth + 'px';
      ind.style.transform = 'translateX(' + a.offsetLeft + 'px)';
      ind.style.opacity = '1';
    }
    function hide(){ ind.style.opacity = '0'; }
    links.forEach(function(a){
      a.addEventListener('mouseenter', function(){ move(a); });
      a.addEventListener('focus', function(){ move(a); });
    });
    list.addEventListener('mouseleave', hide);
    list.addEventListener('focusout', function(e){
      if(!list.contains(e.relatedTarget)) hide();
    });
  })();
</script>

<!-- Effet E — remplissage circulaire depuis le curseur sur le CTA :
     on capte le point d'entrée du curseur et on l'écrit dans --x/--y, le
     disque accent grandit depuis là. Pointeur fin + survol uniquement. -->
<script>
  (function(){
    if(!(window.matchMedia && window.matchMedia('(hover:hover) and (pointer:fine)').matches)) return;
    var cta = document.querySelector('.nav .cta');
    if(!cta) return;
    cta.addEventListener('pointermove', function(e){
      var r = cta.getBoundingClientRect();
      cta.style.setProperty('--x', (e.clientX - r.left) + 'px');
      cta.style.setProperty('--y', (e.clientY - r.top) + 'px');
    });
  })();
</script>

</body>
</html>
