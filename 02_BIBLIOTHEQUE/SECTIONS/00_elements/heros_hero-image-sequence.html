<meta name="lib:utilite" content="Produits physiques : l'objet pivote (360°) au scroll, sur canvas. Séquence d'images réelle branchable.">

<!-- /lib:meta -->
<!-- NOTE visuel : pas de slot media DOM. La sequence d'images du produit (angle par
     angle) se configure via le tableau JS window.HERO_FRAMES dans le <script> ;
     a defaut, un objet 3D procedural s'affiche (zero asset). -->
<title>Rotation 3D au scroll</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — Hero 10 · L'objet pivote (360°) au fil du scroll, sur <canvas>.
     Pourquoi pas une vidéo : le seek d'un MP4 distant non bufferisé est
     non fiable (image qui ne bouge pas). Le canvas, lui, pivote toujours.
       · Par défaut : objet 3D procédural (zéro asset, fonctionne direct).
       · Production : renseigne HERO_FRAMES = [url1, url2, …] (séquence
         d'images du produit photographié sous tous les angles) → c'est
         la technique des spins 360° type Apple.
     Re-skin rapide : modifie uniquement le bloc :root (section 1).
     ========================================================================== -->
<style>
  /* --- 1. TOKENS ---------------------------------------------------------- */
  :root{
    --bg:#0c0c0e;
    --fg:#f4f4f5;
    --muted:#9a9aa2;
    --accent:#4f8df0;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
    --scroll-length:320vh;           /* + grand = rotation plus lente */
  }

  /* --- 2. RESET ----------------------------------------------------------- */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg)}

  /* --- 3. LAYOUT (mécanique sticky) -------------------------------------- */
  .scrub{position:relative;height:var(--scroll-length);background:var(--bg)}
  .scrub__stage{
    position:sticky;top:0;height:100dvh;overflow:hidden;
    display:flex;align-items:center;
    background:radial-gradient(60% 60% at 62% 42%,
              rgba(79,141,240,.12),var(--bg) 70%);
    color:var(--fg);font-family:var(--font);
  }
  .scrub__canvas{position:absolute;inset:0;z-index:0;width:100%;height:100%}
  .scrub__inner{position:relative;z-index:2;width:100%;max-width:1240px;
    margin:0 auto;padding:0 6vw}
  .scrub__content{max-width:30rem}
  .scrub__bar{position:absolute;left:0;bottom:0;height:3px;width:0;
    background:var(--accent);z-index:3}

  /* --- 4. TYPOGRAPHIE ----------------------------------------------------- */
  .scrub__eyebrow{font-size:.8rem;font-weight:500;letter-spacing:.16em;
    text-transform:uppercase;color:var(--muted);margin-bottom:1.4rem}
  .scrub__title{font-size:clamp(2.4rem,5.4vw,4.6rem);font-weight:700;
    line-height:1.05;letter-spacing:-.02em;margin-bottom:1.2rem}
  .scrub__sub{font-size:1.1rem;line-height:1.6;color:var(--muted);
    max-width:30rem;margin-bottom:2rem}
  .scrub__hint{font-size:.82rem;letter-spacing:.12em;text-transform:uppercase;
    color:var(--muted)}

  /* --- 5. ACCENT / bouton ------------------------------------------------- */
  .btn{display:inline-block;font:inherit;font-weight:500;font-size:.98rem;
    padding:.9rem 1.7rem;border-radius:.55rem;text-decoration:none;
    background:var(--accent);color:#08111f;margin-bottom:1.6rem;
    transition:transform .25s cubic-bezier(.16,1,.3,1)}
  .btn:active{transform:translateY(1px)}

  /* --- 6. RESPONSIVE ------------------------------------------------------ */
  @media (max-width:768px){.scrub__inner{padding:0 1.4rem}}

  /* --- 7. ACCESSIBILITÉ : pas de scrub si mouvement réduit -------------- */
  @media (prefers-reduced-motion:reduce){
    .scrub{height:100dvh}
    .scrub__bar{display:none}
  }

  /* --- Animation d'entrée au chargement (cascade) ----------------------
     Seuls le canvas et la barre sont pilotés au scroll : le texte est libre. */
  @keyframes heroIn{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
  .scrub__eyebrow{animation:heroIn .8s cubic-bezier(.16,1,.3,1) .06s backwards}
  .scrub__title{animation:heroIn .8s cubic-bezier(.16,1,.3,1) .18s backwards}
  .scrub__sub{animation:heroIn .8s cubic-bezier(.16,1,.3,1) .30s backwards}
  .scrub__content .btn{animation:heroIn .8s cubic-bezier(.16,1,.3,1) .42s backwards}
  @media (prefers-reduced-motion:reduce){.scrub__eyebrow,.scrub__title,.scrub__sub,.scrub__content .btn{animation:none}}
</style>
</head>
<body>

<!-- ==========================================================================
     STRUCTURE — contenu à personnaliser
     ========================================================================== -->
<section class="scrub" id="scrub">
  <div class="scrub__stage">

    <canvas class="scrub__canvas" id="scrubCanvas" aria-label="Objet en rotation"></canvas>

    <div class="scrub__inner">
      <div class="scrub__content">
        <p class="scrub__eyebrow">Surtitre · catégorie</p>
        <h1 class="scrub__title" data-slot="titre">Construisons quelque chose qui vous ressemble.</h1>
        <p class="scrub__sub" data-slot="accroche">
          Quelques mots pour préciser l'intention, poser le contexte et donner
          envie d'aller plus loin sans trop en dire.
        </p>
        <a class="btn" href="#" data-slot="cta">Découvrir</a>
        <p class="scrub__hint">Faites défiler pour faire pivoter &darr;</p>
      </div>
    </div>

    <div class="scrub__bar" id="scrubBar"></div>
  </div>
</section>

<!-- ==========================================================================
     SCRIPT — progression du scroll → rotation (canvas), JS natif
       Pour une séquence d'images réelle, dé-commente HERO_FRAMES.
     ========================================================================== -->
<script>
  // --- (option production) séquence d'images du produit, angle par angle ---
  // window.HERO_FRAMES = [
  //   'frames/montre-001.jpg', 'frames/montre-002.jpg', /* … */ 'frames/montre-060.jpg'
  // ];

  (function () {
    var rm = window.matchMedia('(prefers-reduced-motion:reduce)').matches;

    var section = document.getElementById('scrub');
    var canvas  = document.getElementById('scrubCanvas');
    var bar     = document.getElementById('scrubBar');
    var ctx     = canvas.getContext('2d');
    var W = 0, H = 0, ticking = false;
    var progress = rm ? 0.15 : 0;        // angle figé si mouvement réduit

    function resize () {
      var dpr = Math.min(window.devicePixelRatio || 1, 2);
      W = canvas.clientWidth; H = canvas.clientHeight;
      canvas.width = W * dpr; canvas.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw();
    }

    /* ---- mode A : séquence d'images réelle (si HERO_FRAMES fourni) ------ */
    var frames = [], frameImgs = [], framesReady = false;
    if (window.HERO_FRAMES && window.HERO_FRAMES.length) {
      frames = window.HERO_FRAMES;
      var loaded = 0;
      frames.forEach(function (src, i) {
        var im = new Image(); im.src = src;
        im.onload = function () { if (++loaded === frames.length) { framesReady = true; draw(); } };
        frameImgs[i] = im;
      });
    }
    function drawFrames () {
      var idx = Math.round(progress * (frameImgs.length - 1));
      var im = frameImgs[idx]; if (!im) return;
      var s = Math.min(W / im.width, H / im.height) * 0.9;
      var w = im.width * s, h = im.height * s;
      ctx.clearRect(0, 0, W, H);
      ctx.drawImage(im, (W - w) / 2, (H - h) / 2, w, h);
    }

    /* ---- mode B : objet 3D procédural (par défaut, zéro asset) ---------- */
    var hx = 1.05, hy = 1.55, hz = 0.42;
    var V = [[-hx,-hy,-hz],[hx,-hy,-hz],[hx,hy,-hz],[-hx,hy,-hz],
             [-hx,-hy, hz],[hx,-hy, hz],[hx,hy, hz],[-hx,hy, hz]];
    var F = [[0,1,2,3],[5,4,7,6],[1,5,6,2],[4,0,3,7],[4,5,1,0],[3,2,6,7]];

    function drawBox () {
      ctx.clearRect(0, 0, W, H);
      var ang = progress * Math.PI * 2;          // 360° sur tout le scroll
      var tx = -0.32;                            // légère inclinaison fixe
      var ca = Math.cos(ang), sa = Math.sin(ang);
      var ct = Math.cos(tx),  st = Math.sin(tx);
      var focal = 6.2, unit = Math.min(W, H) / 6.2;
      var cx = W * 0.5, cy = H * 0.5;

      var P = V.map(function (p) {
        var x = p[0], y = p[1], z = p[2];
        var y1 = y * ct - z * st, z1 = y * st + z * ct;          // rot X
        var x2 = x * ca + z1 * sa, z2 = -x * sa + z1 * ca;       // rot Y
        var sc = focal / (focal - z2);
        return { x: cx + x2 * sc * unit, y: cy + y1 * sc * unit, z: z2 };
      });

      F.map(function (f) {
        return { f: f, z: (P[f[0]].z + P[f[1]].z + P[f[2]].z + P[f[3]].z) / 4 };
      })
      .sort(function (a, b) { return a.z - b.z; })   // peintre : loin → près
      .forEach(function (o) {
        var f = o.f;
        // normale via produit vectoriel pour l'éclairage
        var a = P[f[0]], b = P[f[1]], c = P[f[2]];
        var ux = b.x - a.x, uy = b.y - a.y, vx = c.x - a.x, vy = c.y - a.y;
        var face = ux * vy - uy * vx;                // orientation 2D
        var shade = 0.42 + 0.5 * Math.max(0, Math.min(1, (o.z + 1) / 2));
        var r = (150 * shade) | 0, g = (160 * shade) | 0, bl = (176 * shade) | 0;
        ctx.beginPath();
        ctx.moveTo(P[f[0]].x, P[f[0]].y);
        ctx.lineTo(P[f[1]].x, P[f[1]].y);
        ctx.lineTo(P[f[2]].x, P[f[2]].y);
        ctx.lineTo(P[f[3]].x, P[f[3]].y);
        ctx.closePath();
        ctx.fillStyle = 'rgb(' + r + ',' + g + ',' + bl + ')';
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,' + (face > 0 ? .14 : .05) + ')';
        ctx.lineWidth = 1; ctx.stroke();
      });
    }

    function draw () {
      if (framesReady) drawFrames(); else drawBox();
    }

    function update () {
      var rect = section.getBoundingClientRect();
      var scrollable = rect.height - window.innerHeight;
      if (scrollable > 0) {
        progress = Math.min(1, Math.max(0, -rect.top / scrollable));
      }
      bar.style.width = (progress * 100) + '%';
      draw();
      ticking = false;
    }

    window.addEventListener('resize', resize);
    if (!rm) {
      window.addEventListener('scroll', function () {
        if (!ticking) { ticking = true; requestAnimationFrame(update); }
      }, { passive: true });
    }
    resize();
  })();
</script>

</body>
</html>
