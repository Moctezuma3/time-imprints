<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="lib:role" content="contact-localisation">

<meta name="lib:titre" content="Accordéon par secteur">
<meta name="lib:tags" content="JS natif, accordéon, localités">
<meta name="lib:utilite" content="Zones d'intervention regroupées par secteur (régions) en accordéon : on déplie un secteur pour voir la liste des communes desservies. Organise une longue liste. JS vanilla accessible.">

<!-- /lib:meta -->
<title>Accordéon par secteur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — Zone d'intervention · Accordéon par secteur : régions dépliables
     listant les communes. JS natif accessible, un seul accent.
     ========================================================================== -->
<style>
  /* 1. Tokens ------------------------------------------------------------ */
  :root{
    --bg:#fbfbfa;--surface:#ffffff;--fg:#16181d;--muted:#5c6270;--line:#e9e9e4;
    --accent:#3b6ef5;--accent-soft:rgba(59,110,245,.1);
    --maxw:52rem;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  /* 2. Reset ------------------------------------------------------------- */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  button{font:inherit;cursor:pointer}
  svg{display:block;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  img{display:block;max-width:100%}
  body{background:var(--bg);color:var(--fg);font-family:var(--font);line-height:1.6}
  /* 3. Layout ------------------------------------------------------------ */
  .wrap{max-width:var(--maxw);margin:0 auto;padding:clamp(3.5rem,8vw,6rem) clamp(1.4rem,5vw,3rem)}
  .head{margin-bottom:1.6rem}
  .sec{background:var(--surface);border:1px solid var(--line);border-radius:.9rem;margin-bottom:.7rem;overflow:hidden}
  .sec__btn{width:100%;display:flex;align-items:center;gap:1rem;padding:1.1rem 1.3rem;background:transparent;border:0;text-align:left}
  .sec__pin{width:2rem;height:2rem;border-radius:.5rem;flex:none;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent)}
  .sec__pin svg{width:1.05rem;height:1.05rem}
  .sec__count{margin-left:auto;font-size:.82rem;color:var(--muted);background:#f0f1f4;padding:.2rem .6rem;border-radius:99px}
  .sec__chev{color:var(--muted);transition:transform .3s var(--ease)}
  .sec__chev svg{width:1.2rem;height:1.2rem}
  .sec.is-open .sec__chev{transform:rotate(180deg)}
  .sec__panel{overflow:hidden;height:0;transition:height .35s var(--ease)}
  .sec__inner{padding:.2rem 1.3rem 1.3rem 4.3rem;display:flex;flex-wrap:wrap;gap:.5rem}
  .town{font-size:.88rem;color:var(--muted);background:#f5f6f8;padding:.35rem .7rem;border-radius:99px}
  /* 4. Typographie ------------------------------------------------------- */
  .eyebrow{font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:600}
  .head h2{font-size:clamp(1.7rem,3.6vw,2.4rem);font-weight:800;letter-spacing:-.025em;margin-top:.5rem}
  .sec__title{font-weight:700}
  /* 5. Accent / hover ---------------------------------------------------- */
  @media (hover:hover) and (pointer:fine){
    .sec__btn:hover{background:#f6f8ff}
    .town:hover{background:var(--accent-soft);color:var(--accent)}
  }
  /* 6. Responsive -------------------------------------------------------- */
  @media (max-width:480px){.sec__inner{padding-left:1.3rem}}
  /* 7. Accessibilité ----------------------------------------------------- */
  :focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  /* --- Animation d'entrée au chargement (cascade) ---------------------- */
  @keyframes accIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
  .head{animation:accIn .7s cubic-bezier(.16,1,.3,1) .05s backwards}
  .sec{animation:accIn .6s cubic-bezier(.16,1,.3,1) backwards}
  .sec:nth-of-type(1){animation-delay:.14s}
  .sec:nth-of-type(2){animation-delay:.22s}
  .sec:nth-of-type(3){animation-delay:.30s}
  .sec:nth-of-type(4){animation-delay:.38s}
  .sec:nth-of-type(5){animation-delay:.46s}
  .sec:nth-of-type(6){animation-delay:.54s}
  @media (prefers-reduced-motion:reduce){.head,.sec{animation:none}}
</style>
</head>
<body>

<!-- ==========================================================================
     STRUCTURE — accordéon par secteur. Dupliquez un .sec par région ; listez
     les communes en .town. Remplacez secteurs et localités.
     ========================================================================== -->
<section class="wrap" aria-labelledby="t">
  <header class="head">
    <span class="eyebrow">Où on intervient</span>
    <h2 id="t" data-slot="titre">Cherchez votre secteur</h2>
  </header>

  <div class="sec" data-slot="zones" data-slot-item>
    <button class="sec__btn" aria-expanded="false">
      <span class="sec__pin" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 21s-7-6.1-7-11a7 7 0 0 1 14 0c0 4.9-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg></span>
      <span class="sec__title" data-field="titre">Lausanne &amp; agglomération</span>
      <span class="sec__count">6 communes</span>
      <span class="sec__chev" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></span>
    </button>
    <div class="sec__panel"><div class="sec__inner" data-field="communes">
      <span class="town" data-field-item>Lausanne</span><span class="town">Renens</span><span class="town">Prilly</span>
      <span class="town">Pully</span><span class="town">Écublens</span><span class="town">Crissier</span>
    </div></div>
  </div>

  <div class="sec">
    <button class="sec__btn" aria-expanded="false">
      <span class="sec__pin" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 21s-7-6.1-7-11a7 7 0 0 1 14 0c0 4.9-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg></span>
      <span class="sec__title">La Côte</span>
      <span class="sec__count">5 communes</span>
      <span class="sec__chev" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></span>
    </button>
    <div class="sec__panel"><div class="sec__inner">
      <span class="town">Morges</span><span class="town">Nyon</span><span class="town">Gland</span>
      <span class="town">Rolle</span><span class="town">Aubonne</span>
    </div></div>
  </div>

  <div class="sec">
    <button class="sec__btn" aria-expanded="false">
      <span class="sec__pin" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 21s-7-6.1-7-11a7 7 0 0 1 14 0c0 4.9-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg></span>
      <span class="sec__title">Lavaux &amp; Riviera</span>
      <span class="sec__count">4 communes</span>
      <span class="sec__chev" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></span>
    </button>
    <div class="sec__panel"><div class="sec__inner">
      <span class="town">Vevey</span><span class="town">Montreux</span><span class="town">Lutry</span><span class="town">Cully</span>
    </div></div>
  </div>
</section>

<!-- SCRIPT — accordéon secteurs -->
<script>
  (function () {
    [].slice.call(document.querySelectorAll('.sec')).forEach(function (sec){
      var btn = sec.querySelector('.sec__btn'), panel = sec.querySelector('.sec__panel');
      btn.addEventListener('click', function (){
        var open = sec.classList.toggle('is-open');
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
        panel.style.height = open ? panel.firstElementChild.offsetHeight + 'px' : '0px';
      });
    });
  })();
</script>

</body>
</html>
