<meta name="lib:categorie" content="bandeau">

<meta name="lib:niveau" content="2">

<meta name="lib:utilite" content="CTA discrète encadrée par deux filets : titre court + sous-titre + lien secondaire + bouton primaire. Le bouton se remplit d'un disque clair depuis le curseur (texte inversé) ; le bloc monte en fondu à l'entrée à l'écran. À intercaler après une section informative. JS natif (sans dépendance).">

<!-- /lib:meta -->
<title>Appel à l'action en ligne</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — CTA 04 · CTA inline discrète, à intercaler après une section
     informative : une ligne de texte + un bouton secondaire. Pas de fond
     coloré, alignée typographiquement avec le reste de la page. 100 % CSS.
     ========================================================================== -->
<style>
  /* --- 1. TOKENS ---------------------------------------------------------- */
  :root{
    --bg:#fbfbfa;
    --fg:#16181d;
    --muted:#5c6270;
    --line:#e3e3df;
    --primary:#16181d;
    --primary-fg:#f4f4f0;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
    --maxw:48rem;
    --ease:cubic-bezier(.16,1,.3,1);
    --easeBack:cubic-bezier(.34,1.56,.64,1);
  }

  /* --- 2. RESET ----------------------------------------------------------- */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  a{text-decoration:none;color:inherit}

  /* --- 3. LAYOUT ---------------------------------------------------------- */
  .cta{
    background:var(--bg);color:var(--fg);font-family:var(--font);
    padding:clamp(2.5rem,7vh,4.5rem) clamp(1.4rem,5vw,3rem);
  }
  .cta__inner{
    max-width:var(--maxw);margin:0 auto;
    border-top:1px solid var(--line);border-bottom:1px solid var(--line);
    padding:1.6rem 0;
    display:flex;align-items:center;justify-content:space-between;
    gap:1.2rem;flex-wrap:wrap}

  .cta__text{display:flex;flex-direction:column;gap:.25rem;flex:1;min-width:0}
  .cta__title{font-size:1.1rem;font-weight:600;letter-spacing:-.01em}
  .cta__sub{font-size:.92rem;color:var(--muted);line-height:1.5}

  .cta__btn{
    position:relative;isolation:isolate;overflow:hidden;
    display:inline-flex;align-items:center;gap:.45rem;
    padding:.7rem 1.2rem;border-radius:.5rem;
    background:var(--primary);color:var(--primary-fg);
    font-size:.92rem;font-weight:600;flex-shrink:0;
    transition:transform .2s var(--ease),color .35s var(--ease)}
  /* FILLBTN — disque clair qui grandit depuis le curseur, texte inversé en sombre */
  .cta__btn::before{content:"";position:absolute;z-index:-1;
    top:var(--y,50%);left:var(--x,50%);width:0;height:0;border-radius:50%;
    background:var(--primary-fg);transform:translate(-50%,-50%);
    transition:width .5s var(--ease),height .5s var(--ease)}
  .cta__btn svg{width:.9rem;height:.9rem;
    transition:transform .25s var(--ease)}
  @media (hover:hover) and (pointer:fine){
    .cta__btn:hover{color:var(--fg);transform:translateY(-1px)}
    .cta__btn:hover::before{width:340px;height:340px}
    .cta__btn:hover svg{transform:translateX(3px)}
  }

  /* REVEAL — montée + fondu en cascade à l'entrée à l'écran */
  .wf-js .wf-rev{opacity:0;transform:translateY(22px);
    transition:opacity .7s var(--ease),transform .8s var(--easeBack);
    transition-delay:var(--d,0s)}
  .wf-js .wf-rev.is-in{opacity:1;transform:none}

  .cta__link{
    color:var(--muted);font-size:.88rem;font-weight:500;
    display:inline-flex;align-items:center;gap:.3rem;
    transition:color .2s}
  .cta__link:hover{color:var(--fg)}

  /* --- 4. TYPOGRAPHIE ----------------------------------------------------- */

  /* --- 5. ACCENT ---------------------------------------------------------- */
  /* --primary pilote le bouton (re-skin en 1 ligne) */

  /* --- 6. RESPONSIVE ------------------------------------------------------ */
  @media (max-width:540px){
    .cta__inner{flex-direction:column;align-items:flex-start}
    .cta__btn{width:100%;justify-content:center}
  }

  /* --- 7. ACCESSIBILITÉ --------------------------------------------------- */
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important}
    .cta__btn::before{display:none}              /* pas de remplissage animé */
    .wf-js .wf-rev{opacity:1!important;transform:none!important}
  }
</style>
</head>
<body>

<!-- ==========================================================================
     STRUCTURE — contenu à personnaliser
     ========================================================================== -->
<section class="cta">
  <div class="cta__inner">
    <div class="cta__text wf-rev" style="--d:0s">
      <p class="cta__title" data-slot="titre">Envie d'en savoir plus ?</p>
      <p class="cta__sub" data-slot="sous-titre">Téléchargez le guide complet ou prenez rendez-vous, sans engagement.</p>
    </div>
    <div class="wf-rev" style="--d:.12s;display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
      <a href="#" class="cta__link" data-slot="cta">En savoir plus →</a>
      <a href="#" class="cta__btn" data-slot="cta">
        Prendre rendez-vous
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </a>
    </div>
  </div>
</section>

<!-- SCRIPT — révélation au scroll + remplissage du bouton depuis le curseur -->
<script>
  (function () {
    /* REVEAL — cascade à l'entrée à l'écran */
    var els = [].slice.call(document.querySelectorAll('.wf-rev'));
    if (!('IntersectionObserver' in window) || !els.length) {
      els.forEach(function (el) { el.classList.add('is-in'); });
    } else {
      var io = new IntersectionObserver(function (entries, obs) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add('is-in'); obs.unobserve(e.target); }
        });
      }, { threshold: .2 });
      els.forEach(function (el) { io.observe(el); });
    }

    /* FILLBTN — pose --x/--y au point exact du curseur (souris fine, hors reduced-motion) */
    if (!window.matchMedia('(hover:hover) and (pointer:fine)').matches) return;
    if (window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
    [].forEach.call(document.querySelectorAll('.cta__btn'), function (btn) {
      function pos(e) {
        var r = btn.getBoundingClientRect();
        btn.style.setProperty('--x', (e.clientX - r.left) + 'px');
        btn.style.setProperty('--y', (e.clientY - r.top) + 'px');
      }
      btn.addEventListener('mouseenter', pos);
      btn.addEventListener('mousemove', pos);
    });
  })();
</script>

</body>
</html>
