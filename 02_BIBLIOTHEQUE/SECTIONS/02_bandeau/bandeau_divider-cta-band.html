<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>document.documentElement.classList.add('wf-js')</script>
<!-- lib:meta -->
<meta name="lib:id" content="bandeau_divider-cta-band">
<meta name="lib:groupe" content="02-corps">
<meta name="lib:categorie" content="bandeau">
<meta name="lib:intention" content="conversion-footer">
<meta name="lib:role" content="cta">
<meta name="lib:placement" content="divider">
<meta name="lib:niveau" content="2">
<meta name="lib:titre" content="Bandeau d'appel à l'action en fin de section">
<meta name="lib:tags" content="JS natif, CTA, conversion, fill-button, reveal">
<meta name="lib:utilite" content="Bandeau d'appel à l'action compact entre deux sections : phrase incitative et bouton principal sur fond accentué. Le bouton se remplit d'un disque accent depuis le curseur (texte inversé en blanc) ; le contenu monte en cascade à l'entrée à l'écran. Relance la conversion au fil de la page. JS natif (sans dépendance).">
<meta name="lib:showcase" content="oui">
<meta name="lib:secteurs" content="polyvalent">
<meta name="lib:slots" content="titre:titre:court; accroche:ligne:court; cta:cta:1">
<meta name="lib:anatomie" content="base:1 titre, 1 accroche, 1 bouton; titre:phrase incitative sur fond accent; sous-titre:accroche sous le titre; cta:1 bouton principal avec fleche; animation:contenu en cascade montee et fondu a l entree et bouton qui se remplit d un disque accent depuis le curseur; hover:lift du bouton et texte inverse en blanc; responsive:bandeau horizontal vers colonne et bouton pleine largeur sous 560px">
<!-- /lib:meta -->
<title>Bandeau d'appel à l'action en fin de section</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — Divider · Bandeau CTA : phrase + bouton sur fond accentué. 100 %
     CSS, un seul accent.
     ========================================================================== -->
<style>
  /* 1. Tokens ------------------------------------------------------------ */
  :root{
    --bg:#fbfbfa;--surface:#ffffff;--fg:#16181d;--muted:#5c6270;--line:#e9e9e4;
    --accent:#3b6ef5;
    --maxw:64rem;
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
    --easeBack:cubic-bezier(.34,1.56,.64,1);
  }
  /* 2. Reset ------------------------------------------------------------- */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  a{text-decoration:none;color:inherit}
  svg{display:block;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  img{display:block;max-width:100%}
  body{background:var(--bg);color:var(--fg);font-family:var(--font);line-height:1.6}
  /* 3. Layout ------------------------------------------------------------ */
  .wrap{padding:clamp(2rem,5vw,3rem) clamp(1.4rem,5vw,3rem)}
  .band{max-width:var(--maxw);margin:0 auto;background:var(--accent);color:#fff;border-radius:1.4rem;
    padding:clamp(1.8rem,4vw,2.6rem);display:flex;flex-wrap:wrap;align-items:center;
    justify-content:space-between;gap:1.5rem;position:relative;overflow:hidden}
  .band::before{content:"";position:absolute;inset:0;
    background:radial-gradient(60% 140% at 100% 0%,rgba(255,255,255,.18),transparent 60%);pointer-events:none}
  .band__txt{position:relative;flex:1 1 18rem}
  .btn{position:relative;isolation:isolate;overflow:hidden;display:inline-flex;align-items:center;gap:.5rem;background:#fff;color:var(--accent);
    font-weight:700;padding:.9rem 1.6rem;border-radius:.7rem;transition:transform .3s var(--ease),box-shadow .3s var(--ease),color .35s var(--ease)}
  /* FILLBTN — disque accent qui grandit depuis le curseur, texte inversé en blanc */
  .btn::before{content:"";position:absolute;z-index:-1;top:var(--y,50%);left:var(--x,50%);width:0;height:0;border-radius:50%;
    background:var(--accent);transform:translate(-50%,-50%);transition:width .5s var(--ease),height .5s var(--ease)}
  .btn svg{width:1.1rem;height:1.1rem}
  /* REVEAL — montée + fondu en cascade à l'entrée à l'écran */
  .wf-js .wf-rev{opacity:0;transform:translateY(22px);
    transition:opacity .7s var(--ease),transform .8s var(--easeBack);transition-delay:var(--d,0s)}
  .wf-js .wf-rev.is-in{opacity:1;transform:none}
  /* 4. Typographie ------------------------------------------------------- */
  .band__txt h2{font-size:clamp(1.4rem,3.2vw,2rem);font-weight:800;letter-spacing:-.02em}
  .band__txt p{color:rgba(255,255,255,.85);margin-top:.4rem}
  /* 5. Accent / hover ---------------------------------------------------- */
  @media (hover:hover) and (pointer:fine){
    .btn:hover{color:#fff;transform:translateY(-2px);box-shadow:0 10px 26px rgba(0,0,0,.25)}
    .btn:hover::before{width:340px;height:340px}
  }
  /* 6. Responsive -------------------------------------------------------- */
  @media (max-width:560px){.wrap{padding:.9rem .7rem}.band{flex-direction:column;align-items:flex-start;padding:1.1rem;gap:.7rem;border-radius:1rem}.band__txt{flex:none;width:100%}.band__txt p{margin-top:.25rem}.btn{width:100%;justify-content:center}}
  /* 7. Accessibilité ----------------------------------------------------- */
  :focus-visible{outline:2px solid #fff;outline-offset:3px}
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important}
    .btn::before{display:none}                   /* pas de remplissage animé */
    .wf-js .wf-rev{opacity:1!important;transform:none!important}
  }
</style>
</head>
<body>

<!-- ==========================================================================
     STRUCTURE — bandeau CTA. Remplacez le titre, le sous-texte et le lien du
     bouton.
     ========================================================================== -->
<section class="wrap" aria-labelledby="t">
  <div class="band">
    <div class="band__txt wf-rev" style="--d:0s">
      <h2 id="t" data-slot="titre">Prêt à lancer votre projet ?</h2>
      <p data-slot="accroche">Un échange de 15 minutes suffit pour y voir clair. Sans engagement.</p>
    </div>
    <a class="btn wf-rev" data-slot="cta" style="--d:.12s" href="#">Prendre rendez-vous <svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg></a>
  </div>
</section>

<!-- SCRIPT — révélation au scroll + remplissage du bouton depuis le curseur -->
<script>
  (function () {
    /* REVEAL — cascade à l'entrée à l'écran */
    var els = [].slice.call(document.querySelectorAll('.wf-rev'));
    if (!('IntersectionObserver' in window) || !els.length) {
      els.forEach(function (el) { el.classList.add('is-in'); });
    } else {
      var io = new IntersectionObserver(function (entries, obs) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add('is-in'); obs.unobserve(e.target); }
        });
      }, { threshold: .2 });
      els.forEach(function (el) { io.observe(el); });
    }

    /* FILLBTN — pose --x/--y au point exact du curseur (souris fine, hors reduced-motion) */
    if (!window.matchMedia('(hover:hover) and (pointer:fine)').matches) return;
    if (window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
    [].forEach.call(document.querySelectorAll('.btn'), function (btn) {
      function pos(e) {
        var r = btn.getBoundingClientRect();
        btn.style.setProperty('--x', (e.clientX - r.left) + 'px');
        btn.style.setProperty('--y', (e.clientY - r.top) + 'px');
      }
      btn.addEventListener('mouseenter', pos);
      btn.addEventListener('mousemove', pos);
    });
  })();
</script>

</body>
</html>
