<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="lib:titre" content="Fond image — distorsion en grille (WebGL) au survol">

<meta name="lib:dependances" content="three (CDN ESM)">
<meta name="lib:utilite" content="Fond plein écran : une image se DÉFORME localement (distorsion fluide en grille via shader WebGL) autour du curseur, puis se détend. Portage autonome du composant GridDistortion (React Bits) en JS + Three.js chargé par CDN. Paramétrable en data-attributs (grid, mouse, strength, relaxation). Repli image statique si reduced-motion / pas de WebGL. Remplacez l'image (data-field image) par un visuel réel. Idéal en toile de fond de hero, section d'ouverture ou header.">

<meta name="lib:anatomie" content="base:un conteneur plein ecran contenant un canvas WebGL qui affiche une image en cover; effet:la souris deforme les cellules d une grille (mouse=rayon, strength=intensite, relaxation=vitesse de retour, grid=finesse), l image se retord localement puis revient; overlay:titre optionnel centre + micro-indication de survol, pointer-events none pour laisser passer la souris; fallback:si reduced-motion ou pas de WebGL, image statique en background-size cover sans animation; parametres:data-grid data-mouse data-strength data-relaxation data-image sur la section; responsive:pleine hauteur 100dvh, pixelRatio plafonne a 2, ResizeObserver; a11y:image decorative, indication de survol masquee sur ecrans tactiles, reduced-motion coupe le WebGL">
<!-- /lib:meta -->
<title>Fond — distorsion en grille (WebGL) au survol</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — Fond image distordue (GridDistortion, portage React Bits → HTML)
     Three.js chargé en module ESM (CDN). Repli image statique si pas de WebGL.
     >>> Réglages : data-grid / data-mouse / data-strength / data-relaxation
         et data-image sur <section class="gd">.
     ========================================================================== -->
<style>
  :root{
    --fg:#ffffff;--muted:rgba(255,255,255,.82);
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:#0b0b0d}

  .gd{position:relative;width:100%;height:100vh;height:100dvh;overflow:hidden;
    background:#0b0b0d;color:var(--fg);cursor:crosshair}
  /* canvas WebGL injecté ici */
  .gd__stage{position:absolute;inset:0}
  .gd__stage canvas{display:block;width:100%!important;height:100%!important}
  /* repli image statique (reduced-motion / pas de WebGL) */
  .gd__fallback{position:absolute;inset:0;background-size:cover;background-position:center;display:none}
  .gd.is-fallback .gd__stage{display:none}
  .gd.is-fallback .gd__fallback{display:block}
  .gd.is-fallback{cursor:default}

  /* overlay optionnel — laisse passer la souris vers le canvas */
  .gd__overlay{position:absolute;inset:0;z-index:2;pointer-events:none;
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    padding:2rem;gap:1.1rem;
    background:radial-gradient(ellipse at center,transparent 30%,rgba(8,9,11,.35) 100%)}
  .gd__title{font-size:clamp(2rem,7vw,5.5rem);font-weight:800;line-height:1.02;letter-spacing:-.03em;
    text-shadow:0 4px 40px rgba(0,0,0,.45)}
  .gd__title:empty{display:none}
  .gd__hint{display:inline-flex;align-items:center;gap:.55rem;font-size:.82rem;font-weight:600;
    letter-spacing:.14em;text-transform:uppercase;color:var(--muted);
    background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.24);backdrop-filter:blur(8px);
    padding:.5rem .95rem;border-radius:2rem}
  .gd__hint svg{width:1rem;height:1rem;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  @media (hover:none),(pointer:coarse){.gd__hint{display:none}}

  @media (prefers-reduced-motion:reduce){.gd.is-fallback{cursor:default}}
</style>
</head>
<body>

<!-- ==========================================================================
     STRUCTURE — réglez l'effet via les data-attributs ; remplacez data-image
     par votre visuel (data-field="image"). Le titre de l'overlay est optionnel.
     ========================================================================== -->
<section class="gd" id="gd"
         data-image="https://placehold.co/1920x1080"
         data-grid="15" data-mouse="0.1" data-strength="0.15" data-relaxation="0.9"
         data-field="image" data-slot="fond">
  <div class="gd__stage" id="gdStage"></div>
  <div class="gd__fallback" id="gdFallback" aria-hidden="true"></div>

  <div class="gd__overlay">
    <h1 class="gd__title" data-field="titre"></h1>
    <span class="gd__hint">
      <svg viewBox="0 0 24 24"><path d="M12 2v6M12 8l-3 3M12 8l3 3M5 12a7 7 0 0 0 14 0"/></svg>
      Déplacez le curseur
    </span>
  </div>
</section>

<!-- SCRIPT — portage du composant GridDistortion (React Bits) en vanilla + Three.js -->
<script type="module">
  const section  = document.getElementById('gd');
  const stage    = document.getElementById('gdStage');
  const fallback = document.getElementById('gdFallback');

  const imageSrc   = section.dataset.image;
  const grid       = parseInt(section.dataset.grid, 10)   || 15;
  const mouse      = parseFloat(section.dataset.mouse)     || 0.1;
  const strength   = parseFloat(section.dataset.strength)  || 0.15;
  const relaxation = parseFloat(section.dataset.relaxation)|| 0.9;

  const rm = window.matchMedia('(prefers-reduced-motion:reduce)').matches;

  // détection WebGL
  function webglOK(){
    try{ const c=document.createElement('canvas');
      return !!(window.WebGLRenderingContext && (c.getContext('webgl')||c.getContext('experimental-webgl'))); }
    catch(e){ return false; }
  }

  // repli : image statique en fond, pas de WebGL
  function toFallback(){
    fallback.style.backgroundImage = "url('"+imageSrc+"')";
    section.classList.add('is-fallback');
  }

  if (rm || !webglOK()) { toFallback(); }
  else {
    import('https://unpkg.com/three@0.160.0/build/three.module.js')
      .then((THREE) => initGridDistortion(THREE))
      .catch(() => toFallback());
  }

  function initGridDistortion(THREE){
    const vertexShader = `
      uniform float time; varying vec2 vUv; varying vec3 vPosition;
      void main(){ vUv = uv; vPosition = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`;
    const fragmentShader = `
      uniform sampler2D uDataTexture; uniform sampler2D uTexture; uniform vec4 resolution;
      varying vec2 vUv;
      void main(){ vec2 uv = vUv; vec4 offset = texture2D(uDataTexture, vUv);
        gl_FragColor = texture2D(uTexture, uv - 0.02 * offset.rg); }`;

    const scene = new THREE.Scene();
    const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true, powerPreference:'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);
    stage.innerHTML = '';
    stage.appendChild(renderer.domElement);

    const camera = new THREE.OrthographicCamera(0,0,0,0,-1000,1000);
    camera.position.z = 2;

    const uniforms = {
      time:{ value:0 }, resolution:{ value:new THREE.Vector4() },
      uTexture:{ value:null }, uDataTexture:{ value:null }
    };

    const loader = new THREE.TextureLoader();
    loader.setCrossOrigin('anonymous');
    loader.load(imageSrc, (texture) => {
      texture.minFilter = THREE.LinearFilter;
      texture.magFilter = THREE.LinearFilter;
      texture.wrapS = THREE.ClampToEdgeWrapping;
      texture.wrapT = THREE.ClampToEdgeWrapping;
      uniforms.uTexture.value = texture;
      handleResize();
    }, undefined, () => toFallback());

    const size = grid;
    const data = new Float32Array(4 * size * size);
    for (let i=0; i<size*size; i++){
      data[i*4]     = Math.random()*255 - 125;
      data[i*4 + 1] = Math.random()*255 - 125;
    }
    const dataTexture = new THREE.DataTexture(data, size, size, THREE.RGBAFormat, THREE.FloatType);
    dataTexture.needsUpdate = true;
    uniforms.uDataTexture.value = dataTexture;

    const material = new THREE.ShaderMaterial({
      side:THREE.DoubleSide, uniforms, vertexShader, fragmentShader, transparent:true
    });
    const geometry = new THREE.PlaneGeometry(1, 1, size-1, size-1);
    const plane = new THREE.Mesh(geometry, material);
    scene.add(plane);

    function handleResize(){
      const rect = section.getBoundingClientRect();
      const w = rect.width, h = rect.height;
      if (!w || !h) return;
      const aspect = w / h;
      renderer.setSize(w, h);
      plane.scale.set(aspect, 1, 1);
      const fh = 1, fw = fh * aspect;
      camera.left = -fw/2; camera.right = fw/2; camera.top = fh/2; camera.bottom = -fh/2;
      camera.updateProjectionMatrix();
      uniforms.resolution.value.set(w, h, 1, 1);
    }

    let ro;
    if (window.ResizeObserver){ ro = new ResizeObserver(handleResize); ro.observe(section); }
    else { window.addEventListener('resize', handleResize); }

    const ms = { x:0, y:0, prevX:0, prevY:0, vX:0, vY:0 };
    function onMove(e){
      const rect = section.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;
      const y = 1 - (e.clientY - rect.top) / rect.height;
      ms.vX = x - ms.prevX; ms.vY = y - ms.prevY;
      Object.assign(ms, { x, y, prevX:x, prevY:y });
    }
    function onLeave(){ dataTexture.needsUpdate = true; Object.assign(ms, { x:0,y:0,prevX:0,prevY:0,vX:0,vY:0 }); }
    section.addEventListener('mousemove', onMove);
    section.addEventListener('mouseleave', onLeave);

    handleResize();

    let raf;
    (function animate(){
      raf = requestAnimationFrame(animate);
      uniforms.time.value += 0.05;
      const d = dataTexture.image.data;
      for (let i=0; i<size*size; i++){ d[i*4] *= relaxation; d[i*4+1] *= relaxation; }
      const gx = size * ms.x, gy = size * ms.y, maxDist = size * mouse;
      for (let i=0; i<size; i++){
        for (let j=0; j<size; j++){
          const distSq = Math.pow(gx-i,2) + Math.pow(gy-j,2);
          if (distSq < maxDist*maxDist){
            const idx = 4 * (i + size*j);
            const power = Math.min(maxDist / Math.sqrt(distSq), 10);
            d[idx]   += strength * 100 * ms.vX * power;
            d[idx+1] -= strength * 100 * ms.vY * power;
          }
        }
      }
      dataTexture.needsUpdate = true;
      renderer.render(scene, camera);
    })();

    // nettoyage si la section quitte le DOM (usage en SPA)
    window.addEventListener('pagehide', () => {
      cancelAnimationFrame(raf);
      if (ro) ro.disconnect(); else window.removeEventListener('resize', handleResize);
      renderer.dispose(); geometry.dispose(); material.dispose(); dataTexture.dispose();
      if (uniforms.uTexture.value) uniforms.uTexture.value.dispose();
    });
  }
</script>

</body>
</html>
