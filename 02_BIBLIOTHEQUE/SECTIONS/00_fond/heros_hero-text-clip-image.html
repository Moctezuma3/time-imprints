<meta name="lib:tags" content="JS natif, sombre, typo, dégradé">
<meta name="lib:utilite" content="Titre géant dont les lettres révèlent un dégradé vibrant animé (background-clip:text). Révélation par masque vertical à l'arrivée, puis halos et titre qui suivent le curseur. JS natif.">
<meta name="lib:showcase" content="non">

<!-- /lib:meta -->
<title>Texte rempli par une image (masque)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — Hero avancer 07 · Le titre géant agit comme un masque : un dégradé
     vibrant (mélange de 5 couleurs) se voit uniquement à travers les
     lettres (`background-clip:text` + `color:transparent`). Animation
     continue de la position du dégradé pour donner vie au masque.
     CSS pur.
     ========================================================================== -->
<style>
  :root{
    --bg:#0d0d10;--fg:#16181d;--muted:rgba(244,244,240,.55);
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  .hero{
    min-height:100dvh;background:var(--bg);color:#f4f4f0;
    font-family:var(--font);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:clamp(2rem,7vh,4rem) clamp(1.4rem,5vw,3rem);text-align:center;gap:1.4rem;
    position:relative;overflow:hidden}

  /* halo radial décoratif derrière le titre */
  .hero::before{
    content:"";position:absolute;inset:0;
    background:
      radial-gradient(circle at var(--gx,30%) var(--gy,40%),rgba(168,85,247,.16) 0%,transparent 45%),
      radial-gradient(circle at var(--gx2,70%) var(--gy2,60%),rgba(59,130,246,.18) 0%,transparent 50%);
    pointer-events:none}

  .hero__eyebrow{font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;
    color:var(--muted);z-index:1;position:relative}

  .hero__title{
    position:relative;z-index:1;
    font-size:clamp(4.5rem,18vw,18rem);font-weight:900;
    letter-spacing:-.05em;line-height:.9;
    background-image:linear-gradient(
      120deg,
      #ff6b6b 0%,
      #f59e0b 22%,
      #facc15 38%,
      #34d399 55%,
      #38bdf8 72%,
      #a855f7 88%,
      #ec4899 100%);
    background-size:240% 240%;background-position:0% 50%;
    background-clip:text;-webkit-background-clip:text;
    color:transparent;-webkit-text-fill-color:transparent;
    animation:flow 14s ease-in-out infinite alternate, titleReveal 1.1s cubic-bezier(.16,1,.3,1) .15s backwards;
    cursor:default}
  .hero__title:hover{animation-duration:6s,14s}
  /* la parallaxe au curseur est appliquée au WRAPPER, jamais au texte clippé
     (sinon Chrome compose le calque et le dégradé clip:text clignote) */
  .hero__title-wrap{position:relative;z-index:1;display:inline-block;
    transition:transform .35s var(--ease)}

  @keyframes flow{
    0%   {background-position:0% 50%}
    50%  {background-position:100% 50%}
    100% {background-position:0% 50%}
  }
  /* B/clip — le titre se dévoile par un masque vertical à l'arrivée */
  @keyframes titleReveal{from{clip-path:inset(0 0 100% 0)}to{clip-path:inset(0 0 0 0)}}

  .hero__sub{color:var(--muted);font-size:1.05rem;line-height:1.6;
    max-width:30rem;z-index:1;position:relative}

  @media (prefers-reduced-motion:reduce){
    .hero__title{animation:none}
  }

  /* --- Animation d'entrée au chargement (cascade) ---------------------- */
  @keyframes heroIn{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
  .hero__eyebrow{animation:heroIn .8s cubic-bezier(.16,1,.3,1) .06s backwards}
  /* .hero__title cumule flow + heroIn dans sa règle d'origine (ne pas redéclarer ici) */
  .hero__sub{animation:heroIn .8s cubic-bezier(.16,1,.3,1) .30s backwards}
  @media (prefers-reduced-motion:reduce){.hero__eyebrow,.hero__sub{animation:none}}
</style>
</head>
<body>

<section class="hero">
  <span class="hero__eyebrow">Studio créatif</span>
  <div class="hero__title-wrap"><h1 class="hero__title" data-slot="titre">STUDIO</h1></div>
  <p class="hero__sub" data-slot="accroche">Un dégradé vibrant se voit uniquement à travers les lettres du titre, et se déplace lentement en boucle.</p>
</section>

<!-- SCRIPT — halos + titre qui suivent le curseur (souris fine, hors reduced-motion) -->
<script>
  (function () {
    var hero = document.querySelector('.hero'), title = document.querySelector('.hero__title-wrap');
    if (!hero) return;
    if (window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
    if (!window.matchMedia('(hover:hover) and (pointer:fine)').matches) return;
    hero.addEventListener('mousemove', function (e) {
      var r = hero.getBoundingClientRect();
      var x = (e.clientX - r.left) / r.width, y = (e.clientY - r.top) / r.height;
      hero.style.setProperty('--gx',  (18 + x * 34) + '%');
      hero.style.setProperty('--gy',  (22 + y * 34) + '%');
      hero.style.setProperty('--gx2', (82 - x * 34) + '%');
      hero.style.setProperty('--gy2', (78 - y * 34) + '%');
      if (title) title.style.transform = 'translate(' + ((x - .5) * 22).toFixed(1) + 'px,' + ((y - .5) * 16).toFixed(1) + 'px)';
    });
    hero.addEventListener('mouseleave', function () { if (title) title.style.transform = ''; });
  })();
</script>

</body>
</html>
