<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- lib:meta -->
<meta name="lib:id" content="fond_beams">
<meta name="lib:groupe" content="00-elements">

<meta name="lib:titre" content="Fond — faisceaux lumineux animés (WebGL)">
<meta name="lib:tags" content="three.js, webgl, shader, faisceaux, beams, lumière, bruit, fond, wow, portage react-bits">
<meta name="lib:dependances" content="three (CDN ESM)">
<meta name="lib:utilite" content="Fond plein écran : une nappe de FAISCEAUX lumineux verticaux ondule doucement sous une lumière directionnelle, avec un grain de bruit (portage autonome du composant Beams de React Bits, R3F → Three.js brut). Paramétrable en data-attributs (nombre, largeur, hauteur, couleur, vitesse, bruit, échelle, rotation). Repli dégradé statique si reduced-motion / pas de WebGL. Idéal en toile de fond de hero sombre, section d'ouverture, header premium.">
<meta name="lib:showcase" content="oui">
<meta name="lib:secteurs" content="polyvalent">
<meta name="lib:slots" content="titre:texte:0-1">
<meta name="lib:anatomie" content="base:un conteneur plein ecran contenant un canvas WebGL, fond noir; effet:beamNumber plans verticaux empiles deformes par un bruit de Perlin 3D anime (uSpeed), eclaires par une lumiere directionnelle coloree (lightColor) + lumiere ambiante, materiau physical etendu (metalness/roughness) avec grain de bruit en post; parametres:data-beam-number data-beam-width data-beam-height data-light-color data-speed data-noise-intensity data-scale data-rotation sur la section; overlay:titre optionnel centre, pointer-events none; camera:perspective fov 30 a z=20; fallback:si reduced-motion ou pas de WebGL, degrade sombre avec stries verticales en CSS, sans animation; responsive:pleine hauteur 100dvh, pixelRatio plafonne a 2, resize camera+renderer; a11y:fond decoratif, reduced-motion coupe le WebGL">
<!-- /lib:meta -->
<title>Fond — faisceaux lumineux animés (WebGL)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- ==========================================================================
     STYLE — Fond faisceaux lumineux (Beams, portage React Bits R3F → HTML)
     Three.js chargé en module ESM (CDN). Repli dégradé statique si pas de WebGL.
     >>> Réglages : data-beam-number / data-beam-width / data-beam-height /
         data-light-color / data-speed / data-noise-intensity / data-scale /
         data-rotation sur <section class="beams">.
     ========================================================================== -->
<style>
  :root{
    --fg:#ffffff;--muted:rgba(255,255,255,.8);
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:#000}

  .beams{position:relative;width:100%;height:100vh;height:100dvh;overflow:hidden;background:#000;color:var(--fg)}
  .beams__stage{position:absolute;inset:0}
  .beams__stage canvas{display:block;width:100%!important;height:100%!important}

  /* repli statique (reduced-motion / pas de WebGL) : stries verticales douces */
  .beams__fallback{position:absolute;inset:0;display:none;
    background:
      repeating-linear-gradient(90deg,
        transparent 0, transparent 26px,
        rgba(255,255,255,.05) 26px, rgba(255,255,255,.05) 30px,
        transparent 30px, transparent 60px),
      radial-gradient(ellipse 70% 90% at 50% 30%, rgba(255,255,255,.14), transparent 70%),
      #000}
  .beams.is-fallback .beams__stage{display:none}
  .beams.is-fallback .beams__fallback{display:block}

  /* overlay optionnel — laisse passer les clics */
  .beams__overlay{position:absolute;inset:0;z-index:2;pointer-events:none;
    display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
  .beams__title{font-size:clamp(2rem,7vw,5.5rem);font-weight:800;line-height:1.02;letter-spacing:-.03em;
    text-shadow:0 4px 40px rgba(0,0,0,.5)}
  .beams__title:empty{display:none}
</style>
</head>
<body>

<!-- ==========================================================================
     STRUCTURE — réglez l'effet via les data-attributs. Titre d'overlay optionnel.
     ========================================================================== -->
<section class="beams" id="beams"
         data-beam-number="12" data-beam-width="2" data-beam-height="15"
         data-light-color="#ffffff" data-speed="2" data-noise-intensity="1.75"
         data-scale="0.2" data-rotation="0"
         data-slot="fond">
  <div class="beams__stage" id="beamsStage"></div>
  <div class="beams__fallback" aria-hidden="true"></div>

  <div class="beams__overlay">
    <h1 class="beams__title" data-field="titre"></h1>
  </div>
</section>

<!-- SCRIPT — portage du composant Beams (React Bits, R3F+drei) en Three.js brut -->
<script type="module">
  const section = document.getElementById('beams');
  const stage   = document.getElementById('beamsStage');

  const P = section.dataset;
  const beamNumber     = parseInt(P.beamNumber, 10)     || 12;
  const beamWidth      = parseFloat(P.beamWidth)         || 2;
  const beamHeight     = parseFloat(P.beamHeight)        || 15;
  const lightColor     = P.lightColor                    || '#ffffff';
  const speed          = parseFloat(P.speed)             || 2;
  const noiseIntensity = parseFloat(P.noiseIntensity)    || 1.75;
  const scale          = parseFloat(P.scale)             || 0.2;
  const rotation       = parseFloat(P.rotation)          || 0;

  const rm = window.matchMedia('(prefers-reduced-motion:reduce)').matches;

  function webglOK(){
    try{ const c=document.createElement('canvas');
      return !!(window.WebGLRenderingContext && (c.getContext('webgl')||c.getContext('experimental-webgl'))); }
    catch(e){ return false; }
  }
  function toFallback(){ section.classList.add('is-fallback'); }

  if (rm || !webglOK()) { toFallback(); }
  else {
    import('https://unpkg.com/three@0.160.0/build/three.module.js')
      .then((THREE) => initBeams(THREE))
      .catch(() => toFallback());
  }

  function initBeams(THREE){
    const degToRad = THREE.MathUtils.degToRad;

    const hexToNormalizedRGB = (hex) => {
      const c = hex.replace('#','');
      return [parseInt(c.substring(0,2),16)/255, parseInt(c.substring(2,4),16)/255, parseInt(c.substring(4,6),16)/255];
    };

    const noise = `
    float random (in vec2 st){ return fract(sin(dot(st.xy,vec2(12.9898,78.233)))*43758.5453123); }
    float noise (in vec2 st){
      vec2 i=floor(st); vec2 f=fract(st);
      float a=random(i); float b=random(i+vec2(1.,0.)); float c=random(i+vec2(0.,1.)); float d=random(i+vec2(1.,1.));
      vec2 u=f*f*(3.-2.*f);
      return mix(a,b,u.x)+(c-a)*u.y*(1.-u.x)+(d-b)*u.x*u.y;
    }
    vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x,289.0);}
    vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
    vec3 fade(vec3 t){return t*t*t*(t*(t*6.0-15.0)+10.0);}
    float cnoise(vec3 P){
      vec3 Pi0=floor(P); vec3 Pi1=Pi0+vec3(1.0);
      Pi0=mod(Pi0,289.0); Pi1=mod(Pi1,289.0);
      vec3 Pf0=fract(P); vec3 Pf1=Pf0-vec3(1.0);
      vec4 ix=vec4(Pi0.x,Pi1.x,Pi0.x,Pi1.x); vec4 iy=vec4(Pi0.yy,Pi1.yy);
      vec4 iz0=Pi0.zzzz; vec4 iz1=Pi1.zzzz;
      vec4 ixy=permute(permute(ix)+iy); vec4 ixy0=permute(ixy+iz0); vec4 ixy1=permute(ixy+iz1);
      vec4 gx0=ixy0/7.0; vec4 gy0=fract(floor(gx0)/7.0)-0.5; gx0=fract(gx0);
      vec4 gz0=vec4(0.5)-abs(gx0)-abs(gy0); vec4 sz0=step(gz0,vec4(0.0));
      gx0-=sz0*(step(0.0,gx0)-0.5); gy0-=sz0*(step(0.0,gy0)-0.5);
      vec4 gx1=ixy1/7.0; vec4 gy1=fract(floor(gx1)/7.0)-0.5; gx1=fract(gx1);
      vec4 gz1=vec4(0.5)-abs(gx1)-abs(gy1); vec4 sz1=step(gz1,vec4(0.0));
      gx1-=sz1*(step(0.0,gx1)-0.5); gy1-=sz1*(step(0.0,gy1)-0.5);
      vec3 g000=vec3(gx0.x,gy0.x,gz0.x); vec3 g100=vec3(gx0.y,gy0.y,gz0.y);
      vec3 g010=vec3(gx0.z,gy0.z,gz0.z); vec3 g110=vec3(gx0.w,gy0.w,gz0.w);
      vec3 g001=vec3(gx1.x,gy1.x,gz1.x); vec3 g101=vec3(gx1.y,gy1.y,gz1.y);
      vec3 g011=vec3(gx1.z,gy1.z,gz1.z); vec3 g111=vec3(gx1.w,gy1.w,gz1.w);
      vec4 norm0=taylorInvSqrt(vec4(dot(g000,g000),dot(g010,g010),dot(g100,g100),dot(g110,g110)));
      g000*=norm0.x; g010*=norm0.y; g100*=norm0.z; g110*=norm0.w;
      vec4 norm1=taylorInvSqrt(vec4(dot(g001,g001),dot(g011,g011),dot(g101,g101),dot(g111,g111)));
      g001*=norm1.x; g011*=norm1.y; g101*=norm1.z; g111*=norm1.w;
      float n000=dot(g000,Pf0); float n100=dot(g100,vec3(Pf1.x,Pf0.yz));
      float n010=dot(g010,vec3(Pf0.x,Pf1.y,Pf0.z)); float n110=dot(g110,vec3(Pf1.xy,Pf0.z));
      float n001=dot(g001,vec3(Pf0.xy,Pf1.z)); float n101=dot(g101,vec3(Pf1.x,Pf0.y,Pf1.z));
      float n011=dot(g011,vec3(Pf0.x,Pf1.yz)); float n111=dot(g111,Pf1);
      vec3 fade_xyz=fade(Pf0);
      vec4 n_z=mix(vec4(n000,n100,n010,n110),vec4(n001,n101,n011,n111),fade_xyz.z);
      vec2 n_yz=mix(n_z.xy,n_z.zw,fade_xyz.y);
      float n_xyz=mix(n_yz.x,n_yz.y,fade_xyz.x);
      return 2.2*n_xyz;
    }`;

    // --- extendMaterial : étend le shader "physical" de Three (port fidèle) ---
    function extendMaterial(BaseMaterial, cfg){
      const physical = THREE.ShaderLib.physical;
      const baseVert = physical.vertexShader, baseFrag = physical.fragmentShader;
      const baseUniforms = physical.uniforms, baseDefines = physical.defines || {};
      const uniforms = THREE.UniformsUtils.clone(baseUniforms);
      const defaults = new BaseMaterial(cfg.material || {});
      if (defaults.color) uniforms.diffuse.value = defaults.color;
      if ('roughness' in defaults) uniforms.roughness.value = defaults.roughness;
      if ('metalness' in defaults) uniforms.metalness.value = defaults.metalness;
      if ('envMap' in defaults) uniforms.envMap.value = defaults.envMap;
      if ('envMapIntensity' in defaults) uniforms.envMapIntensity.value = defaults.envMapIntensity;
      Object.entries(cfg.uniforms || {}).forEach(([key, u]) => {
        uniforms[key] = (u !== null && typeof u === 'object' && 'value' in u) ? u : { value: u };
      });
      let vert = `${cfg.header}\n${cfg.vertexHeader || ''}\n${baseVert}`;
      let frag = `${cfg.header}\n${cfg.fragmentHeader || ''}\n${baseFrag}`;
      for (const [inc, code] of Object.entries(cfg.vertex || {})) vert = vert.replace(inc, `${inc}\n${code}`);
      for (const [inc, code] of Object.entries(cfg.fragment || {})) frag = frag.replace(inc, `${inc}\n${code}`);
      return new THREE.ShaderMaterial({
        defines: { ...baseDefines }, uniforms, vertexShader: vert, fragmentShader: frag,
        lights: true, fog: !!(cfg.material && cfg.material.fog)
      });
    }

    const beamMaterial = extendMaterial(THREE.MeshStandardMaterial, {
      header: `
        varying vec3 vEye; varying float vNoise; varying vec2 vUv; varying vec3 vPosition;
        uniform float time; uniform float uSpeed; uniform float uNoiseIntensity; uniform float uScale;
        ${noise}`,
      vertexHeader: `
        float getPos(vec3 pos){
          vec3 noisePos = vec3(pos.x*0., pos.y-uv.y, pos.z+time*uSpeed*3.)*uScale;
          return cnoise(noisePos);
        }
        vec3 getCurrentPos(vec3 pos){ vec3 newpos=pos; newpos.z += getPos(pos); return newpos; }
        vec3 getNormal(vec3 pos){
          vec3 curpos=getCurrentPos(pos);
          vec3 nextposX=getCurrentPos(pos+vec3(0.01,0.0,0.0));
          vec3 nextposZ=getCurrentPos(pos+vec3(0.0,-0.01,0.0));
          vec3 tangentX=normalize(nextposX-curpos);
          vec3 tangentZ=normalize(nextposZ-curpos);
          return normalize(cross(tangentZ,tangentX));
        }`,
      fragmentHeader: '',
      vertex: {
        '#include <begin_vertex>': `transformed.z += getPos(transformed.xyz);`,
        '#include <beginnormal_vertex>': `objectNormal = getNormal(position.xyz);`
      },
      fragment: {
        '#include <dithering_fragment>': `
          float randomNoise = noise(gl_FragCoord.xy);
          gl_FragColor.rgb -= randomNoise / 15. * uNoiseIntensity;`
      },
      material: { fog: true },
      uniforms: {
        diffuse: new THREE.Color(...hexToNormalizedRGB('#000000')),
        time: { shared: true, mixed: true, linked: true, value: 0 },
        roughness: 0.3, metalness: 0.3,
        uSpeed: { shared: true, mixed: true, linked: true, value: speed },
        envMapIntensity: 10,
        uNoiseIntensity: noiseIntensity, uScale: scale
      }
    });

    // --- géométrie : n plans verticaux empilés (port fidèle) ---
    function createStackedPlanesBufferGeometry(n, width, height, spacing, heightSegments){
      const geometry = new THREE.BufferGeometry();
      const numVertices = n*(heightSegments+1)*2, numFaces = n*heightSegments*2;
      const positions = new Float32Array(numVertices*3);
      const indices = new Uint32Array(numFaces*3);
      const uvs = new Float32Array(numVertices*2);
      let vo=0, io=0, uo=0;
      const totalWidth = n*width + (n-1)*spacing, xBase = -totalWidth/2;
      for (let i=0;i<n;i++){
        const xOffset = xBase + i*(width+spacing);
        const uvX = Math.random()*300, uvY0 = Math.random()*300;
        for (let j=0;j<=heightSegments;j++){
          const y = height*(j/heightSegments - 0.5);
          positions.set([xOffset,y,0, xOffset+width,y,0], vo*3);
          const uvY = j/heightSegments;
          uvs.set([uvX, uvY+uvY0, uvX+1, uvY+uvY0], uo);
          if (j<heightSegments){
            const a=vo,b=vo+1,c=vo+2,d=vo+3;
            indices.set([a,b,c,c,b,d], io); io+=6;
          }
          vo+=2; uo+=4;
        }
      }
      geometry.setAttribute('position', new THREE.BufferAttribute(positions,3));
      geometry.setAttribute('uv', new THREE.BufferAttribute(uvs,2));
      geometry.setIndex(new THREE.BufferAttribute(indices,1));
      geometry.computeVertexNormals();
      return geometry;
    }

    // --- scène / caméra / renderer ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const rect0 = section.getBoundingClientRect();
    const camera = new THREE.PerspectiveCamera(30, (rect0.width||1)/(rect0.height||1), 0.1, 1000);
    camera.position.set(0,0,20);

    const renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    stage.innerHTML = '';
    stage.appendChild(renderer.domElement);

    const group = new THREE.Group();
    group.rotation.z = degToRad(rotation);
    scene.add(group);

    const geometry = createStackedPlanesBufferGeometry(beamNumber, beamWidth, beamHeight, 0, 100);
    const mesh = new THREE.Mesh(geometry, beamMaterial);
    group.add(mesh);

    const dir = new THREE.DirectionalLight(new THREE.Color(lightColor), 1);
    dir.position.set(0,3,10);
    group.add(dir);
    scene.add(new THREE.AmbientLight(0xffffff, 1));

    function resize(){
      const r = section.getBoundingClientRect();
      if (!r.width || !r.height) return;
      camera.aspect = r.width/r.height; camera.updateProjectionMatrix();
      renderer.setSize(r.width, r.height);
    }
    let ro;
    if (window.ResizeObserver){ ro = new ResizeObserver(resize); ro.observe(section); }
    else { window.addEventListener('resize', resize); }
    resize();

    const clock = new THREE.Clock();
    let raf;
    (function animate(){
      raf = requestAnimationFrame(animate);
      beamMaterial.uniforms.time.value += 0.1 * clock.getDelta();
      renderer.render(scene, camera);
    })();

    window.addEventListener('pagehide', () => {
      cancelAnimationFrame(raf);
      if (ro) ro.disconnect(); else window.removeEventListener('resize', resize);
      renderer.dispose(); geometry.dispose(); beamMaterial.dispose();
    });
  }
</script>

</body>
</html>
