<!-- ==========================================================================
     STYLE — Fond fluide (LiquidEther, portage React Bits → HTML)
     Three.js chargé en module ESM (CDN). Repli dégradé statique si pas de WebGL.

<style>
  :root{
    --fg:#ffffff;--muted:rgba(255,255,255,.8);
    --font:"Outfit",ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:#06060a}

  .liquid{position:relative;width:100%;height:100vh;height:100dvh;overflow:hidden;
    background:#06060a;color:var(--fg);touch-action:none}
  .liquid__stage{position:absolute;inset:0}
  .liquid__stage canvas{display:block;width:100%!important;height:100%!important}

  /* repli statique (reduced-motion / pas de WebGL) : nappe colorée douce */
  .liquid__fallback{position:absolute;inset:0;display:none;
    background:
      radial-gradient(60% 60% at 30% 35%, #5227FF66, transparent 70%),
      radial-gradient(55% 55% at 70% 55%, #FF9FFC55, transparent 70%),
      radial-gradient(60% 60% at 55% 75%, #B497CF55, transparent 70%),
      #06060a}
  .liquid.is-fallback .liquid__stage{display:none}
  .liquid.is-fallback .liquid__fallback{display:block}

  /* overlay optionnel — laisse passer la souris vers le canvas */
  .liquid__overlay{position:absolute;inset:0;z-index:2;pointer-events:none;
    display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
  .liquid__title{font-size:clamp(2rem,7vw,5.5rem);font-weight:800;line-height:1.02;letter-spacing:-.03em;
    text-shadow:0 4px 40px rgba(0,0,0,.5)}
  .liquid__title:empty{display:none}
</style>
</head>
<body>

<!-- ==========================================================================
     STRUCTURE — réglez la palette et la physique via les data-attributs.
     ========================================================================== -->
<section class="liquid" id="liquid"
         data-colors="#5227FF,#FF9FFC,#B497CF"
         data-mouse-force="20" data-cursor-size="100" data-resolution="0.5"
         data-is-viscous="false" data-viscous="30" data-iterations-viscous="32"
         data-iterations-poisson="32" data-is-bounce="false" data-dt="0.014" data-bfecc="true"
         data-auto-demo="true" data-auto-speed="0.5" data-auto-intensity="2.2"
         data-takeover-duration="0.25" data-auto-resume-delay="3000" data-auto-ramp-duration="0.6"
         data-slot="fond">
  <div class="liquid__stage" id="liquidStage"></div>
  <div class="liquid__fallback" aria-hidden="true"></div>

  <div class="liquid__overlay">
    <h1 class="liquid__title" data-field="titre"></h1>
  </div>
</section>

<!-- SCRIPT — portage du composant LiquidEther (React Bits) en vanilla + Three.js -->
<script type="module">
  const section = document.getElementById('liquid');
  const stage   = document.getElementById('liquidStage');
  const P = section.dataset;

  const num  = (v,d)=> (v!=null && v!=='' && !isNaN(parseFloat(v))) ? parseFloat(v) : d;
  const int  = (v,d)=> (v!=null && v!=='' && !isNaN(parseInt(v,10))) ? parseInt(v,10) : d;
  const bool = (v,d)=> v==null ? d : (v==='true'||v==='1');

  const opts = {
    colors: P.colors ? P.colors.split(',').map(s=>s.trim()).filter(Boolean) : ['#5227FF','#FF9FFC','#B497CF'],
    mouseForce: num(P.mouseForce, 20),
    cursorSize: num(P.cursorSize, 100),
    resolution: num(P.resolution, 0.5),
    isViscous: bool(P.isViscous, false),
    viscous: num(P.viscous, 30),
    iterationsViscous: int(P.iterationsViscous, 32),
    iterationsPoisson: int(P.iterationsPoisson, 32),
    isBounce: bool(P.isBounce, false),
    dt: num(P.dt, 0.014),
    BFECC: bool(P.bfecc, true),
    autoDemo: bool(P.autoDemo, true),
    autoSpeed: num(P.autoSpeed, 0.5),
    autoIntensity: num(P.autoIntensity, 2.2),
    takeoverDuration: num(P.takeoverDuration, 0.25),
    autoResumeDelay: num(P.autoResumeDelay, 3000),
    autoRampDuration: num(P.autoRampDuration, 0.6)
  };

  const rm = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  function webglOK(){
    try{ const c=document.createElement('canvas');
      return !!(window.WebGLRenderingContext && (c.getContext('webgl2')||c.getContext('webgl')||c.getContext('experimental-webgl'))); }
    catch(e){ return false; }
  }
  function toFallback(){ section.classList.add('is-fallback'); }

  if (rm || !webglOK()) { toFallback(); }
  else {
    import('https://unpkg.com/three@0.160.0/build/three.module.js')
      .then((THREE)=>{ try{ initLiquidEther(THREE, opts); }catch(e){ console.error(e); toFallback(); } })
      .catch(()=> toFallback());
  }

  function initLiquidEther(THREE, cfg){
    let raf = null, isVisible = true;

    function makePaletteTexture(stops){
      let arr = (Array.isArray(stops) && stops.length>0) ? (stops.length===1 ? [stops[0],stops[0]] : stops) : ['#ffffff','#ffffff'];
      const w = arr.length, data = new Uint8Array(w*4);
      for (let i=0;i<w;i++){ const c=new THREE.Color(arr[i]);
        data[i*4]=Math.round(c.r*255); data[i*4+1]=Math.round(c.g*255); data[i*4+2]=Math.round(c.b*255); data[i*4+3]=255; }
      const tex=new THREE.DataTexture(data,w,1,THREE.RGBAFormat);
      tex.magFilter=THREE.LinearFilter; tex.minFilter=THREE.LinearFilter;
      tex.wrapS=THREE.ClampToEdgeWrapping; tex.wrapT=THREE.ClampToEdgeWrapping;
      tex.generateMipmaps=false; tex.needsUpdate=true; return tex;
    }
    const paletteTex = makePaletteTexture(cfg.colors);
    const bgVec4 = new THREE.Vector4(0,0,0,0);

    class CommonClass{
      constructor(){ this.width=0;this.height=0;this.aspect=1;this.pixelRatio=1;this.time=0;this.delta=0;
        this.container=null;this.renderer=null;this.clock=null; }
      init(container){
        this.container=container;
        this.pixelRatio=Math.min(window.devicePixelRatio||1,2);
        this.resize();
        this.renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
        this.renderer.autoClear=false;
        this.renderer.setClearColor(new THREE.Color(0x000000),0);
        this.renderer.setPixelRatio(this.pixelRatio);
        this.renderer.setSize(this.width,this.height);
        this.renderer.domElement.style.width='100%';
        this.renderer.domElement.style.height='100%';
        this.renderer.domElement.style.display='block';
        this.clock=new THREE.Clock(); this.clock.start();
      }
      resize(){
        if(!this.container) return;
        const rect=this.container.getBoundingClientRect();
        this.width=Math.max(1,Math.floor(rect.width));
        this.height=Math.max(1,Math.floor(rect.height));
        this.aspect=this.width/this.height;
        if(this.renderer) this.renderer.setSize(this.width,this.height,false);
      }
      update(){ this.delta=this.clock.getDelta(); this.time+=this.delta; }
    }
    const Common=new CommonClass();

    class MouseClass{
      constructor(){
        this.mouseMoved=false; this.coords=new THREE.Vector2(); this.coords_old=new THREE.Vector2();
        this.diff=new THREE.Vector2(); this.timer=null; this.container=null; this.listenerTarget=null; this.docTarget=null;
        this.isHoverInside=false; this.hasUserControl=false; this.isAutoActive=false;
        this.autoIntensity=2.0; this.takeoverActive=false; this.takeoverStartTime=0; this.takeoverDuration=0.25;
        this.takeoverFrom=new THREE.Vector2(); this.takeoverTo=new THREE.Vector2(); this.onInteract=null;
        this._onMouseMove=this.onDocumentMouseMove.bind(this);
        this._onTouchStart=this.onDocumentTouchStart.bind(this);
        this._onTouchMove=this.onDocumentTouchMove.bind(this);
        this._onTouchEnd=this.onTouchEnd.bind(this);
        this._onDocumentLeave=this.onDocumentLeave.bind(this);
      }
      init(container){
        this.container=container; this.docTarget=container.ownerDocument||document;
        const dv=(this.docTarget&&this.docTarget.defaultView)||window; if(!dv) return;
        this.listenerTarget=dv;
        dv.addEventListener('mousemove',this._onMouseMove);
        dv.addEventListener('touchstart',this._onTouchStart,{passive:true});
        dv.addEventListener('touchmove',this._onTouchMove,{passive:true});
        dv.addEventListener('touchend',this._onTouchEnd);
        this.docTarget.addEventListener('mouseleave',this._onDocumentLeave);
      }
      dispose(){
        if(this.listenerTarget){
          this.listenerTarget.removeEventListener('mousemove',this._onMouseMove);
          this.listenerTarget.removeEventListener('touchstart',this._onTouchStart);
          this.listenerTarget.removeEventListener('touchmove',this._onTouchMove);
          this.listenerTarget.removeEventListener('touchend',this._onTouchEnd);
        }
        if(this.docTarget) this.docTarget.removeEventListener('mouseleave',this._onDocumentLeave);
        this.listenerTarget=null; this.docTarget=null; this.container=null;
      }
      isPointInside(x,y){ if(!this.container) return false;
        const r=this.container.getBoundingClientRect(); if(!r.width||!r.height) return false;
        return x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom; }
      updateHoverState(x,y){ this.isHoverInside=this.isPointInside(x,y); return this.isHoverInside; }
      setCoords(x,y){ if(!this.container) return; if(this.timer) clearTimeout(this.timer);
        const r=this.container.getBoundingClientRect(); if(!r.width||!r.height) return;
        const nx=(x-r.left)/r.width, ny=(y-r.top)/r.height;
        this.coords.set(nx*2-1,-(ny*2-1)); this.mouseMoved=true;
        this.timer=setTimeout(()=>{this.mouseMoved=false;},100); }
      setNormalized(nx,ny){ this.coords.set(nx,ny); this.mouseMoved=true; }
      onDocumentMouseMove(e){
        if(!this.updateHoverState(e.clientX,e.clientY)) return;
        if(this.onInteract) this.onInteract();
        if(this.isAutoActive&&!this.hasUserControl&&!this.takeoverActive){
          const r=this.container.getBoundingClientRect(); if(!r.width||!r.height) return;
          const nx=(e.clientX-r.left)/r.width, ny=(e.clientY-r.top)/r.height;
          this.takeoverFrom.copy(this.coords); this.takeoverTo.set(nx*2-1,-(ny*2-1));
          this.takeoverStartTime=performance.now(); this.takeoverActive=true;
          this.hasUserControl=true; this.isAutoActive=false; return;
        }
        this.setCoords(e.clientX,e.clientY); this.hasUserControl=true;
      }
      onDocumentTouchStart(e){ if(e.touches.length!==1) return; const t=e.touches[0];
        if(!this.updateHoverState(t.clientX,t.clientY)) return; if(this.onInteract) this.onInteract();
        this.setCoords(t.clientX,t.clientY); this.hasUserControl=true; }
      onDocumentTouchMove(e){ if(e.touches.length!==1) return; const t=e.touches[0];
        if(!this.updateHoverState(t.clientX,t.clientY)) return; if(this.onInteract) this.onInteract();
        this.setCoords(t.clientX,t.clientY); }
      onTouchEnd(){ this.isHoverInside=false; }
      onDocumentLeave(){ this.isHoverInside=false; }
      update(){
        if(this.takeoverActive){
          const t=(performance.now()-this.takeoverStartTime)/(this.takeoverDuration*1000);
          if(t>=1){ this.takeoverActive=false; this.coords.copy(this.takeoverTo); this.coords_old.copy(this.coords); this.diff.set(0,0); }
          else{ const k=t*t*(3-2*t); this.coords.copy(this.takeoverFrom).lerp(this.takeoverTo,k); }
        }
        this.diff.subVectors(this.coords,this.coords_old); this.coords_old.copy(this.coords);
        if(this.coords_old.x===0&&this.coords_old.y===0) this.diff.set(0,0);
        if(this.isAutoActive&&!this.takeoverActive) this.diff.multiplyScalar(this.autoIntensity);
      }
    }
    const Mouse=new MouseClass();

    class AutoDriver{
      constructor(mouse,manager,o){ this.mouse=mouse;this.manager=manager;this.enabled=o.enabled;this.speed=o.speed;
        this.resumeDelay=o.resumeDelay||3000;this.rampDurationMs=(o.rampDuration||0)*1000;this.active=false;
        this.current=new THREE.Vector2(0,0);this.target=new THREE.Vector2();this.lastTime=performance.now();
        this.activationTime=0;this.margin=0.2;this._tmpDir=new THREE.Vector2();this.pickNewTarget(); }
      pickNewTarget(){ const r=Math.random; this.target.set((r()*2-1)*(1-this.margin),(r()*2-1)*(1-this.margin)); }
      forceStop(){ this.active=false; this.mouse.isAutoActive=false; }
      update(){
        if(!this.enabled) return;
        const now=performance.now(), idle=now-this.manager.lastUserInteraction;
        if(idle<this.resumeDelay){ if(this.active) this.forceStop(); return; }
        if(this.mouse.isHoverInside){ if(this.active) this.forceStop(); return; }
        if(!this.active){ this.active=true; this.current.copy(this.mouse.coords); this.lastTime=now; this.activationTime=now; }
        this.mouse.isAutoActive=true;
        let dtSec=(now-this.lastTime)/1000; this.lastTime=now; if(dtSec>0.2) dtSec=0.016;
        const dir=this._tmpDir.subVectors(this.target,this.current), dist=dir.length();
        if(dist<0.01){ this.pickNewTarget(); return; }
        dir.normalize();
        let ramp=1; if(this.rampDurationMs>0){ const t=Math.min(1,(now-this.activationTime)/this.rampDurationMs); ramp=t*t*(3-2*t); }
        const step=this.speed*dtSec*ramp, move=Math.min(step,dist);
        this.current.addScaledVector(dir,move); this.mouse.setNormalized(this.current.x,this.current.y);
      }
    }

    const face_vert=`attribute vec3 position;uniform vec2 px;uniform vec2 boundarySpace;varying vec2 uv;precision highp float;
void main(){vec3 pos=position;vec2 scale=1.0-boundarySpace*2.0;pos.xy=pos.xy*scale;uv=vec2(0.5)+(pos.xy)*0.5;gl_Position=vec4(pos,1.0);}`;
    const line_vert=`attribute vec3 position;uniform vec2 px;precision highp float;varying vec2 uv;
void main(){vec3 pos=position;uv=0.5+pos.xy*0.5;vec2 n=sign(pos.xy);pos.xy=abs(pos.xy)-px*1.0;pos.xy*=n;gl_Position=vec4(pos,1.0);}`;
    const mouse_vert=`precision highp float;attribute vec3 position;attribute vec2 uv;uniform vec2 center;uniform vec2 scale;uniform vec2 px;varying vec2 vUv;
void main(){vec2 pos=position.xy*scale*2.0*px+center;vUv=uv;gl_Position=vec4(pos,0.0,1.0);}`;
    const advection_frag=`precision highp float;uniform sampler2D velocity;uniform float dt;uniform bool isBFECC;uniform vec2 fboSize;uniform vec2 px;varying vec2 uv;
void main(){vec2 ratio=max(fboSize.x,fboSize.y)/fboSize;
if(isBFECC==false){vec2 vel=texture2D(velocity,uv).xy;vec2 uv2=uv-vel*dt*ratio;vec2 newVel=texture2D(velocity,uv2).xy;gl_FragColor=vec4(newVel,0.0,0.0);}
else{vec2 spot_new=uv;vec2 vel_old=texture2D(velocity,uv).xy;vec2 spot_old=spot_new-vel_old*dt*ratio;vec2 vel_new1=texture2D(velocity,spot_old).xy;
vec2 spot_new2=spot_old+vel_new1*dt*ratio;vec2 error=spot_new2-spot_new;vec2 spot_new3=spot_new-error/2.0;vec2 vel_2=texture2D(velocity,spot_new3).xy;
vec2 spot_old2=spot_new3-vel_2*dt*ratio;vec2 newVel2=texture2D(velocity,spot_old2).xy;gl_FragColor=vec4(newVel2,0.0,0.0);}}`;
    const color_frag=`precision highp float;uniform sampler2D velocity;uniform sampler2D palette;uniform vec4 bgColor;varying vec2 uv;
void main(){vec2 vel=texture2D(velocity,uv).xy;float lenv=clamp(length(vel),0.0,1.0);vec3 c=texture2D(palette,vec2(lenv,0.5)).rgb;
vec3 outRGB=mix(bgColor.rgb,c,lenv);float outA=mix(bgColor.a,1.0,lenv);gl_FragColor=vec4(outRGB,outA);}`;
    const divergence_frag=`precision highp float;uniform sampler2D velocity;uniform float dt;uniform vec2 px;varying vec2 uv;
void main(){float x0=texture2D(velocity,uv-vec2(px.x,0.0)).x;float x1=texture2D(velocity,uv+vec2(px.x,0.0)).x;
float y0=texture2D(velocity,uv-vec2(0.0,px.y)).y;float y1=texture2D(velocity,uv+vec2(0.0,px.y)).y;
float divergence=(x1-x0+y1-y0)/2.0;gl_FragColor=vec4(divergence/dt);}`;
    const externalForce_frag=`precision highp float;uniform vec2 force;uniform vec2 center;uniform vec2 scale;uniform vec2 px;varying vec2 vUv;
void main(){vec2 circle=(vUv-0.5)*2.0;float d=1.0-min(length(circle),1.0);d*=d;gl_FragColor=vec4(force*d,0.0,1.0);}`;
    const poisson_frag=`precision highp float;uniform sampler2D pressure;uniform sampler2D divergence;uniform vec2 px;varying vec2 uv;
void main(){float p0=texture2D(pressure,uv+vec2(px.x*2.0,0.0)).r;float p1=texture2D(pressure,uv-vec2(px.x*2.0,0.0)).r;
float p2=texture2D(pressure,uv+vec2(0.0,px.y*2.0)).r;float p3=texture2D(pressure,uv-vec2(0.0,px.y*2.0)).r;
float div=texture2D(divergence,uv).r;float newP=(p0+p1+p2+p3)/4.0-div;gl_FragColor=vec4(newP);}`;
    const pressure_frag=`precision highp float;uniform sampler2D pressure;uniform sampler2D velocity;uniform vec2 px;uniform float dt;varying vec2 uv;
void main(){float step=1.0;float p0=texture2D(pressure,uv+vec2(px.x*step,0.0)).r;float p1=texture2D(pressure,uv-vec2(px.x*step,0.0)).r;
float p2=texture2D(pressure,uv+vec2(0.0,px.y*step)).r;float p3=texture2D(pressure,uv-vec2(0.0,px.y*step)).r;
vec2 v=texture2D(velocity,uv).xy;vec2 gradP=vec2(p0-p1,p2-p3)*0.5;v=v-gradP*dt;gl_FragColor=vec4(v,0.0,1.0);}`;
    const viscous_frag=`precision highp float;uniform sampler2D velocity;uniform sampler2D velocity_new;uniform float v;uniform vec2 px;uniform float dt;varying vec2 uv;
void main(){vec2 old=texture2D(velocity,uv).xy;vec2 new0=texture2D(velocity_new,uv+vec2(px.x*2.0,0.0)).xy;vec2 new1=texture2D(velocity_new,uv-vec2(px.x*2.0,0.0)).xy;
vec2 new2=texture2D(velocity_new,uv+vec2(0.0,px.y*2.0)).xy;vec2 new3=texture2D(velocity_new,uv-vec2(0.0,px.y*2.0)).xy;
vec2 newv=4.0*old+v*dt*(new0+new1+new2+new3);newv/=4.0*(1.0+v*dt);gl_FragColor=vec4(newv,0.0,0.0);}`;

    class ShaderPass{
      constructor(props){ this.props=props||{}; this.uniforms=this.props.material&&this.props.material.uniforms;
        this.scene=null;this.camera=null;this.material=null;this.geometry=null;this.plane=null; }
      init(){ this.scene=new THREE.Scene(); this.camera=new THREE.Camera();
        if(this.uniforms){ this.material=new THREE.RawShaderMaterial(this.props.material);
          this.geometry=new THREE.PlaneGeometry(2.0,2.0); this.plane=new THREE.Mesh(this.geometry,this.material); this.scene.add(this.plane); } }
      update(){ Common.renderer.setRenderTarget(this.props.output||null); Common.renderer.render(this.scene,this.camera); Common.renderer.setRenderTarget(null); }
    }
    class Advection extends ShaderPass{
      constructor(s){ super({ material:{ vertexShader:face_vert, fragmentShader:advection_frag, uniforms:{
        boundarySpace:{value:s.cellScale}, px:{value:s.cellScale}, fboSize:{value:s.fboSize},
        velocity:{value:s.src.texture}, dt:{value:s.dt}, isBFECC:{value:true} } }, output:s.dst });
        this.uniforms=this.props.material.uniforms; this.init(); }
      init(){ super.init(); this.createBoundary(); }
      createBoundary(){ const g=new THREE.BufferGeometry();
        const vb=new Float32Array([-1,-1,0,-1,1,0,-1,1,0,1,1,0,1,1,0,1,-1,0,1,-1,0,-1,-1,0]);
        g.setAttribute('position',new THREE.BufferAttribute(vb,3));
        const m=new THREE.RawShaderMaterial({vertexShader:line_vert,fragmentShader:advection_frag,uniforms:this.uniforms});
        this.line=new THREE.LineSegments(g,m); this.scene.add(this.line); }
      update({dt,isBounce,BFECC}){ this.uniforms.dt.value=dt; this.line.visible=isBounce; this.uniforms.isBFECC.value=BFECC; super.update(); }
    }
    class ExternalForce extends ShaderPass{
      constructor(s){ super({output:s.dst}); this.init(s); }
      init(s){ super.init(); const g=new THREE.PlaneGeometry(1,1);
        const m=new THREE.RawShaderMaterial({ vertexShader:mouse_vert, fragmentShader:externalForce_frag,
          blending:THREE.AdditiveBlending, depthWrite:false, uniforms:{
          px:{value:s.cellScale}, force:{value:new THREE.Vector2(0,0)}, center:{value:new THREE.Vector2(0,0)},
          scale:{value:new THREE.Vector2(s.cursor_size,s.cursor_size)} } });
        this.mouse=new THREE.Mesh(g,m); this.scene.add(this.mouse); }
      update(props){
        const forceX=(Mouse.diff.x/2)*props.mouse_force, forceY=(Mouse.diff.y/2)*props.mouse_force;
        const csX=props.cursor_size*props.cellScale.x, csY=props.cursor_size*props.cellScale.y;
        const cx=Math.min(Math.max(Mouse.coords.x,-1+csX+props.cellScale.x*2),1-csX-props.cellScale.x*2);
        const cy=Math.min(Math.max(Mouse.coords.y,-1+csY+props.cellScale.y*2),1-csY-props.cellScale.y*2);
        const u=this.mouse.material.uniforms;
        u.force.value.set(forceX,forceY); u.center.value.set(cx,cy); u.scale.value.set(props.cursor_size,props.cursor_size);
        super.update();
      }
    }
    class Viscous extends ShaderPass{
      constructor(s){ super({ material:{ vertexShader:face_vert, fragmentShader:viscous_frag, uniforms:{
        boundarySpace:{value:s.boundarySpace}, velocity:{value:s.src.texture}, velocity_new:{value:s.dst_.texture},
        v:{value:s.viscous}, px:{value:s.cellScale}, dt:{value:s.dt} } }, output:s.dst, output0:s.dst_, output1:s.dst });
        this.init(); }
      update({viscous,iterations,dt}){ let fin,fout; this.uniforms.v.value=viscous;
        for(let i=0;i<iterations;i++){ if(i%2===0){fin=this.props.output0;fout=this.props.output1;} else {fin=this.props.output1;fout=this.props.output0;}
          this.uniforms.velocity_new.value=fin.texture; this.props.output=fout; this.uniforms.dt.value=dt; super.update(); }
        return fout; }
    }
    class Divergence extends ShaderPass{
      constructor(s){ super({ material:{ vertexShader:face_vert, fragmentShader:divergence_frag, uniforms:{
        boundarySpace:{value:s.boundarySpace}, velocity:{value:s.src.texture}, px:{value:s.cellScale}, dt:{value:s.dt} } }, output:s.dst });
        this.init(); }
      update({vel}){ this.uniforms.velocity.value=vel.texture; super.update(); }
    }
    class Poisson extends ShaderPass{
      constructor(s){ super({ material:{ vertexShader:face_vert, fragmentShader:poisson_frag, uniforms:{
        boundarySpace:{value:s.boundarySpace}, pressure:{value:s.dst_.texture}, divergence:{value:s.src.texture}, px:{value:s.cellScale} } },
        output:s.dst, output0:s.dst_, output1:s.dst }); this.init(); }
      update({iterations}){ let pin,pout;
        for(let i=0;i<iterations;i++){ if(i%2===0){pin=this.props.output0;pout=this.props.output1;} else {pin=this.props.output1;pout=this.props.output0;}
          this.uniforms.pressure.value=pin.texture; this.props.output=pout; super.update(); }
        return pout; }
    }
    class Pressure extends ShaderPass{
      constructor(s){ super({ material:{ vertexShader:face_vert, fragmentShader:pressure_frag, uniforms:{
        boundarySpace:{value:s.boundarySpace}, pressure:{value:s.src_p.texture}, velocity:{value:s.src_v.texture}, px:{value:s.cellScale}, dt:{value:s.dt} } },
        output:s.dst }); this.init(); }
      update({vel,pressure}){ this.uniforms.velocity.value=vel.texture; this.uniforms.pressure.value=pressure.texture; super.update(); }
    }

    class Simulation{
      constructor(o){ this.options={ iterations_poisson:32, iterations_viscous:32, mouse_force:20, resolution:0.5,
        cursor_size:100, viscous:30, isBounce:false, dt:0.014, isViscous:false, BFECC:true, ...o };
        this.fbos={vel_0:null,vel_1:null,vel_viscous0:null,vel_viscous1:null,div:null,pressure_0:null,pressure_1:null};
        this.fboSize=new THREE.Vector2(); this.cellScale=new THREE.Vector2(); this.boundarySpace=new THREE.Vector2(); this.init(); }
      init(){ this.calcSize(); this.createAllFBO(); this.createShaderPass(); }
      getFloatType(){ const iOS=/(iPad|iPhone|iPod)/i.test(navigator.userAgent); return iOS?THREE.HalfFloatType:THREE.FloatType; }
      createAllFBO(){ const type=this.getFloatType();
        const opts={ type, depthBuffer:false, stencilBuffer:false, minFilter:THREE.LinearFilter, magFilter:THREE.LinearFilter,
          wrapS:THREE.ClampToEdgeWrapping, wrapT:THREE.ClampToEdgeWrapping };
        for(let k in this.fbos) this.fbos[k]=new THREE.WebGLRenderTarget(this.fboSize.x,this.fboSize.y,opts); }
      createShaderPass(){
        this.advection=new Advection({cellScale:this.cellScale,fboSize:this.fboSize,dt:this.options.dt,src:this.fbos.vel_0,dst:this.fbos.vel_1});
        this.externalForce=new ExternalForce({cellScale:this.cellScale,cursor_size:this.options.cursor_size,dst:this.fbos.vel_1});
        this.viscous=new Viscous({cellScale:this.cellScale,boundarySpace:this.boundarySpace,viscous:this.options.viscous,src:this.fbos.vel_1,dst:this.fbos.vel_viscous1,dst_:this.fbos.vel_viscous0,dt:this.options.dt});
        this.divergence=new Divergence({cellScale:this.cellScale,boundarySpace:this.boundarySpace,src:this.fbos.vel_viscous0,dst:this.fbos.div,dt:this.options.dt});
        this.poisson=new Poisson({cellScale:this.cellScale,boundarySpace:this.boundarySpace,src:this.fbos.div,dst:this.fbos.pressure_1,dst_:this.fbos.pressure_0});
        this.pressure=new Pressure({cellScale:this.cellScale,boundarySpace:this.boundarySpace,src_p:this.fbos.pressure_0,src_v:this.fbos.vel_viscous0,dst:this.fbos.vel_0,dt:this.options.dt});
      }
      calcSize(){ const w=Math.max(1,Math.round(this.options.resolution*Common.width)), h=Math.max(1,Math.round(this.options.resolution*Common.height));
        this.cellScale.set(1.0/w,1.0/h); this.fboSize.set(w,h); }
      resize(){ this.calcSize(); for(let k in this.fbos) this.fbos[k].setSize(this.fboSize.x,this.fboSize.y); }
      update(){
        if(this.options.isBounce) this.boundarySpace.set(0,0); else this.boundarySpace.copy(this.cellScale);
        this.advection.update({dt:this.options.dt,isBounce:this.options.isBounce,BFECC:this.options.BFECC});
        this.externalForce.update({cursor_size:this.options.cursor_size,mouse_force:this.options.mouse_force,cellScale:this.cellScale});
        let vel=this.fbos.vel_1;
        if(this.options.isViscous) vel=this.viscous.update({viscous:this.options.viscous,iterations:this.options.iterations_viscous,dt:this.options.dt});
        this.divergence.update({vel});
        const pressure=this.poisson.update({iterations:this.options.iterations_poisson});
        this.pressure.update({vel,pressure});
      }
    }
    class Output{
      constructor(){ this.init(); }
      init(){ this.simulation=new Simulation(); this.scene=new THREE.Scene(); this.camera=new THREE.Camera();
        this.output=new THREE.Mesh(new THREE.PlaneGeometry(2,2), new THREE.RawShaderMaterial({
          vertexShader:face_vert, fragmentShader:color_frag, transparent:true, depthWrite:false, uniforms:{
          velocity:{value:this.simulation.fbos.vel_0.texture}, boundarySpace:{value:new THREE.Vector2()},
          palette:{value:paletteTex}, bgColor:{value:bgVec4} } }));
        this.scene.add(this.output); }
      resize(){ this.simulation.resize(); }
      render(){ Common.renderer.setRenderTarget(null); Common.renderer.render(this.scene,this.camera); }
      update(){ this.simulation.update(); this.render(); }
    }

    class WebGLManager{
      constructor(props){ this.props=props; Common.init(props.$wrapper); Mouse.init(props.$wrapper);
        Mouse.autoIntensity=props.autoIntensity; Mouse.takeoverDuration=props.takeoverDuration;
        this.lastUserInteraction=performance.now();
        Mouse.onInteract=()=>{ this.lastUserInteraction=performance.now(); if(this.autoDriver) this.autoDriver.forceStop(); };
        this.autoDriver=new AutoDriver(Mouse,this,{enabled:props.autoDemo,speed:props.autoSpeed,resumeDelay:props.autoResumeDelay,rampDuration:props.autoRampDuration});
        this._raf=null; this.running=false;
        this.init();
        this._loop=this.loop.bind(this); this._resize=this.resize.bind(this);
        window.addEventListener('resize',this._resize);
        this._onVisibility=()=>{ if(document.hidden) this.pause(); else if(isVisible) this.start(); };
        document.addEventListener('visibilitychange',this._onVisibility);
      }
      init(){ this.props.$wrapper.prepend(Common.renderer.domElement); this.output=new Output(); }
      resize(){ Common.resize(); this.output.resize(); }
      render(){ if(this.autoDriver) this.autoDriver.update(); Mouse.update(); Common.update(); this.output.update(); }
      loop(){ if(!this.running) return; this.render(); this._raf=requestAnimationFrame(this._loop); raf=this._raf; }
      start(){ if(this.running) return; this.running=true; this._loop(); }
      pause(){ this.running=false; if(this._raf){ cancelAnimationFrame(this._raf); this._raf=null; raf=null; } }
      dispose(){ try{
        window.removeEventListener('resize',this._resize);
        document.removeEventListener('visibilitychange',this._onVisibility);
        Mouse.dispose();
        if(Common.renderer){ const c=Common.renderer.domElement; if(c&&c.parentNode) c.parentNode.removeChild(c);
          Common.renderer.dispose(); Common.renderer.forceContextLoss(); }
      }catch(e){} }
    }

    const container=stage;
    container.style.position=container.style.position||'relative';
    container.style.overflow=container.style.overflow||'hidden';

    const webgl=new WebGLManager({ $wrapper:container, autoDemo:cfg.autoDemo, autoSpeed:cfg.autoSpeed,
      autoIntensity:cfg.autoIntensity, takeoverDuration:cfg.takeoverDuration, autoResumeDelay:cfg.autoResumeDelay, autoRampDuration:cfg.autoRampDuration });

    // pousser les réglages data-* dans la simulation (comme applyOptionsFromProps)
    (function applyOptions(){
      const sim=webgl.output&&webgl.output.simulation; if(!sim) return;
      const prev=sim.options.resolution;
      Object.assign(sim.options,{ mouse_force:cfg.mouseForce, cursor_size:cfg.cursorSize, isViscous:cfg.isViscous,
        viscous:cfg.viscous, iterations_viscous:cfg.iterationsViscous, iterations_poisson:cfg.iterationsPoisson,
        dt:cfg.dt, BFECC:cfg.BFECC, resolution:cfg.resolution, isBounce:cfg.isBounce });
      if(cfg.resolution!==prev) sim.resize();
    })();

    webgl.start();

    // pause hors viewport
    const io=new IntersectionObserver((entries)=>{ const e=entries[0]; isVisible=e.isIntersecting&&e.intersectionRatio>0;
      if(isVisible&&!document.hidden) webgl.start(); else webgl.pause(); }, {threshold:[0,0.01,0.1]});
    io.observe(container);

    // resize throttlé
    let rrf=null;
    const ro=new ResizeObserver(()=>{ if(rrf) cancelAnimationFrame(rrf); rrf=requestAnimationFrame(()=>webgl.resize()); });
    ro.observe(container);

    window.addEventListener('pagehide',()=>{
      if(raf) cancelAnimationFrame(raf);
      try{ ro.disconnect(); }catch(e){}
      try{ io.disconnect(); }catch(e){}
      webgl.pause(); webgl.dispose();
    });
  }
</script>

</body>
</html>
